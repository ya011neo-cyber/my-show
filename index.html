<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>應援助手 Cloud Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; touch-action: none; }
        #app { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 5%; text-align: center; }
        .lyrics-container { display: flex; flex-direction: column; gap: 2vh; width: 100%; }
        :root { --fc-color: #0f0; }
        .fanchant { 
            font-size: clamp(1.5rem, 7vh, 4.5rem); font-weight: 900; color: var(--fc-color); 
            text-shadow: 0 0 5px var(--fc-color), 0 0 10px var(--fc-color), 1px 1px 2px #000;
            white-space: normal; line-height: 1.1; display: block; letter-spacing: -1px; 
        }
        .lyrics { font-size: clamp(1rem, 3vh, 2rem); color: #bbb; margin-bottom: 3px; white-space: normal; line-height: 1.2; word-break: break-word; }
        .side-lyrics { font-size: clamp(0.8rem, 2.5vh, 1.5rem); color: #444; min-height: 2vh; transition: all 0.3s ease; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .side-lyrics .fc-text { color: var(--fc-color); filter: brightness(0.5); margin-left: 8px; }
        
        .btn-group { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; z-index: 100; flex-wrap: wrap; justify-content: flex-end; }
        .btn { padding: 8px 12px; background: #222; border-radius: 5px; font-size: 0.7rem; border: 1px solid #444; color: #fff; cursor: pointer; }
        
        /* 全螢幕相片檢視器樣式 */
        #main-photo-overlay { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            z-index: 2500; 
            justify-content: center; 
            align-items: center; 
            /* 必須係 none，我哋先可以用 JS 接管拖曳 */
            touch-action: none; 
            overflow: hidden;
        }
        
        #main-photo-img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            /* 增加 transition 令放大縮細順滑啲 */
            transition: transform 0.2s ease-out; 
            pointer-events: none; /* 讓事件穿透到 Overlay 處理 */
        }
        #main-photo-overlay img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            /* 加埋呢幾行，手機操作會順好多 */
            user-select: none; 
            -webkit-user-drag: none;
            pointer-events: auto;
            will-change: transform;
        }
        .close-photo-btn { position: absolute; top: 20px; right: 20px; font-size: 2rem; color: #fff; background: rgba(0,0,0,0.5); border-radius: 50%; width: 50px; height: 50px; text-align: center; line-height: 50px; cursor: pointer; z-index: 2600; }

        #editor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 999; padding: 20px; box-sizing: border-box; overflow-y: auto; display: none; }
        .word-chip { display: inline-block; padding: 8px 12px; margin: 5px; border: 1px solid #444; border-radius: 4px; cursor: pointer; color: #ccc; }
        .word-chip.is-fc { background: var(--fc-color); color: #000; font-weight: bold; border-color: var(--fc-color); box-shadow: 0 0 10px var(--fc-color); }
    </style>
</head>
<body>

<div id="app" onclick="handleTap(event)">
    <div class="btn-group">
        <div id="mainViewPhotoBtn" class="btn" style="display:none; background:#444;" onclick="showMainPhoto(event)">🖼️ 相片</div>
        <div class="btn" onclick="openColorMenu(event)">🎨 顏色</div>
        <div class="btn" onclick="fetchPublicSongs(event)">📂 歌單</div>
        <div class="btn" onclick="openImporter(event)">➕ 匯入</div>
        <div class="btn" onclick="uploadSong(event)">☁️ 投稿</div>
        <div class="btn" onclick="editCurrentSong(event)">✏️ 編輯</div>
        <div id="lockBtn" class="btn" onclick="toggleLock(event)">🔓 已解鎖</div>
    </div>
    
    <div class="lyrics-container">
        <div class="side-lyrics" id="prevLine"></div>
        <div class="main-focus" style="padding: 20px 0; transform: scale(1.1);">
            <div class="lyrics" id="currLyrics">載入中...</div>
            <div class="fanchant" id="currFanchant"></div>
        </div>
        <div class="side-lyrics" id="nextLine"></div>
    </div>
</div>

<div id="main-photo-overlay">
    <div class="close-photo-btn" onclick="hideMainPhoto()">×</div>
    <img id="main-photo-img" src="" alt="應援參考圖">
</div>

<div id="color-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#222; padding:20px; border-radius:15px; z-index:2000; border:1px solid #444; width:250px; text-align:center;">
    <h4 style="margin:0 0 15px 0;">自定義顏色</h4>
    <input type="color" id="colorPicker" onchange="updateHexInput(this.value)" style="width:100%; height:40px; border:none; background:none; cursor:pointer;">
    <div style="margin:15px 0;">
        <label style="font-size:0.8rem; color:#888;">HEX Code:</label>
        <input type="text" id="hexInput" style="width:100%; background:#111; color:#fff; border:1px solid #555; padding:8px; border-radius:5px; margin-top:5px; text-align:center; font-family:monospace;">
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn" style="flex:1; background:#0f0; color:#000; font-weight:bold;" onclick="saveCustomColor()">套用</button>
        <button class="btn" style="flex:1;" onclick="closeColorMenu()">取消</button>
    </div>
</div>

<div id="import-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; padding:20px; box-sizing:border-box; overflow-y:auto;">
    <h3 id="modal-title" style="text-align:center; color:#0f0;">編輯歌詞</h3>
    <div id="image-preview-container" style="display:none; text-align:center; margin-bottom:10px;">
        <img id="reference-img" style="max-width:100%; max-height:150px; border:1px solid #444; border-radius:5px;">
    </div>
    <textarea id="manualInput" style="width:100%; height:50vh; background:#111; color:#fff; border:1px solid #444; padding:15px; border-radius:10px; font-size:1rem;" placeholder="括號 () 內文字會自動變應援色..."></textarea>
    <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" style="flex:2; padding:15px; background:#0f0; color:#000; font-weight:bold;" onclick="handleManualSubmit()">✅ 確認並標記</button>
        <button class="btn" style="flex:1; padding:15px;" onclick="document.getElementById('refInput').click()">📷 附相</button>
        <button class="btn" style="flex:1; padding:15px; background:#444;" onclick="closeImporter()">取消</button>
    </div>
    <input type="file" id="refInput" accept="image/*" style="display:none" onchange="previewRefImage(event)">
</div>

<div id="editor-overlay">
    <h2 style="text-align:center;">點擊【應援詞】使其變色</h2>
    <div id="chips-container" style="text-align:center;"></div>
    <div style="text-align:center; margin-top:30px; padding-bottom:50px;">
        <button class="btn" style="font-size: 1.2rem; padding: 15px 30px; background:#0f0; color:#000;" onclick="saveMarkedData()">✅ 完成生成</button>
    </div>
</div>

<script>
    // --- 原有 Firebase 配置 (請保持原樣) ---
    const firebaseConfig = { apiKey: "AIzaSyCOnH-KJfJqe6VGn7qG2TU1rIaT5OEL9JU", authDomain: "fanchartpro.firebaseapp.com", projectId: "fanchartpro", storageBucket: "fanchartpro.firebasestorage.app", messagingSenderId: "94013254919", appId: "1:94013254919:web:929fff5cd2c71067b269a2" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let songData = [{ l: "歡迎使用應援助手", f: "開始" }];
    let index = 0;
    let isLocked = false;
    let currentPhotoData = ""; // 用來儲存相片的 DataURL

    // --- 新增：主畫面相片控制 ---
    // --- 修正版：相片控制邏輯 ---
    let scale = 1;
    let posX = 0, posY = 0;
    let isDragging = false;
    let startX, startY;

    function showMainPhoto(e) {
        if(e) e.stopPropagation();
        if(!currentPhotoData) return;
        const overlay = document.getElementById('main-photo-overlay');
        const img = document.getElementById('main-photo-img');
        
        // 重設狀態
        scale = 1; posX = 0; posY = 0;
        img.src = currentPhotoData;
        img.style.transform = `translate(0px, 0px) scale(1)`;
        overlay.style.display = 'flex';
    }

    function hideMainPhoto() {
        document.getElementById('main-photo-overlay').style.display = 'none';
    }
    
    // 處理拖曳 (相容 Chrome & Samsung)
    const photoImg = document.getElementById('main-photo-img');
    const photoOverlay = document.getElementById('main-photo-overlay');

    photoOverlay.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            isDragging = true;
            startX = e.touches[0].clientX - posX;
            startY = e.touches[0].clientY - posY;
        }
    }, { passive: false });
    
    photoOverlay.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        e.preventDefault(); // 呢句好重要，防止 Chrome 郁到個網頁
        
        posX = e.touches[0].clientX - startX;
        posY = e.touches[0].clientY - startY;
        
        photoImg.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }, { passive: false });
    
    photoOverlay.addEventListener('touchend', () => { isDragging = false; });

    // 解決手機 Chrome 唔支援 dblclick 嘅問題：用計時器模擬 Double Tap
    let lastTap = 0;
    photoOverlay.addEventListener('touchend', (e) => {
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTap;
        if (tapLength < 300 && tapLength > 0) {
            // Double Tap 觸發縮放
            scale = (scale === 1) ? 2.5 : 1; // 放大 2.5 倍
            if (scale === 1) { posX = 0; posY = 0; } // 縮細時回正
            photoImg.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
            e.preventDefault();
        }
        lastTap = currentTime;
    });
    
    // 監聽手勢（手機兩指縮放 + 單指拖曳）
    const photoImg = document.getElementById('main-photo-img');
    const photoOverlay = document.getElementById('main-photo-overlay');
    
    // 使用手勢庫邏輯 (簡易原生實現)
    photoOverlay.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            isDragging = true;
            lastPosX = e.touches[0].clientX - posX;
            lastPosY = e.touches[0].clientY - posY;
        }
    });

    photoOverlay.addEventListener('touchmove', (e) => {
        e.preventDefault(); // 防止背景捲動
        
        // 處理單指拖曳
        if (e.touches.length === 1 && isDragging) {
            posX = e.touches[0].clientX - lastPosX;
            posY = e.touches[0].clientY - lastPosY;
        }
    
        // 處理兩指縮放 (簡易模擬)
        if (e.touches.length === 2) {
            // 呢部分可以用更複雜的距離算法，但手機通常支援原生 Pinch Zoom
            // 如果你發現依然唔識郁，可以將 CSS touch-action 改為 auto
        }
        
        updateImageTransform();
    });
    
    photoOverlay.addEventListener('touchend', () => { isDragging = false; });

    function updateImageTransform() {
        const img = document.getElementById('main-photo-img');
        img.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
    }
    
    // 快捷鍵：雙擊相片重設大小
    photoImg.addEventListener('dblclick', () => {
        scale = (scale === 1) ? 2 : 1;
        posX = 0; posY = 0;
        updateImageTransform();
    });

    // --- 修改：圖片上傳預覽，同步更新主畫面掣 ---
    function previewRefImage(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            currentPhotoData = e.target.result; // 儲存到變數
            document.getElementById('reference-img').src = currentPhotoData;
            document.getElementById('image-preview-container').style.display = 'block';
            
            // 顯示主畫面的相片按鈕
            document.getElementById('mainViewPhotoBtn').style.display = 'block';
            
            // 同時儲存到 localStorage，下次開 App 仲喺度
            localStorage.setItem('savedRefPhoto', currentPhotoData);
        };
        reader.readAsDataURL(file);
    }

    // (其餘 Function：fetchPublicSongs, uploadSong, openColorMenu, startManualMarking, updateUI 等請保留原本內容)
    // 這裡只寫出需要變動的部分...

    async function fetchPublicSongs(e) {
        if (e) e.stopPropagation();
        try {
            const snapshot = await db.collection("songs").where("status", "==", "public").get();
            if (snapshot.empty) { alert("暫時未有公開歌單。"); return; }
            let list = "請選擇歌曲編號：\n";
            let songs = [];
            snapshot.forEach((doc, i) => { songs.push(doc.data()); list += `${i + 1}. ${doc.data().name}\n`; });
            const choice = prompt(list);
            if (choice && songs[choice - 1]) { songData = songs[choice - 1].data; index = 0; updateUI(); }
        } catch (error) { alert("讀取雲端失敗。"); }
    }

    async function uploadSong(e) {
        e.stopPropagation();
        if (songData.length < 1 || songData[0].f === "開始") { alert("請先匯入並標記歌詞！"); return; }
        const songName = prompt("格式：歌名 - 歌手");
        if (!songName) return;
        try {
            await db.collection("songs").add({ name: songName, data: songData, status: "pending", createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            alert("投稿成功，請等候審核！");
        } catch (e) { alert("投稿失敗。"); }
    }

    function openColorMenu(e) {
        e.stopPropagation();
        const curr = getComputedStyle(document.documentElement).getPropertyValue('--fc-color').trim();
        document.getElementById('hexInput').value = curr.toUpperCase();
        document.getElementById('colorPicker').value = curr;
        document.getElementById('color-modal').style.display = 'block';
    }
    function closeColorMenu() { document.getElementById('color-modal').style.display = 'none'; }
    function updateHexInput(val) { document.getElementById('hexInput').value = val.toUpperCase(); }
    function saveCustomColor() {
        let col = document.getElementById('hexInput').value.trim();
        if (!col.startsWith('#')) col = '#' + col;
        if (/^#[0-9A-F]{6}$/i.test(col)) {
            document.documentElement.style.setProperty('--fc-color', col);
            localStorage.setItem('fanchantColor', col);
            closeColorMenu();
        } else { alert("格式錯誤！"); }
    }

    function openImporter(e) {
        if(e) e.stopPropagation();
        document.getElementById('modal-title').innerText = "➕ 匯入新歌詞";
        document.getElementById('manualInput').value = ""; 
        document.getElementById('import-modal').style.display = 'block';
    }

    function editCurrentSong(e) {
        e.stopPropagation();
        document.getElementById('modal-title').innerText = "✏️ 編輯現有歌詞";
        let text = songData.map(item => (item.l === "..." ? "" : item.l + " ") + item.f).join('\n');
        document.getElementById('manualInput').value = text;
        document.getElementById('import-modal').style.display = 'block';
    }

    function closeImporter() { document.getElementById('import-modal').style.display = 'none'; }

    function handleManualSubmit() {
        const input = document.getElementById('manualInput').value;
        if (input.trim()) { closeImporter(); startManualMarking(input); }
    }

    function startManualMarking(text) {
        const container = document.getElementById('chips-container');
        const lines = text.split('\n');
        let html = "";
        lines.forEach((line, rowIdx) => {
            if (line.trim() === "") return;
            html += `<div class="line-row" data-row="${rowIdx}" style="margin-bottom:15px; border-bottom:1px solid #222;">`;
            const words = line.split(/\s+/).filter(w => w !== "");
            let inBracket = false;
            words.forEach(w => {
                if (/[\(\（\[]/.test(w)) inBracket = true;
                html += `<span onclick="this.classList.toggle('is-fc')" class="word-chip ${inBracket ? 'is-fc' : ''}">${w}</span>`;
                if (/[\)\）\]]/.test(w)) inBracket = false;
            });
            html += `</div>`;
        });
        container.innerHTML = html;
        document.getElementById('editor-overlay').style.display = 'block';
    }

    function saveMarkedData() {
        const rows = document.querySelectorAll('.line-row');
        let newData = [];
        rows.forEach(row => {
            const chips = row.querySelectorAll('.word-chip');
            let currentL = ""; let pendingF = [];
            chips.forEach(chip => {
                if (chip.classList.contains('is-fc')) { pendingF.push(chip.innerText); }
                else {
                    if (pendingF.length > 0) {
                        newData.push({ l: currentL.trim() || "...", f: pendingF.join(' ') });
                        currentL = ""; pendingF = [];
                    }
                    currentL += chip.innerText + " ";
                }
            });
            if (pendingF.length > 0 || currentL.trim()) newData.push({ l: currentL.trim() || "...", f: pendingF.join(' ') });
        });
        songData = newData; index = 0;
        document.getElementById('editor-overlay').style.display = 'none';
        updateUI();
    }

    function handleTap(e) {
        if (isLocked) return;
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        if (x < window.innerWidth * 0.3) { if (index > 0) index--; }
        else { if (index < songData.length - 1) index++; else index = 0; }
        updateUI();
    }

    function updateUI() {
        const curr = songData[index];
        const format = (item) => item ? `${item.l === "..." ? "" : item.l} <span class="fc-text">${item.f}</span>` : "";
        document.getElementById('prevLine').innerHTML = format(songData[index-1]);
        document.getElementById('currLyrics').innerText = curr.l;
        document.getElementById('currFanchant').innerText = curr.f;
        document.getElementById('nextLine').innerHTML = songData[index+1] ? format(songData[index+1]) : (index === songData.length-1 ? "— 完 —" : "");
        if (curr.f && navigator.vibrate) navigator.vibrate(50);
        localStorage.setItem('myConcertData', JSON.stringify(songData));
    }

    function toggleLock(e) {
        e.stopPropagation();
        isLocked = !isLocked;
        document.getElementById('lockBtn').innerText = isLocked ? "🔒 鎖定中" : "🔓 已解鎖";
        document.getElementById('lockBtn').style.borderColor = isLocked ? "red" : "#444";
    }

       window.onload = function() {
        // 1. 讀取上次儲存的歌詞數據
        const savedData = localStorage.getItem('myConcertData');
        if (savedData) { 
            songData = JSON.parse(savedData); 
            updateUI(); 
        }
        
        // 2. 讀取上次設定的應援顏色
        const savedColor = localStorage.getItem('fanchantColor');
        if (savedColor) {
            document.documentElement.style.setProperty('--fc-color', savedColor);
        }
    
        // 3. 【新增】讀取上次上傳嘅參考相片
        const savedPhoto = localStorage.getItem('savedRefPhoto');
        if (savedPhoto) {
            currentPhotoData = savedPhoto; // 儲存到全域變數
            
            // 顯示主畫面的相片按鈕
            const mainBtn = document.getElementById('mainViewPhotoBtn');
            if (mainBtn) mainBtn.style.display = 'block';
            
            // 顯示編輯視窗入面的預覽圖（如果有的話）
            const refImg = document.getElementById('reference-img');
            const previewContainer = document.getElementById('image-preview-container');
            if (refImg && previewContainer) {
                refImg.src = savedPhoto;
                previewContainer.style.display = 'block';
            }
        }
    };
</script>
</body>
</html>
