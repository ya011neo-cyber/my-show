<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>應援助手 Cloud Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; touch-action: none; }
        
        /* 核心佈局：確保容器撐開並置中 */
        #app { 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            padding: 0 5%; 
            text-align: center; 
        }

        /* 新增：三層歌詞的總容器 */
        .lyrics-container {
            display: flex;
            flex-direction: column;
            gap: 2vh; 
            width: 100%;
        }

        /* 中間主句容器 */
        .main-focus {
            padding: 20px 0;
            transform: scale(1.1); /* 稍微放大主句 */
        }

        /* 中間主句歌詞 */
        .lyrics { 
            font-size: clamp(1rem, 3.5vh, 2.5rem); 
            color: #bbb; 
            margin-bottom: 5px; 
            /* 【修正】將 nowrap 改為 normal 容許換行 */
            white-space: normal; 
            line-height: 1.2;
            word-break: break-word; /* 確保長單詞也會換行 */
        }
        :root {
            --fc-color: #0f0; /* 預設綠色 */
        }
        
        .fanchant { 
            font-size: clamp(1.5rem, 8vh, 6rem); 
            font-weight: 900; 
            color: var(--fc-color); 
            /* 文字發光效果會跟隨你揀嘅色 */
            text-shadow: 0 0 10px var(--fc-color), 0 0 20px var(--fc-color); 
            white-space: normal; 
            line-height: 1.1;
            display: block;
        }
        
        /* 上下句提示入面的應援詞也跟著變，但調暗一點 */
        .side-lyrics .fc-text {
            color: var(--fc-color);
            filter: brightness(0.5); /* 自動變暗 50% */
            margin-left: 8px;
        }

        /* 上下句提示 */
        .side-lyrics {
            font-size: clamp(0.8rem, 2.5vh, 1.5rem);
            color: #444;
            min-height: 2vh;
            transition: all 0.3s ease;
            /* 保持 side-lyrics 單行，因為太長會遮住主句，所以用 ellipsis */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* 按鈕組與其他原本的 CSS 保持不變 */
        .btn-group { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; z-index: 100; flex-wrap: wrap; justify-content: flex-end; }
        .btn { padding: 8px 12px; background: #222; border-radius: 5px; font-size: 0.7rem; border: 1px solid #444; color: #fff; cursor: pointer; }
        
        #editor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 999; padding: 20px; box-sizing: border-box; overflow-y: auto; display: none; }
        .word-chip { display: inline-block; padding: 8px 12px; margin: 5px; border: 1px solid #444; border-radius: 4px; cursor: pointer; color: #ccc; }
        .word-chip.is-fc { background: #0f0; color: #000; font-weight: bold; border-color: #0f0; box-shadow: 0 0 10px #0f0; }
        .editor-footer { margin-top: 30px; padding-bottom: 50px; text-align: center; }
        
        /* 編輯器內的大文字框樣式 */
        #manualInput {
            width: 100%; height: 60vh; background: #111; color: #fff; border: 1px solid #444; 
            padding: 15px; box-sizing: border-box; font-size: 1.1rem; line-height: 1.6; 
            border-radius: 10px; outline: none;
        }
    </style>
</head>
<body>

<div id="app" onclick="handleTap(event)">
    <div class="btn-group">
        <div class="btn" onclick="openColorMenu(event)">🎨 顏色</div>
        
        <div id="color-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#222; padding:20px; border-radius:15px; z-index:2000; border:1px solid #444; width:250px; text-align:center;">
            <h4 style="margin:0 0 15px 0;">自定義顏色</h4>
            <input type="color" id="colorPicker" onchange="updateHexInput(this.value)" style="width:100%; height:40px; border:none; background:none; cursor:pointer;">
            
            <div style="margin:15px 0;">
                <label style="font-size:0.8rem; color:#888;">HEX Code:</label><br>
                <input type="text" id="hexInput" placeholder="#00ff00" style="width:100%; background:#111; color:#fff; border:1px solid #555; padding:8px; border-radius:5px; margin-top:5px; text-align:center; font-family:monospace;">
            </div>
            
            <div style="display:flex; gap:10px;">
                <button class="btn" style="flex:1; background:#0f0; color:#000; font-weight:bold; border:none;" onclick="saveCustomColor()">套用</button>
                <button class="btn" style="flex:1;" onclick="closeColorMenu()">取消</button>
            </div>
        </div>
        <div class="btn" onclick="fetchPublicSongs(event)">📂 歌單</div>
        <div class="btn" onclick="openImporter(event)">➕ 匯入</div>
        <div class="btn" onclick="uploadSong(event)">☁️ 投稿</div>
        <div class="btn" onclick="editCurrentSong(event)">✏️ 編輯</div>
        <div id="lockBtn" class="btn" onclick="toggleLock(event)">🔓 已解鎖</div>
    </div>
    
    <div class="lyrics-container">
        <div class="side-lyrics" id="prevLine"></div>
        <div class="main-focus">
            <div class="lyrics" id="currLyrics">載入中...</div>
            <div class="fanchant" id="currFanchant"></div>
        </div>
        <div class="side-lyrics" id="nextLine"></div>
    </div>
</div>
<div id="import-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; padding:20px; box-sizing:border-box;">
    <h3 id="modal-title" style="text-align:center; color:#0f0;">匯入/編輯歌詞</h3>
    <p style="font-size:0.8rem; color:#888; text-align:center;">括號字 ( ) 會自動識別為應援詞</p>
    
    <textarea id="manualInput" style="width:100%; height:60vh; background:#111; color:#fff; border:1px solid #444; padding:15px; box-sizing:border-box; font-size:1.1rem; line-height:1.6; border-radius:10px; outline:none;" placeholder="在此貼上或修改歌詞..."></textarea>
    
    <div style="margin-top:20px; display:flex; gap:10px;">
        <button class="btn" style="flex:1; padding:15px; font-size:1rem; background:#0f0; color:#000; font-weight:bold; border:none;" onclick="handleManualSubmit()">✅ 確認並進入標記模式</button>
        <button class="btn" style="padding:15px; background:#444; border:none;" onclick="closeImporter()">取消</button>
    </div>
</div>
<input type="file" id="ocrInput" accept="image/*" style="display:none" onchange="handleOCR(event)">
    

<div id="editor-overlay">
    <h2 style="text-align:center;">點擊【應援詞】使其變綠色</h2>
    <div id="chips-container" style="text-align:center;"></div>
    <div class="editor-footer">
        <button class="btn" style="font-size: 1.2rem; padding: 15px 30px;" onclick="saveMarkedData()">✅ 完成生成</button>
        <button class="btn" style="margin-left: 10px;" onclick="document.getElementById('editor-overlay').style.display='none'">取消</button>
    </div>
</div>

<script>
    // Firebase 初始化
    const firebaseConfig = {
        apiKey: "AIzaSyCOnH-KJfJqe6VGn7qG2TU1rIaT5OEL9JU",
        authDomain: "fanchartpro.firebaseapp.com",
        projectId: "fanchartpro",
        storageBucket: "fanchartpro.firebasestorage.app",
        messagingSenderId: "94013254919",
        appId: "1:94013254919:web:929fff5cd2c71067b269a2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let songData = [{ l: "歡迎使用應援助手", f: "開始" }];
    let index = 0;
    let isLocked = false;

    // --- 雲端功能 ---
    async function uploadSong(e) {
        e.stopPropagation();
        if (songData.length < 1 || songData[0].f === "開始") {
            alert("請先匯入並標記歌詞再投稿！");
            return;
        }
        const songName = prompt("請按此格式填寫（最好根據YouTube官方命名）： 歌名 - 歌手");
        if (!songName) return;

        try {
            await db.collection("songs").add({
                name: songName,
                data: songData,
                status: "pending",
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("投稿成功！請等候管理員審核。");
        } catch (error) {
            alert("投稿失敗，請檢查網絡或 Config。");
        }
    }

    async function fetchPublicSongs(e) {
        if (e) e.stopPropagation();
        try {
            const snapshot = await db.collection("songs").where("status", "==", "public").get();
            if (snapshot.empty) {
                alert("暫時未有公開歌單。");
                return;
            }
            let list = "請選擇歌曲編號：\n";
            let songs = [];
            snapshot.forEach((doc, i) => {
                songs.push(doc.data());
                list += `${i + 1}. ${doc.data().name}\n`;
            });
            const choice = prompt(list);
            if (choice && songs[choice - 1]) {
                songData = songs[choice - 1].data;
                index = 0;
                updateUI();
            }
        } catch (error) {
            alert("讀取雲端失敗。");
        }
    }

// 打開視窗 (用於新匯入)
    function openImporter(e) {
        if(e) e.stopPropagation();
        document.getElementById('modal-title').innerText = "➕ 匯入新歌詞";
        document.getElementById('manualInput').value = ""; 
        document.getElementById('import-modal').style.display = 'block';
        songData = []; // 新匯入就清空舊數據
    }

    // 打開視窗 (用於編輯現有歌曲)
    function editCurrentSong(e) {
        e.stopPropagation();
        document.getElementById('modal-title').innerText = "✏️ 編輯現有歌詞";
        
        // 【修正位置】：只係將歌詞同應援詞就咁排埋一齊，完全唔好加額外括號
        // 咁樣當你進入標記模式時，inBracketScope 邏輯依然會認得原本歌詞入面帶有嘅括號
        let textFormat = songData.map(item => {
            if (item.f) {
                // 如果歌詞係 "..." 代表純應援，就只出應援詞
                // 否則就出「歌詞 + 空格 + 應援詞」
                return (item.l === "..." ? "" : item.l + " ") + item.f;
            }
            return item.l;
        }).join('\n');

        document.getElementById('manualInput').value = textFormat;
        document.getElementById('import-modal').style.display = 'block';
    }

    function closeImporter() {
        document.getElementById('import-modal').style.display = 'none';
    }

    // 統一處理送出內容
    function handleManualSubmit() {
        const input = document.getElementById('manualInput').value;
        if (input.trim()) {
            closeImporter();
            // 進入你原本最強的那個 startManualMarking
            startManualMarking(input);
        }
    }
        
    function startManualMarking(text) {
        const overlay = document.getElementById('editor-overlay');
        const container = document.getElementById('chips-container');
        const lines = text.split('\n');
        const posMap = {};
        songData.forEach(item => {
            if (item.marks) {
                if (!posMap[item.row]) posMap[item.row] = new Set();
                item.marks.forEach(m => posMap[item.row].add(m));
            }
        });

        let html = "";
        lines.forEach((line, rowIdx) => {
            if (line.trim() === "") return;
            html += `<div class="line-row" data-row="${rowIdx}" style="margin-bottom: 20px; border-bottom: 1px solid #222;">`;
            const words = line.split(/\s+/).filter(w => w !== "");
            let inBracket = false;
            words.forEach((w, chipIdx) => {
                if (/[\(\（\[]/.test(w)) inBracket = true;
                const isSaved = posMap[rowIdx] && posMap[rowIdx].has(chipIdx);
                const shouldHighlight = isSaved || inBracket;
                html += `<span onclick="this.classList.toggle('is-fc')" class="word-chip ${shouldHighlight ? 'is-fc' : ''}">${w}</span>`;
                if (/[\)\）\]]/.test(w)) inBracket = false;
            });
            html += `</div>`;
        });
        container.innerHTML = html;
        overlay.style.display = 'block';
    }

    function saveMarkedData() {
        const rows = document.querySelectorAll('.line-row');
        let newData = [];
        rows.forEach((row, rowIdx) => {
            const chips = row.querySelectorAll('.word-chip');
            let currentL = ""; let pendingF = []; let markedIndices = [];
            chips.forEach((chip, chipIdx) => {
                if (chip.classList.contains('is-fc')) {
                    pendingF.push(chip.innerText);
                    markedIndices.push(chipIdx);
                } else {
                    if (pendingF.length > 0) {
                        newData.push({ l: currentL.trim() || "...", f: pendingF.join(' '), row: rowIdx, marks: markedIndices });
                        currentL = ""; pendingF = []; markedIndices = [];
                    }
                    currentL += chip.innerText + " ";
                }
            });
            if (pendingF.length > 0) newData.push({ l: currentL.trim() || "...", f: pendingF.join(' '), row: rowIdx, marks: markedIndices });
            else if (currentL.trim()) newData.push({ l: currentL.trim(), f: "", row: rowIdx, marks: [] });
        });
        songData = newData; index = 0;
        document.getElementById('editor-overlay').style.display = 'none';
        updateUI();
    }
    
    function toggleLock(e) {
        e.stopPropagation();
        isLocked = !isLocked;
        const btn = document.getElementById('lockBtn');
        btn.innerText = isLocked ? "🔒 鎖定中" : "🔓 已解鎖";
        btn.style.borderColor = isLocked ? "red" : "#444";
    }

    function handleTap(e) {
        if (isLocked) return;
        const clickX = e.clientX || (e.touches && e.touches[0].clientX);
        if (clickX < window.innerWidth * 0.3) { if (index > 0) index--; }
        else { if (index < songData.length - 1) index++; else index = 0; }
        updateUI();
    }
    function formatLine(item) {
        if (!item) return "";
        // 如果歌詞係 "..." 隱藏佢，只顯示應援
        let lText = item.l === "..." ? "" : item.l;
        let fText = item.f ? `<span class="fc-text">${item.f}</span>` : "";
        return `${lText} ${fText}`.trim();
    }

    function updateUI() {
        if (!songData[index]) return;

        const prev = songData[index - 1];
        const curr = songData[index];
        const next = songData[index + 1];

        // 1. 顯示上一句 (連應援)
        document.getElementById('prevLine').innerHTML = prev ? formatLine(prev) : "";

        // 2. 顯示中間主句
        document.getElementById('currLyrics').innerText = curr.l;
        document.getElementById('currFanchant').innerText = curr.f;

        // 3. 顯示下一句 (連應援)
        document.getElementById('nextLine').innerHTML = next ? formatLine(next) : (index === songData.length - 1 ? "— 完 —" : "");

        // 儲存及震動
        localStorage.setItem('myConcertData', JSON.stringify(songData));
        if (curr.f && navigator.vibrate) navigator.vibrate(50);
    }
    // 觸發隱藏的顏色選擇器
    function triggerColorPicker(e) {
        if(e) e.stopPropagation();
        document.getElementById('favColor').click();
    }

    // 當用戶揀完色後執行
    function applyCustomColor(newColor) {
        // 套用顏色到 CSS 變數
        document.documentElement.style.setProperty('--fc-color', newColor);
        
        // 儲存顏色到本地，下次開返都係呢隻
        localStorage.setItem('fanchantColor', newColor);
    }
    // 打開顏色選單
    function openColorMenu(e) {
        if(e) e.stopPropagation();
        const currentColor = getComputedStyle(document.documentElement).getPropertyValue('--fc-color').trim();
        document.getElementById('hexInput').value = currentColor;
        document.getElementById('colorPicker').value = currentColor;
        document.getElementById('color-modal').style.display = 'block';
    }

    function closeColorMenu() {
        document.getElementById('color-modal').style.display = 'none';
    }
    
    // 當轉動顏色盤時，自動更新 HEX 文字框
    function updateHexInput(val) {
        document.getElementById('hexInput').value = val.toUpperCase();
    }
    
    // 按下「套用」時執行
    function saveCustomColor() {
        let newColor = document.getElementById('hexInput').value.trim();
        
        // 基本格式檢查，如果冇 # 就幫佢加返
        if (!newColor.startsWith('#')) newColor = '#' + newColor;
        
        // 檢查係咪有效嘅 HEX 格式
        if (/^#[0-9A-F]{6}$/i.test(newColor)) {
            document.documentElement.style.setProperty('--fc-color', newColor);
            localStorage.setItem('fanchantColor', newColor);
            closeColorMenu();
        } else {
            alert("請輸入有效的 HEX 格式 (例如: #00FF00)");
        }
    }    
    // 修改 window.onload 確保讀取到自定義顏色
    window.onload = function() {
        const saved = localStorage.getItem('myConcertData');
        if (saved) { songData = JSON.parse(saved); updateUI(); }
        
        const savedColor = localStorage.getItem('fanchantColor');
        if (savedColor) {
            document.documentElement.style.setProperty('--fc-color', savedColor);
            document.getElementById('favColor').value = savedColor; // 同步顏色盤個底色
        }
    };
</script>
</body>
</html>
