<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>應援助手 Cloud Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; touch-action: none; padding-top: env(safe-area-inset-top); }
        #app { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 5%; text-align: center; }
        .lyrics-container { display: flex; flex-direction: column; gap: 2vh; width: 100%; }
        :root { --fc-color: #0f0; }
        .fanchant { 
            /* 縮小字體：最高由 4.5rem 減至 3rem，最低由 1.5rem 減至 1.2rem */
            font-size: clamp(1.2rem, 5vh, 3rem); 
            
            /* 減輕粗細：由 900 (極粗) 改為 700 (粗) 或 600 */
            font-weight: 700; 
            
            color: var(--fc-color); 
            
            /* 減弱發光效果：只保留淡淡的陰影，唔好重疊幾層 shadow */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8); 
            
            white-space: normal; 
            line-height: 1.2;      /* 稍微增加行高，唔好咁迫 */
            display: block; 
            letter-spacing: 0px;   /* 恢復正常字距，唔好負數縮埋一齊 */
        }
        .lyrics { font-size: clamp(1rem, 3vh, 2rem); color: #bbb; margin-bottom: 3px; white-space: normal; line-height: 1.2; word-break: break-word; }
        .side-lyrics { font-size: clamp(0.8rem, 2.5vh, 1.5rem); color: #444; min-height: 2vh; transition: all 0.3s ease; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .side-lyrics .fc-text { color: var(--fc-color); filter: brightness(0.5); margin-left: 8px; }
        .btn-group { position: absolute; top: calc(10px + env(safe-area-inset-top)); right: 10px; display: flex; gap: 5px; z-index: 100; flex-wrap: wrap; justify-content: flex-end; }
        .btn { padding: 8px 12px; background: #222; border-radius: 5px; font-size: 0.7rem; border: 1px solid #444; color: #fff; cursor: pointer; user-select: none; }
        #main-photo-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2500; justify-content: center; align-items: center; touch-action: none; overflow: hidden; }
        #main-photo-img { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.2s ease-out; pointer-events: none; will-change: transform; }
        .close-photo-btn { position: absolute; top: 20px; right: 20px; font-size: 2rem; color: #fff; background: rgba(0,0,0,0.5); border-radius: 50%; width: 50px; height: 50px; text-align: center; line-height: 50px; cursor: pointer; z-index: 2600; }
        #editor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 999; padding: 20px; box-sizing: border-box; overflow-y: auto; display: none; }
        .word-chip { 
            display: inline-block; 
            padding: 6px 10px;      /* 縮細少少 padding */
            margin: 4px;            /* 稍微減少 margin */
            border: 1px solid #333; 
            border-radius: 4px; 
            cursor: pointer; 
            color: #999;            /* 未選中時顏色暗啲 */
            font-size: 0.9rem;      /* 固定大細，唔好太大 */
        }
        
        .word-chip.is-fc { 
            background: transparent; /* ✨ 改用透明背景 */
            color: var(--fc-color);  /* ✨ 文字變綠色就好 */
            font-weight: bold; 
            border-color: var(--fc-color); 
            box-shadow: none;        /* ✨ 移除發光，改用淡淡的邊框色就好 */
        }
    </style>
</head>
    
<body>
<div id="app" onclick="handleTap(event)">
    <div class="btn-group">
        <div class="btn" style="background:#444;" onclick="location.reload()">🔄</div>
        <div id="mainViewPhotoBtn" class="btn" style="display:none; background:#444;" onclick="showMainPhoto(event)">🖼️</div>
        <div id="mainViewLinkBtn" class="btn" style="display:none; background:#0055aa;" onclick="openSourceLink(event)">🔗</div>
        <div class="btn" onclick="openColorMenu(event)">🎨</div>
        <div class="btn" onclick="fetchPublicSongs(event)">📂</div>
        <div class="btn" onclick="openImporter(event)">➕</div>
        <div class="btn" onclick="uploadSong(event)">☁️</div>
        <div class="btn" onclick="editCurrentSong(event)">✏️</div>
        <div id="lockBtn" class="btn" onclick="toggleLock(event)">🔓</div>
    </div>
    <div class="lyrics-container">
        <div class="side-lyrics" id="prevLine"></div>
        <div class="main-focus" style="padding: 20px 0; transform: scale(1.1);">
            <div class="lyrics" id="currLyrics">載入中...</div>
            <div class="fanchant" id="currFanchant"></div>
        </div>
        <div class="side-lyrics" id="nextLine"></div>
    </div>
</div>

<div id="main-photo-overlay">
    <div class="close-photo-btn" onclick="hideMainPhoto()">×</div>
    <img id="main-photo-img" src="" alt="應援參考圖">
</div>

<div id="color-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#222; padding:20px; border-radius:15px; z-index:2000; border:1px solid #444; width:250px; text-align:center;">
    <h4 style="margin:0 0 15px 0;">自定義顏色</h4>
    <input type="color" id="colorPicker" onchange="updateHexInput(this.value)" style="width:100%; height:40px; border:none; background:none; cursor:pointer;">
    <div style="margin:15px 0;">
        <label style="font-size:0.8rem; color:#888;">HEX Code:</label>
        <input type="text" id="hexInput" style="width:100%; background:#111; color:#fff; border:1px solid #555; padding:8px; border-radius:5px; margin-top:5px; text-align:center; font-family:monospace;">
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn" style="flex:1; background:#0f0; color:#000; font-weight:bold;" onclick="saveCustomColor()">套用</button>
        <button class="btn" style="flex:1;" onclick="closeColorMenu()">取消</button>
    </div>
</div>

<div id="import-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; padding:20px; box-sizing:border-box; overflow-y:auto;">
    
    <div style="position: sticky; top: -20px; background: rgba(0,0,0,0.95); z-index: 1100; padding: 15px 0; border-bottom: 1px solid #333; margin-bottom: 15px; margin-top: -20px; text-align: center;">
        <h3 id="modal-title" style="color:#0f0; margin: 5px 0;">編輯歌詞</h3>
        <div style="display: flex; gap: 10px; justify-content: center; align-items: center;">
            <button id="importViewPhotoBtn" class="btn" style="background:#444; display:none;" onclick="showMainPhoto(event)">🖼️ 睇參考圖</button>
            <button id="importRemovePhotoBtn" class="btn" style="background:#800; display:none; font-size:0.7rem;" onclick="removePhoto()">❌ 移除相片</button>
        </div>
    </div>

    <textarea id="manualInput" style="width:100%; height:50vh; background:#111; color:#fff; border:1px solid #444; padding:15px; border-radius:10px; font-size:1rem; box-sizing:border-box; margin-bottom: 15px;" placeholder="括號 () 內文字會自動變應援色..."></textarea>
    
    <div style="margin-bottom: 20px;">
        <input type="text" id="sourceLinkInput" style="width:100%; background:#111; color:#0f0; border:1px solid #444; padding:12px; border-radius:5px; box-sizing:border-box; font-size:0.8rem;" placeholder="🔗 貼上來源網址 (YouTube/歌詞網)...">
    </div>

    <div style="display:flex; gap:10px; flex-wrap:wrap; padding-bottom: 30px;">
        <button class="btn" style="flex:2; padding:15px; background:#0f0; color:#000; font-weight:bold;" onclick="handleManualSubmit()">✅ 確認並標記</button>
        <button class="btn" style="flex:1; padding:15px;" onclick="document.getElementById('refInput').click()">📷 附相</button>
        <button class="btn" style="flex:1; padding:15px; background:#444;" onclick="closeImporter()">取消</button>
    </div>
    
    <input type="file" id="refInput" accept="image/*" style="display:none" onchange="previewRefImage(event)">
</div>
<div id="public-songs-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; padding:20px; box-sizing:border-box; overflow-y:auto;">
    </div>

<div id="editor-overlay">
    <div style="position: sticky; top: 0; background: #111; z-index: 1000; padding: 10px 0; border-bottom: 1px solid #333; margin-bottom: 20px;">
        <h2 style="text-align:center; margin: 0 0 10px 0; font-size: 1.2rem;">點擊【應援詞】使其變色</h2>
        <div style="text-align:center;">
            <button id="editorPhotoBtn" class="btn" style="background:#444; display:none; padding: 10px 20px;" onclick="showMainPhoto(event)">🖼️ 睇參考圖</button>
        </div>
    </div>
    
    <div id="chips-container" style="text-align:center;"></div>
    
    <div style="text-align:center; margin-top:30px; padding-bottom:50px;">
        <button class="btn" style="font-size: 1.2rem; padding: 15px 30px; background:#0f0; color:#000;" onclick="saveMarkedData()">✅ 完成生成</button>
        <button class="btn" style="font-size: 1.2rem; padding: 15px 30px; background:#444;" onclick="cancelMarking()">❌ 取消</button>
    </div>
</div>
    
<div id="footer-info" onclick="handleAdminTrigger()" style="position: fixed; bottom: env(safe-area-inset-bottom); left: 0; width: 100%; padding: 15px 0; background: linear-gradient(transparent, rgba(0,0,0,0.9) 70%); color: #555; font-size: 0.8rem; text-align: center; z-index: 50; user-select: none;">
    <div id="display-song-name" style="font-weight: bold; color: #666;">應援助手 Fanchant Helper</div>
    <div id="display-upload-info" style="font-size: 0.65rem; margin-top: 3px; color: #444;"></div>
</div>
<script>
    // --- 原有 Firebase 配置 (請保持原樣) ---
    const firebaseConfig = { apiKey: "AIzaSyCOnH-KJfJqe6VGn7qG2TU1rIaT5OEL9JU", authDomain: "fanchartpro.firebaseapp.com", projectId: "fanchartpro", storageBucket: "fanchartpro.firebasestorage.app", messagingSenderId: "94013254919", appId: "1:94013254919:web:929fff5cd2c71067b269a2" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let songData = [{ l: "歡迎使用應援助手", f: "開始" }];
    let index = 0;
    let isLocked = false;
    let tempPhotoData = ""; // 用來編輯時臨時儲存相片

    // --- 相片顯示與縮放 (修復 Chrome & Samsung) ---
    let scale = 1, posX = 0, posY = 0, isDragging = false, startX, startY;

function showMainPhoto(e) {
    if(e) e.stopPropagation();
    
    // 優先：讀取匯入/編輯時嘅臨時相片 (tempPhotoData)
    // 次之：讀取當前歌曲第一行嘅相片
    let photoToShow = tempPhotoData;
    if (!photoToShow) {
        const currSong = getFirstLineData();
        if (currSong && currSong.photo) photoToShow = currSong.photo;
    }

    if(!photoToShow) {
        alert("未附上相片或相片未載入。");
        return;
    }
    
    scale = 1; posX = 0; posY = 0;
    const img = document.getElementById('main-photo-img');
    img.src = photoToShow; // 載入啱嘅相
    img.style.transform = `translate(0px, 0px) scale(1)`;
    document.getElementById('main-photo-overlay').style.display = 'flex';
}

    function hideMainPhoto() { document.getElementById('main-photo-overlay').style.display = 'none'; }

    // 獲取當前歌曲嘅「元數據」（例如相片）
    function getFirstLineData() { return songData[0]; }

    // 手勢監聽器
    const overlay = document.getElementById('main-photo-overlay');
    overlay.addEventListener('touchstart', (e) => { if (e.touches.length === 1) { isDragging = true; startX = e.touches[0].clientX - posX; startY = e.touches[0].clientY - posY; } }, { passive: false });
    overlay.addEventListener('touchmove', (e) => { if (!isDragging) return; if (scale > 1) e.preventDefault(); posX = e.touches[0].clientX - startX; posY = e.touches[0].clientY - startY; document.getElementById('main-photo-img').style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }, { passive: false });
    overlay.addEventListener('touchend', (e) => { isDragging = false; const currentTime = new Date().getTime(); const tapLength = currentTime - (window.lastTap || 0); if (tapLength < 300 && tapLength > 0) { scale = (scale === 1) ? 2.5 : 1; if (scale === 1) { posX = 0; posY = 0; } document.getElementById('main-photo-img').style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; e.preventDefault(); } window.lastTap = currentTime; });

    // --- 編輯與圖片處理 ---
    function openImporter(e) {
        if(e) e.stopPropagation();
        document.getElementById('modal-title').innerText = "➕ 匯入新歌詞";
        document.getElementById('manualInput').value = ""; 
        tempPhotoData = ""; // 清空臨時圖片
        updateEditPreview();
        document.getElementById('import-modal').style.display = 'block';
    }

    function editCurrentSong(e) {
        e.stopPropagation();
        document.getElementById('modal-title').innerText = "✏️ 編輯現有歌詞";
    
        let text = songData.map(item => {
            let line = "";
            if (item.l && item.l !== "...") line += item.l + " ";
            if (item.f) line += item.f; 
            return line.trim();
        }).join('\n');
    
        document.getElementById('manualInput').value = text;
        
        // --- 新增：讀取 Link ---
        const currSong = getFirstLineData();
        document.getElementById('sourceLinkInput').value = currSong.link || "";
        
        tempPhotoData = currSong.photo || "";
        updateEditPreview();
        document.getElementById('import-modal').style.display = 'block';
    }
    function closeImporter() { document.getElementById('import-modal').style.display = 'none'; }

    // 編輯時預覽圖片
// 編輯/匯入時預覽圖片
function updateEditPreview() {
    const importPhotoBtn = document.getElementById('importViewPhotoBtn');
    const importRemoveBtn = document.getElementById('importRemovePhotoBtn');

    if (tempPhotoData) { 
        // 有相時：顯示「睇參考圖」同「移除」掣
        if(importPhotoBtn) importPhotoBtn.style.display = 'inline-block';
        if(importRemoveBtn) importRemoveBtn.style.display = 'inline-block';
    } else { 
        // 冇相時：全部隱藏
        if(importPhotoBtn) importPhotoBtn.style.display = 'none';
        if(importRemoveBtn) importRemoveBtn.style.display = 'none';
    }
}

    // 處理上傳相片 (Base64)
// --- 強化版：自動壓縮相片，解決手機 LocalStorage 爆容量問題 ---
function previewRefImage(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            // 建立畫布進行壓縮
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            // 如果張相太大，限制最大寬度為 1200px (貓紙夠睇有餘)
            const max_size = 1200;
            if (width > height) {
                if (width > max_size) {
                    height *= max_size / width;
                    width = max_size;
                }
            } else {
                if (height > max_size) {
                    width *= max_size / height;
                    height = max_size;
                }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            // 輸出壓縮後的 Base64 (質量設為 0.7)
            tempPhotoData = canvas.toDataURL('image/jpeg', 0.7); 
            
            // 更新編輯器預覽
            updateEditPreview();
            console.log("相片已壓縮，宜家大細約:", Math.round(tempPhotoData.length / 1024), "KB");
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

    // 移除圖片
    function removePhoto() { tempPhotoData = ""; updateEditPreview(); }


function handleManualSubmit() {
    // 1. 抓取歌詞
    const lyricsText = document.getElementById('manualInput').value;
    if (!lyricsText || lyricsText.trim() === "") {
        alert("請先輸入歌詞！");
        return;
    }

    // 2. 獲取歌名：
    // 優先序：如果 modal 標題寫住編輯 -> 嘗試抓取主畫面的歌名 -> 最後才彈 prompt
    const modalTitle = document.getElementById('modal-title').innerText;
    const isEditMode = modalTitle.includes("編輯");
    let name = "";

    if (isEditMode) {
        // 直接從底部的 display-song-name 抓取現有歌名，最準確
        name = document.getElementById('display-song-name').innerText;
        // 如果抓到的是預設字眼，就還是問一下
        if (name === "應援助手 Fanchant Helper") name = prompt("請輸入[歌名 - 歌手]：");
    } else {
        name = prompt("請輸入[歌名 - 歌手]：");
    }

    if (!name) return;

    // 3. 儲存數據供稍後上傳使用
    window.currentSubmittingData = { name: name };

    // 4. ✨ 解決問題二：關閉輸入畫面，開啟標記畫面 ✨
    document.getElementById('import-modal').style.display = 'none'; // 讓輸入框消失
    startManualMarking(lyricsText); // 讓標記畫面出現
}

    // --- 標記與儲存 ---
function startManualMarking(text) {
    const container = document.getElementById('chips-container');
    
    // 處理相片按鈕
    const editorBtn = document.getElementById('editorPhotoBtn');
    if (tempPhotoData && editorBtn) {
        editorBtn.style.display = 'inline-block';
    } else if (editorBtn) {
        editorBtn.style.display = 'none';
    }

    const lines = text.split('\n');
    let html = "";

    lines.forEach((line, rowIdx) => {
        if (line.trim() === "") return;
        html += `<div class="line-row" data-row="${rowIdx}" style="margin-bottom:15px; border-bottom:1px solid #222;">`;
        
        const words = line.split(/\s+/).filter(w => w !== "");
        
        // 搵返原本呢一行嘅應援詞數據 (如果有的話)
        const originalFanchant = (songData[rowIdx] && songData[rowIdx].f) ? songData[rowIdx].f.split(/\s+/) : [];

        words.forEach(w => {
            // 修正邏輯：如果呢粒字喺原本嗰行嘅 f 入面出現過，就預設變色
            const isPreviouslyMarked = originalFanchant.includes(w);
            
            html += `<span onclick="this.classList.toggle('is-fc')" class="word-chip ${isPreviouslyMarked ? 'is-fc' : ''}">${w}</span>`;
        });
        html += `</div>`;
    });
    
    container.innerHTML = html;
    document.getElementById('editor-overlay').style.display = 'block';
}
function cancelMarking() {
    // 直接隱藏標記畫面，唔執行 saveMarkedData，所以原本嘅數據唔會被覆蓋
    document.getElementById('editor-overlay').style.display = 'none';
}
    
function saveMarkedData() {
    const rows = document.querySelectorAll('.line-row');
    const sourceLink = document.getElementById('sourceLinkInput').value.trim(); 
    let newData = [];

    rows.forEach(row => {
        const chips = row.querySelectorAll('.word-chip');
        let currentL = ""; let pendingF = [];
        chips.forEach(chip => {
            if (chip.classList.contains('is-fc')) { pendingF.push(chip.innerText); }
            else {
                if (pendingF.length > 0) {
                    newData.push({ l: currentL.trim() || "...", f: pendingF.join(' ') });
                    currentL = ""; pendingF = [];
                }
                currentL += chip.innerText + " ";
            }
        });
        if (pendingF.length > 0 || currentL.trim()) newData.push({ l: currentL.trim() || "...", f: pendingF.join(' ') });
    });

    if (newData.length > 0) {
        if (tempPhotoData) newData[0].photo = tempPhotoData;
        if (sourceLink) newData[0].link = sourceLink; 
    }

    // ✨ 只更新本地變數同 UI
    songData = newData;
    index = 0;
    document.getElementById('editor-overlay').style.display = 'none';
    closeImporter();
    updateUI();
    // ✨ 新增：更新底端的歌名顯示 ✨
    const info = window.currentSubmittingData || {};
    if (info.name) {
        // 1. 更新歌名
        document.getElementById('display-song-name').innerText = info.name;
        
        // 2. 處理作者名 (根據是否有前作者決定點顯示)
        const uploadInfoEl = document.getElementById('display-upload-info');
        
        // 假設 info.uploader 係剛才 prompt 攞到嘅新名 (或者你預設咗係 "本地編輯者")
        const newEditor = "本地編輯者"; 
        
        // 攞返原本顯示緊嘅作者名 (如果有)
        // 假設原本格式係 "作者: XXX" 或者 "Uploader: XXX"
        let oldUploader = uploadInfoEl.innerText.replace("作者: ", "").replace("Uploader: ", "").trim();

        if (oldUploader && oldUploader !== "" && oldUploader !== "本地編輯中") {
            // 如果有舊作者，用 - 連接
            uploadInfoEl.innerText = `作者: ${oldUploader} - ${newEditor}`;
        } else {
            // 如果係全新或者原本冇名，就單獨顯示新編輯者
            uploadInfoEl.innerText = `作者: ${newEditor}`;
        }
    }
    console.log("本地預覽已更新");
}
    async function sendDiscordNotification(name, source, id) {
    try {
        const adminDoc = await db.collection("admin_config").doc("security").get();
        const webhookURL = adminDoc.data().discord_webhook;
        if (!webhookURL) return;

        fetch(webhookURL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                username: "應援助手投稿機",
                embeds: [{
                    title: "🆕 收到新歌投稿/編輯！",
                    color: 65280,
                    fields: [
                        { name: "歌名", value: name, inline: true },
                        { name: "來源", value: source || "無", inline: false }
                    ],
                    footer: { text: `ID: ${id}` }
                }]
            })
        });
    } catch (e) { console.error("Discord 通知失敗", e); }
}
    // --- 核心邏輯 ---
async function fetchPublicSongs(e) {
    if (e) e.stopPropagation();
    
    try {
        // 抓取所有已公開的歌，按時間倒序排
        const snapshot = await db.collection("songs")
            .where("status", "==", "public")
            .orderBy("createdAt", "desc")
            .get();

        const songsGroupedByName = {};

        snapshot.forEach(doc => {
            const data = doc.data();
            const name = data.name;
            if (!songsGroupedByName[name]) {
                songsGroupedByName[name] = [];
            }
            songsGroupedByName[name].push({ id: doc.id, ...data });
        });

        // 呼叫顯示歌單的 UI，傳入分組後的資料
        showSongGroupList(songsGroupedByName);

    } catch (err) {
        console.error("抓取歌單失敗", err);
        alert("無法載入歌單");
    }
}
    
function showSongGroupList(groupedData) {
    let html = '<div style="padding:20px; color:#fff;"><h3>選擇歌曲</h3><ul style="list-style:none; padding:0;">';
    
    Object.keys(groupedData).forEach(name => {
        const versions = groupedData[name];
        // 點擊後跳到第二層選單，傳入該歌名的所有版本
        html += `
            <li onclick='showVersionSelector(${JSON.stringify(versions).replace(/'/g, "&apos;")})' 
                style="padding:15px; border-bottom:1px solid #333; cursor:pointer; display:flex; justify-content:space-between;">
                <span>${name}</span>
                <span style="color:#666; font-size:0.8rem;">${versions.length} 個版本 ></span>
            </li>`;
    });
    
    html += '</ul><button class="btn" onclick="closeModal()">關閉</button></div>';
    
    // 假設你有一個顯示內容的 Modal Container
    const modal = document.getElementById('public-songs-modal'); 
    if (modal) {
        modal.innerHTML = html;
        modal.style.display = 'block';
    } else {
        console.error("找不到 ID 為 public-songs-modal 的元素！");
    }
}
function closeModal() {
    const modal = document.getElementById('public-songs-modal');
    if (modal) modal.style.display = 'none';
}    
function showVersionSelector(versions) {
    let html = `<div style="padding:20px;"><h3>選擇版本 - ${versions[0].name}</h3><ul style="list-style:none; padding:0;">`;
    
    // 已經在 fetch 嗰陣按 createdAt 排咗序，所以直接顯示就係倒序
    versions.forEach(v => {
        const date = v.createdAt ? new Date(v.createdAt.seconds * 1000).toLocaleDateString() : "未知日期";
        html += `
            <li onclick="loadSpecificSong('${v.id}')" 
                style="padding:15px; border-bottom:1px solid #444; cursor:pointer;">
                <div style="color:#0f0;">作者: ${v.uploader || '匿名'}</div>
                <div style="font-size:0.7rem; color:#666;">上傳日期: ${date}</div>
            </li>`;
    });
    
    html += `</ul><button class="btn" onclick="fetchPublicSongs()"> < 返回歌曲列表</button></div>`;
    
    document.getElementById('public-songs-modal').innerHTML = html;
}
    
async function loadSpecificSong(docId) {
    try {
        const doc = await db.collection("songs").doc(docId).get();
        if (doc.exists) {
            const data = doc.data();
            
            // 1. 更新全域變數
            songData = data.data; 

            // 2. ✨ 重點：手動更新畫面最下方嘅文字 ✨
            // 確保 ID 'display-song-name' 同 'display-upload-info' 同你 HTML 係一樣嘅
            const nameEl = document.getElementById('display-song-name');
            const infoEl = document.getElementById('display-upload-info');

            console.log("正在載入：", data.name)
            if (nameEl) nameEl.innerText = data.name || "未命名";
            if (infoEl) infoEl.innerText = `作者: ${data.uploader || '匿名'}`;

            // 3. 儲存目前歌名到暫存，方便下次編輯或上傳時自動填寫
            window.currentSubmittingData = { name: data.name };

            // 4. 關閉選單並重置 index 更新畫面
            closeModal(); // 關閉嗰個分層歌單
            index = 0;
            updateUI(); // 呼叫你原本渲染歌詞嘅 function
            
        }
    } catch (err) {
        console.error("載入失敗", err);
        alert("載入失敗");
    }
}
    
    
function closeSongList() {
    document.getElementById('song-list-overlay').style.display = 'none';
}
// 點擊歌名載入歌曲
async function selectSong(docId) {
    try {
        const doc = await db.collection("songs").doc(docId).get();
        const selected = doc.data();
        
        songData = selected.data;
        songData.meta = {
            name: selected.name,

        };

}

// 點擊垃圾桶刪除（管理員用）
async function adminDeletePublic(docId, songName) {
    const pw = prompt(`確定要刪除「${songName}」嗎？\n請輸入管理員密碼：`);
    if (pw === null) return;

    try {
        // 1. 從 Database 讀取所有安全設定 (密碼同 Discord Link)
        const adminDoc = await db.collection("admin_config").doc("security").get();
        const adminData = adminDoc.data();
        const correctPw = adminData.password;
        const webhookURL = adminData.discord_webhook; // ✨ 喺 Database 攞 Link

        if (pw === correctPw) {
            await db.collection("songs").doc(docId).delete();
            alert("🗑️ 該歌曲已永久刪除。");
            fetchPublicSongs();
        } else {
            const reason = prompt("密碼不正確。如果您想建議刪除此歌，請輸入原因：");
            
            if (reason && reason.trim() !== "") {
                // 儲存紀錄
                await db.collection("delete_requests").add({
                    songId: docId,
                    songName: songName,
                    reason: reason,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 2. ✨ 檢查有無 Webhook URL 先至發送
                if (webhookURL) {
                    const discordMsg = {
                        username: "應援助手管理員",
                        embeds: [{
                            title: "🚨 收到刪除建議！",
                            color: 16711680,
                            fields: [
                                { name: "歌曲名稱", value: songName, inline: true },
                                { name: "建議原因", value: reason, inline: false }
                            ]
                        }]
                    };

                    fetch(webhookURL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(discordMsg)
                    });
                }

                alert("感謝您的意見！通知已發送。");
            }
        }
    } catch (e) {
        console.error(e);
        alert("操作失敗。");
    }
}
async function uploadSong(e) {
    e.stopPropagation();
    if (songData.length < 1 || songData[0].f === "開始") { 
        alert("請先匯入歌詞！"); 
        return; 
    }
    
    // ✨ 改進：嘗試攞返之前入過嘅歌名，如果冇就用現時底端顯示嘅名
    const defaultName = window.currentSubmittingData?.name || document.getElementById('display-song-name').innerText;
    
    // 第一個 prompt 依家會預填個名 (第二個參數就係預填內容)
    const songName = prompt("【第一步】填寫格式：歌名 - 歌手", defaultName);
    if (!songName) return;
    
    const uploaderName = prompt("【第二步】你的暱稱 (會顯示喺底端)：");
    if (!uploaderName) return;

    try {
        const docRef = await db.collection("songs").add({ 
            name: songName, 
            uploader: uploaderName, 
            data: songData, 
            status: "pending", 
            createdAt: firebase.firestore.FieldValue.serverTimestamp() 
        });

        alert("投稿成功！請等候管理員審核。");

        // 發送 Discord 通知
        sendDiscordNotification(songName, uploaderName, docRef.id);

    } catch (e) {
        console.error(e);
        alert("投稿失敗。");
    }
}

// 抽離出嚟嘅 Discord 通知 Function (放喺 script 任何地方都得)
// ------------------------------------------------
async function sendDiscordNotification(songName, uploader, docId) {
    try {
        // 從資料庫攞返之前收埋嘅 Webhook URL
        const adminDoc = await db.collection("admin_config").doc("security").get();
        const webhookURL = adminDoc.data().discord_webhook;

        if (webhookURL) {
            fetch(webhookURL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: "應援助手投稿機",
                    embeds: [{
                        title: "🆕 收到新歌投稿！",
                        color: 65280, // 綠色
                        fields: [
                            { name: "歌曲名稱", value: songName, inline: true },
                            { name: "投稿者", value: uploader, inline: true },
                            { name: "Firebase ID", value: docId, inline: false }
                        ],
                        footer: { text: "請進入管理後台審核" },
                        timestamp: new Date().toISOString()
                    }]
                })
            });
        }
    } catch (err) {
        console.error("Discord 通知發送失敗", err);
    }
}

async function showAdminPanel() {
    try {
        const snapshot = await db.collection("songs")
                                 .where("status", "==", "pending")
                                 .get();
        
        if (snapshot.empty) {
            alert("暫時冇待審核嘅歌。");
            return;
        }

        let listText = "【待審核清單】\n";
        let pendingSongs = [];
        
        let i = 0; // 手動加個計數器
        snapshot.forEach((doc) => {
            const data = doc.data();
            pendingSongs.push({ id: doc.id, name: data.name, data: data.data, uploader: data.uploader });
            listText += `${i + 1}. ${data.name}\n`;
            i++; // 每次加 1
        });
        const choice = prompt(listText + "\n輸入編號進行預覽：");
        const selected = pendingSongs[choice - 1];

        if (selected) {
            // 1. 載入數據到 UI
            songData = selected.data; 
            songData.meta = { 
                name: selected.name, 
                uploader: selected.uploader || "未知" 
            };
            index = 0;
            updateUI(); 
            
            // 2. 唔好用 confirm，改為顯示一個自定義嘅審核工具列
            showAuditBar(selected.id, selected.name);
        }
    } catch (e) {
        alert("讀取失敗。");
    }
}
function showAuditBar(docId, songName) {
    // 如果已經有浮窗就先拎走
    const oldBar = document.getElementById('audit-bar');
    if (oldBar) oldBar.remove();

    const bar = document.createElement('div');
    bar.id = 'audit-bar';
    bar.style = `
        position: fixed; bottom: 0; left: 0; width: 100%; 
        background: rgba(0, 100, 0, 0.9); color: white; 
        padding: 20px; text-align: center; z-index: 3000;
        box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        display: flex; flex-direction: column; gap: 10px;
    `;
    
    bar.innerHTML = `
        <div style="font-weight:bold;">審核預覽中：${songName}</div>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn" style="background:#0f0; color:#000; flex:1;" onclick="finalizeApproval('${docId}', '${songName}')">✅ 公開此歌</button>
            <button class="btn" style="background:#f00; color:#fff; flex:1;" onclick="deletePending('${docId}', '${songName}')">🗑️ 刪除</button>
            <button class="btn" style="background:#444; color:#fff; flex:1;" onclick="document.getElementById('audit-bar').remove()">❌ 關閉</button>
        </div>
    `;
    document.body.appendChild(bar);
}

// 執行公開
async function finalizeApproval(docId, songName) {
    if (confirm(`確定公開「${songName}」？`)) {
        await db.collection("songs").doc(docId).update({ status: "public" });
        alert("已公開！");
        document.getElementById('audit-bar').remove();
    }
}

// 執行刪除 (可選：如果係垃圾投稿可以直接刪)
async function deletePending(docId, songName) {
    if (confirm(`確定要刪除「${songName}」？此動作不能撤銷。`)) {
        await db.collection("songs").doc(docId).delete();
        alert("已刪除！");
        document.getElementById('audit-bar').remove();
    }
}
    // 獨立出來的批准 function
    async function approveSong(docId, songName) {
        try {
            await db.collection("songs").doc(docId).update({
                status: "public"
            });
            alert(`✅ 「${songName}」已正式公開！`);

    function handleTap(e) {
        if (isLocked) return;
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        if (x < window.innerWidth * 0.3) { if (index > 0) index--; }
        else { if (index < songData.length - 1) index++; else index = 0; }
        updateUI();
    }


 function updateUI() {
    const curr = songData[index];
    const format = (item) => item ? `${item.l === "..." ? "" : item.l} <span class="fc-text">${item.f}</span>` : "";
    document.getElementById('prevLine').innerHTML = format(songData[index-1]);
    document.getElementById('currLyrics').innerText = curr.l;
    document.getElementById('currFanchant').innerText = curr.f;
    document.getElementById('nextLine').innerHTML = songData[index+1] ? format(songData[index+1]) : (index === songData.length-1 ? "— 完 —" : "");
    
    // --- 更新底端資訊 ---
    const footerName = document.getElementById('display-song-name');
    const footerUpload = document.getElementById('display-upload-info');
    
    if (songData.meta) {
        footerName.innerText = songData.meta.name;
        footerUpload.innerText = `Uploaded by: ${songData.meta.uploader}`;
    } else {
        footerName.innerText = "應援助手 Fanchant Helper";
        footerUpload.innerText = "";
    }

    if (curr.f && navigator.vibrate) navigator.vibrate(50);
    try {
        localStorage.setItem('myConcertData', JSON.stringify(songData));
    } catch (e) { console.error("Save Error", e); }
    updateMainViewBtn();
}

let adminClickCount = 0;

function handleAdminTrigger() {
    adminClickCount++;
    if (adminClickCount >= 5) {
        adminClickCount = 0; // reset
        adminLogin();
    }
    // 3秒後自動重設次數，費事平時誤觸
    setTimeout(() => { adminClickCount = 0; }, 3000);
}
async function adminLogin() {
    const userInput = prompt("請輸入管理員金鑰：");
    if (!userInput) return;

    try {
        // 嘗試去 Firebase 讀取那個名為 security 的文件
        const doc = await db.collection("admin_config").doc("security").get();
        
        if (doc.exists) {
            const correctPassword = doc.data().password;

            if (userInput === correctPassword) {
                showAdminPanel(); // 密碼正確，進入審核面板
            } else {
                alert("金鑰無效！");
            }
        } else {
            alert("系統設定錯誤，請檢查 Firebase 資料。");
        }
    } catch (error) {
        console.error(error);
        alert("權限不足或連線失敗");
    }
}

    // --- 修改 window.onload：統一讀取 myConcertData ---

        // 1. 讀取上次儲存的歌詞數據 (內含圖片)

            document.documentElement.style.setProperty('--fc-color', savedColor);
        }
    };
