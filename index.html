<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>應援助手 Cloud Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/tesseract.js@v4.1.1/dist/tesseract.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; touch-action: none; }
        #app { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 10%; text-align: center; }
        .next-preview { color: #444; font-size: 0.9rem; margin-bottom: 20px; }
        .lyrics { font-size: 1.4rem; color: #bbb; margin-bottom: 10px; }
        .fanchant { font-size: 3.5rem; font-weight: 900; color: #0f0; text-shadow: 0 0 15px #0f0; }
        .btn-group { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; z-index: 100; flex-wrap: wrap; justify-content: flex-end; }
        .btn { padding: 8px 12px; background: #222; border-radius: 5px; font-size: 0.7rem; border: 1px solid #444; color: #fff; cursor: pointer; }
        #editor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 999; padding: 20px; box-sizing: border-box; overflow-y: auto; display: none; }
        .word-chip { display: inline-block; padding: 8px 12px; margin: 5px; border: 1px solid #444; border-radius: 4px; cursor: pointer; color: #ccc; }
        .word-chip.is-fc { background: #0f0; color: #000; font-weight: bold; border-color: #0f0; box-shadow: 0 0 10px #0f0; }
        .editor-footer { margin-top: 30px; padding-bottom: 50px; text-align: center; }
    </style>
</head>
<body>

<div id="app" onclick="handleTap(event)">
    <div class="btn-group">
        <div class="btn" onclick="fetchPublicSongs(event)">📂 歌單</div>
        <div class="btn" onclick="openImporter(event)">➕ 匯入</div>
        <div class="btn" onclick="uploadSong(event)">☁️ 投稿</div>
        <div class="btn" onclick="editCurrentSong(event)">✏️ 編輯</div>
        <div id="lockBtn" class="btn" onclick="toggleLock(event)">🔓 已解鎖</div>
    </div>
    <div class="next-preview" id="nextText">Next: ---</div>
    <div class="lyrics" id="currLyrics">載入中...</div>
    <div class="fanchant" id="currFanchant"></div>
</div>
    
<div id="import-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; padding:20px; box-sizing:border-box;">
    <h3 style="text-align:center;">選擇匯入方式</h3>
    <textarea id="manualInput" style="width:100%; height:200px; background:#222; color:#fff; border:1px solid #444; padding:10px; box-sizing:border-box;" placeholder="在此貼上歌詞..."></textarea>
    
    <div style="display:flex; gap:10px; margin-top:15px;">
        <button class="btn" style="flex:1; padding:15px;" onclick="handleManualSubmit()">📝 確認文字匯入</button>
        <button class="btn" style="flex:1; padding:15px; background:#0055ff;" onclick="triggerOCR()">📷 相片 OCR 識別</button>
    </div>
    <button class="btn" style="width:100%; margin-top:10px; background:none; border:none; color:#888;" onclick="closeImporter()">取消</button>
</div>

<input type="file" id="ocrInput" accept="image/*" style="display:none" onchange="handleOCR(event)">
    

<div id="editor-overlay">
    <h2 style="text-align:center;">點擊【應援詞】使其變綠色</h2>
    <div id="chips-container" style="text-align:center;"></div>
    <div class="editor-footer">
        <button class="btn" style="font-size: 1.2rem; padding: 15px 30px;" onclick="saveMarkedData()">✅ 完成生成</button>
        <button class="btn" style="margin-left: 10px;" onclick="document.getElementById('editor-overlay').style.display='none'">取消</button>
        <div class="btn" onclick="triggerOCR()">📷 相片</div>
        <input type="file" id="ocrInput" accept="image/*" style="display:none" onchange="handleOCR(event)">
    </div>
</div>

<script>
    // Firebase 初始化
    const firebaseConfig = {
        apiKey: "AIzaSyCOnH-KJfJqe6VGn7qG2TU1rIaT5OEL9JU",
        authDomain: "fanchartpro.firebaseapp.com",
        projectId: "fanchartpro",
        storageBucket: "fanchartpro.firebasestorage.app",
        messagingSenderId: "94013254919",
        appId: "1:94013254919:web:929fff5cd2c71067b269a2"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let songData = [{ l: "歡迎使用應援助手", f: "開始" }];
    let index = 0;
    let isLocked = false;

    // --- 雲端功能 ---
    async function uploadSong(e) {
        e.stopPropagation();
        if (songData.length < 1 || songData[0].f === "開始") {
            alert("請先匯入並標記歌詞再投稿！");
            return;
        }
        const songName = prompt("這首歌叫什麼名字？");
        if (!songName) return;

        try {
            await db.collection("songs").add({
                name: songName,
                data: songData,
                status: "pending",
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("投稿成功！請等候管理員審核。");
        } catch (error) {
            alert("投稿失敗，請檢查網絡或 Config。");
        }
    }

    async function fetchPublicSongs(e) {
        if (e) e.stopPropagation();
        try {
            const snapshot = await db.collection("songs").where("status", "==", "public").get();
            if (snapshot.empty) {
                alert("暫時未有公開歌單。");
                return;
            }
            let list = "請選擇歌曲編號：\n";
            let songs = [];
            snapshot.forEach((doc, i) => {
                songs.push(doc.data());
                list += `${i + 1}. ${doc.data().name}\n`;
            });
            const choice = prompt(list);
            if (choice && songs[choice - 1]) {
                songData = songs[choice - 1].data;
                index = 0;
                updateUI();
            }
        } catch (error) {
            alert("讀取雲端失敗。");
        }
    }

    // 打開自定義匯入視窗
    function openImporter(e) {
        if(e) e.stopPropagation();
        document.getElementById('import-modal').style.display = 'block';
        document.getElementById('manualInput').value = ""; // 清空上次內容
    }

    function closeImporter() {
        document.getElementById('import-modal').style.display = 'none';
    }

    // 文字匯入確認
    function handleManualSubmit() {
        const input = document.getElementById('manualInput').value;
        if (input.trim()) {
            songData = [];
            closeImporter();
            startManualMarking(input);
        }
    }

    // OCR 邏輯 (加強版)
    async function handleOCR(event) {
        const file = event.target.files[0];
        if (!file) return;

        closeImporter(); // 關閉選單顯示進度
        document.getElementById('currLyrics').innerText = "辨識中... 請稍候";
        document.getElementById('currFanchant').innerText = "☕";

        try {
            const result = await Tesseract.recognize(file, 'kor+eng');
            const text = result.data.text;
            
            if (text.trim()) {
                songData = [];
                startManualMarking(text);
            } else {
                alert("識辨唔到文字，請試吓影清楚啲。");
                updateUI();
            }
        } catch (e) {
            alert("OCR 失敗");
            updateUI();
        }
    }

    function triggerOCR() {
        document.getElementById('ocrInput').click();
    }

    function startManualMarking(text) {
        const overlay = document.getElementById('editor-overlay');
        const container = document.getElementById('chips-container');
        const lines = text.split('\n');
        const posMap = {};
        songData.forEach(item => {
            if (item.marks) {
                if (!posMap[item.row]) posMap[item.row] = new Set();
                item.marks.forEach(m => posMap[item.row].add(m));
            }
        });

        let html = "";
        lines.forEach((line, rowIdx) => {
            if (line.trim() === "") return;
            html += `<div class="line-row" data-row="${rowIdx}" style="margin-bottom: 20px; border-bottom: 1px solid #222;">`;
            const words = line.split(/\s+/).filter(w => w !== "");
            let inBracket = false;
            words.forEach((w, chipIdx) => {
                if (/[\(\（\[]/.test(w)) inBracket = true;
                const isSaved = posMap[rowIdx] && posMap[rowIdx].has(chipIdx);
                const shouldHighlight = isSaved || inBracket;
                html += `<span onclick="this.classList.toggle('is-fc')" class="word-chip ${shouldHighlight ? 'is-fc' : ''}">${w}</span>`;
                if (/[\)\）\]]/.test(w)) inBracket = false;
            });
            html += `</div>`;
        });
        container.innerHTML = html;
        overlay.style.display = 'block';
    }

    function saveMarkedData() {
        const rows = document.querySelectorAll('.line-row');
        let newData = [];
        rows.forEach((row, rowIdx) => {
            const chips = row.querySelectorAll('.word-chip');
            let currentL = ""; let pendingF = []; let markedIndices = [];
            chips.forEach((chip, chipIdx) => {
                if (chip.classList.contains('is-fc')) {
                    pendingF.push(chip.innerText);
                    markedIndices.push(chipIdx);
                } else {
                    if (pendingF.length > 0) {
                        newData.push({ l: currentL.trim() || "...", f: pendingF.join(' '), row: rowIdx, marks: markedIndices });
                        currentL = ""; pendingF = []; markedIndices = [];
                    }
                    currentL += chip.innerText + " ";
                }
            });
            if (pendingF.length > 0) newData.push({ l: currentL.trim() || "...", f: pendingF.join(' '), row: rowIdx, marks: markedIndices });
            else if (currentL.trim()) newData.push({ l: currentL.trim(), f: "", row: rowIdx, marks: [] });
        });
        songData = newData; index = 0;
        document.getElementById('editor-overlay').style.display = 'none';
        updateUI();
    }

    function editCurrentSong(e) {
        e.stopPropagation();
        let textFormat = songData.map(item => (item.f ? (item.l === "..." ? "" : item.l + " ") + item.f : item.l)).join('\n');
        const newInput = prompt("編輯中：", textFormat);
        if (newInput !== null) startManualMarking(newInput);
    }
    function triggerOCR() {
        document.getElementById('ocrInput').click();
    }

    async function handleOCR(event) {
        const file = event.target.files[0];
        if (!file) return;

        // 顯示 loading 提示
        document.getElementById('currLyrics').innerText = "辨識中... 請稍候";
        document.getElementById('currFanchant').innerText = "☕";

        try {
            // 開始 OCR 辨識 (設定韓文 ko 同英文 eng 混合，因為 NCT WISH 歌單通常有呢兩隻)
            const result = await Tesseract.recognize(
                file,
                'kor+eng', 
                { logger: m => console.log(m) } // 進度會印喺 console
            );

            const text = result.data.text;
            if (text.trim() === "") {
                alert("辨識失敗，請換一張清晰啲嘅相。");
                updateUI();
                return;
            }

            // 辨識成功後，直接將文字送入原本嘅標記模式
            if (confirm("辨識完成！要進入標記模式微調嗎？")) {
                songData = [];
                startManualMarking(text);
            }
        } catch (e) {
            console.error(e);
            alert("OCR 發生錯誤，請檢查網絡。");
            updateUI();
        }
    }
    function toggleLock(e) {
        e.stopPropagation();
        isLocked = !isLocked;
        const btn = document.getElementById('lockBtn');
        btn.innerText = isLocked ? "🔒 鎖定中" : "🔓 已解鎖";
        btn.style.borderColor = isLocked ? "red" : "#444";
    }

    function handleTap(e) {
        if (isLocked) return;
        const clickX = e.clientX || (e.touches && e.touches[0].clientX);
        if (clickX < window.innerWidth * 0.3) { if (index > 0) index--; }
        else { if (index < songData.length - 1) index++; else index = 0; }
        updateUI();
    }

    function updateUI() {
        if (!songData[index]) return;
        document.getElementById('currLyrics').innerText = songData[index].l;
        document.getElementById('currFanchant').innerText = songData[index].f;
        document.getElementById('nextText').innerText = "Next: " + (songData[index+1] ? songData[index+1].l : "完畢");
        localStorage.setItem('myConcertData', JSON.stringify(songData));
        if (songData[index].f && navigator.vibrate) navigator.vibrate(50);
    }

    window.onload = function() {
        const saved = localStorage.getItem('myConcertData');
        if (saved) { songData = JSON.parse(saved); updateUI(); }
    };
</script>
</body>
</html>
