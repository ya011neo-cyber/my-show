<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>應援貓紙 Fanchant Cheatsheet</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        body { 
    margin: 0; 
    background: #000; 
    color: #fff; 
    font-family: sans-serif; 
    height: 100vh; 
    overflow-x: hidden;      /* ✨ 鎖死左右拖動 */
    overflow-y: hidden;      /* 防止 Body 本身跳動 */
    touch-action: pan-y;     /* ✨ 核心：允許垂直手勢，咁你先轆到歌詞 */
    padding-top: env(safe-area-inset-top); 
}

#app { 
    height: 100%; 
    width: 100vw;            /* ✨ 確保滿版 */
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    padding: 0 !important;   /* ✨ 取消原本 5% 的左右留白 */
    text-align: center; 
    box-sizing: border-box; 
    position: relative;
}
        .lyrics-container { display: flex; flex-direction: column; gap: 2vh; width: 100%; }
        :root { --fc-color: #0f0; }
        .fanchant { 
            /* 縮小字體：最高由 4.5rem 減至 3rem，最低由 1.5rem 減至 1.2rem */
            font-size: clamp(1.2rem, 5vh, 3rem); 
            
            /* 減輕粗細：由 900 (極粗) 改為 700 (粗) 或 600 */
            font-weight: 700; 
            
            color: var(--fc-color); 
            
            /* 減弱發光效果：只保留淡淡的陰影，唔好重疊幾層 shadow */
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8); 
            
            white-space: normal; 
            line-height: 1.2;      /* 稍微增加行高，唔好咁迫 */
            display: block; 
            letter-spacing: 0px;   /* 恢復正常字距，唔好負數縮埋一齊 */
        }
        .lyrics { font-size: clamp(1rem, 3vh, 2rem); color: #bbb; margin-bottom: 3px; white-space: normal; line-height: 1.2; word-break: break-word; }
        .side-lyrics { font-size: clamp(0.8rem, 2.5vh, 1.5rem); color: #444; min-height: 2vh; transition: all 0.3s ease; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .side-lyrics .fc-text { color: var(--fc-color); filter: brightness(0.5); margin-left: 8px; }
        .btn-group { position: fixed; top: calc(10px + env(safe-area-inset-top)); right: 10px; display: flex; gap: 5px; z-index: 100; flex-wrap: wrap; justify-content: flex-end; background: #000;}
        .btn { padding: 8px 12px; background: #222; border-radius: 5px; font-size: 0.7rem; border: 1px solid #444; color: #fff; cursor: pointer; user-select: none; }
        #main-photo-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2500; justify-content: center; align-items: center; touch-action: none; overflow: hidden; }
        #main-photo-img { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.2s ease-out; pointer-events: none; will-change: transform; }
        .close-photo-btn { position: absolute; top: 20px; right: 20px; font-size: 2rem; color: #fff; background: rgba(0,0,0,0.5); border-radius: 50%; width: 50px; height: 50px; text-align: center; line-height: 50px; cursor: pointer; z-index: 2600; }
       #editor-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #111;
        z-index: 999;
        padding: 20px;
        box-sizing: border-box;

    /* ✨ 確保呢度係 auto 或者 scroll */
    overflow-y: auto; 
    
    /* ✨ 核心修正：唔好用 none！
       pan-y 代表允許垂直方向的手勢捲動，但防止縮放或左右亂跳 */
    touch-action: pan-y; 
    
    /* 防止滾動傳遞到底層 */
    overscroll-behavior: contain; 
}
        
.word-chip { 
    display: inline-block; 
    padding: 6px 10px;      /* 你的設定 */
    margin: 4px;            /* 你的設定 */
    border: 1px solid #333; 
    border-radius: 4px; 
    cursor: pointer; 
    color: #999; 
    font-size: 0.9rem;      /* 你的設定 */
}

.word-chip.is-fc { 
    background: transparent; 
    color: var(--fc-color);  /* ✨ 連動自定義顏色 */
    font-weight: bold; 
    border-color: var(--fc-color); 
    box-shadow: none; 
}
#lyrics-window {
    height: 380px;           /* 你可以根據相機位再微調高度 */
    width: 100vw !important;
    overflow-y: auto;
    overflow-x: hidden;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    /* 隱藏捲軸 */
    scrollbar-width: none;
    -ms-overflow-style: none;
}
#lyrics-window::-webkit-scrollbar { display: none; }

/* 呢個係配合 updateUI 入面 pointer-events 嘅關鍵 */
.lyric-line {
    width: 100%;
    pointer-events: none;    /* 讓兩側點擊穿透 */
}
.lyric-content {
    display: inline-block;
    width: 90%;              /* ✨ 歌詞視覺闊度 */
    pointer-events: auto;    /* ✨ 只有文字區會觸發對焦 */
}
        @media (max-width: 768px) {
            #split-screen-editor > div {
                flex-direction: column !important; /* 手機變垂直排列 */
            }
            #reference-image-container {
                flex: 0 0 40% !important; /* 圖片佔上方 40% */
                border-right: none !important;
                border-bottom: 1px solid #333;
            }
            #editor-input-area {
                flex: 1 !important;
            }
        }
        /* 當視窗非常窄時 (例如彈出式小視窗) */
/* 當 body 有 .focus-mode class 時隱藏指定元件 */
body.focus-mode .btn-group,
body.focus-mode #admin-tools,
body.focus-mode .footer-info, /* 假設你底部容器 class 係 footer */
body.focus-mode #display-song-name,
body.focus-mode #display-upload-info {
    display: none !important;
}

/* 專注模式掣嘅容器 */
.focus-controls {
    display: flex;
    justify-content: center; /* 水平居中 */
    align-items: center;
    width: 100%;
    margin-top: 50px;        /* 同上面排掣隔開 10px */
    margin-bottom: 5px;
    z-index: 110;
}

/* 執一執粒掣嘅樣式，唔好用 position: fixed */
#focus-toggle-btn {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid #555;
    color: #ccc;
    padding: 6px 15px;
    border-radius: 20px;     /* 圓角好睇啲 */
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.3s ease;
}

#focus-toggle-btn:hover {
    background: rgba(255, 255, 255, 0.2);
    color: #fff;
}
    /* 調整歌詞顯示區域，填滿空間 */
    #lyrics-list {
        height: 100vh !important;
        padding-bottom: 0 !important;
    }
}
.collection-item {
    padding: 15px;
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #111;
    margin-bottom: 5px;
    border-radius: 8px;
}
.collection-info {
    flex: 1;
    text-align: left;
}
.remove-btn {
    color: #ff4444;
    padding: 10px;
    cursor: pointer;
}
    </style>
</head>
    
<body>
<div id="app" onclick="handleTap(event)">
    <div class="btn-group">
        <div id="mainViewVideoBtn" class="btn" style="display:none; background:#444;" onclick="openVideoLink(event)">🎬</div>
        <div id="mainViewLinkBtn" class="btn" style="display:none; background:#444;" onclick="openSourceLink(event)">🔗</div>

        <div class="btn" style="background:#0055aa;" onclick="location.reload()">🔄</div>
        <div class="btn" onclick="openColorMenu(event)">🎨</div>

        <div class="btn" onclick="uploadSong(event)">☁️</div>

        <div class="side-lyrics" id="prevLine"></div>
        <div class="main-focus" style="padding: 20px 0; transform: scale(1.1);">
            <div class="lyrics" id="currLyrics">載入中...</div>

<div id="lyrics-window">

</div>

<div id="main-photo-overlay">
    <div class="close-photo-btn" onclick="hideMainPhoto()">×</div>

</div>

<div id="color-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#222; padding:20px; border-radius:15px; z-index:2000; border:1px solid #444; width:250px; text-align:center;">

        <label style="font-size:0.8rem; color:#888;">HEX Code:</label>
        <input type="text" id="hexInput" style="width:100%; background:#111; color:#fff; border:1px solid #555; padding:8px; border-radius:5px; margin-top:5px; text-align:center; font-family:monospace;">
    </div>
    <div style="display:flex; gap:10px;">
        <button class="btn" style="flex:1; background:#0f0; color:#000; font-weight:bold;" onclick="saveCustomColor()">套用</button>

<div id="import-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:1000; padding:20px; box-sizing:border-box; overflow-y:auto;">
    
    <div style="position: sticky; top: -20px; background: rgba(0,0,0,0.95); z-index: 1100; padding: 15px 0; border-bottom: 1px solid #333; margin-bottom: 15px; margin-top: -20px; text-align: center;">
        <h3 id="modal-title" style="color:#0f0; margin: 5px 0;">編輯歌詞</h3>
        <div style="display: flex; gap: 10px; justify-content: center; align-items: center;">
            <button id="importRemovePhotoBtn" class="btn" style="background:#800; display:none; font-size:0.7rem;" onclick="removePhoto()">❌ 移除相片</button>
        </div>
    </div>

    <div id="editor-layout" style="display: flex; gap: 15px; width: 100%; min-height: 60vh;">
        
        <div id="reference-image-container" style="flex: 1.2; overflow-y: auto; background: #111; border: 1px solid #333; border-radius: 10px; display: none;">
            <img id="reference-img" src="" style="width: 100%; height: auto; display: block;">
        </div>

        <div id="input-container" style="flex: 1; display: flex; flex-direction: column;">
            <textarea id="manualInput" style="width:100%; flex-grow: 1; background:#111; color:#fff; border:1px solid #444; padding:15px; border-radius:10px; font-size:1rem; box-sizing:border-box; font-family: monospace;" placeholder="括號 () 內文字會自動變應援色..."></textarea>
            
            <div style="margin: 15px 0;">
                <input type="text" id="sourceLinkInput" style="width:100%; background:#111; color:#0f0; border:1px solid #444; padding:12px; border-radius:5px; box-sizing:border-box; font-size:0.8rem;" placeholder="🔗 貼上來源網址 (YouTube/歌詞網)...">
                <input type="text" id="videoLinkInput" style="width:100%; background:#111; color:#ff0000; border:1px solid #444; padding:12px; border-radius:5px; box-sizing:border-box; font-size:0.8rem;" placeholder="🎬 貼上參考影片網址 (YouTube/Fancam)...">
            </div>
        </div>
    </div>

    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top: 20px; padding-bottom: 30px;">
        <button class="btn" style="flex:2; padding:15px; background:#0f0; color:#000; font-weight:bold;" onclick="handleManualSubmit()">✅ 確認並標記</button>
        <button class="btn" style="flex:1; padding:15px;" onclick="document.getElementById('refInput').click()">📷 附相</button>
        <button class="btn" style="flex:1; padding:15px; background:#444;" onclick="closeImporter()">取消</button>
    </div>
    
    <input type="file" id="refInput" accept="image/*" style="display:none" onchange="previewRefImage(event)">
</div>
<div id="public-songs-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; padding:20px; box-sizing:border-box; overflow-y:auto;">
    </div>

<div id="editor-overlay">
    <div style="position: sticky; top: 0; background: #111; z-index: 1000; padding: 10px 0; border-bottom: 1px solid #333; margin-bottom: 20px;">
        <h2 style="text-align:center; margin: 0 0 10px 0; font-size: 1.2rem;">點擊【應援詞】使其變色</h2>
        <h5 style="text-align:center;margin: 0 0 10px 0;color: var(--fc-color);">務必確保已經完成修改歌詞，否則會導致移位</h5>
        <div style="text-align:center;">
            <button id="editorPhotoBtn" class="btn" style="background:#444; display:none; padding: 10px 20px;" onclick="showMainPhoto(event)">🖼️ 睇參考圖</button>
        </div>
    </div>
    
    <div id="chips-container" style="text-align:center;"></div>
    
    <div style="text-align:center; margin-top:30px; padding-bottom:50px;">
        <button class="btn" style="font-size: 1.2rem; padding: 15px 30px; background:#0f0; color:#000;" onclick="saveMarkedData()">✅ 完成生成</button>
        <button class="btn" style="font-size: 1.2rem; padding: 15px 30px; background:#444;" onclick="cancelMarking()">❌ 取消</button>
    </div>
</div>
    
<div id="footer-info" onclick="handleAdminTrigger()" style="position: fixed; bottom: env(safe-area-inset-bottom); left: 0; width: 100%; padding: 15px 0; background: linear-gradient(transparent, rgba(0,0,0,0.9) 70%); color: #555; font-size: 0.8rem; text-align: center; z-index: 50; user-select: none;">
    <div id="display-song-name" style="font-weight: bold; color: #666;">應援貓紙 Fanchant Cheatsheet</div>
    <div id="display-upload-info" style="font-size: 0.65rem; margin-top: 3px; color: #444;"></div>
</div>
<script>
    // --- 原有 Firebase 配置 (請保持原樣) ---
    const firebaseConfig = { apiKey: "AIzaSyCOnH-KJfJqe6VGn7qG2TU1rIaT5OEL9JU", authDomain: "fanchartpro.firebaseapp.com", projectId: "fanchartpro", storageBucket: "fanchartpro.firebasestorage.app", messagingSenderId: "94013254919", appId: "1:94013254919:web:929fff5cd2c71067b269a2" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let songData = [{ l: "歡迎使用應援貓紙", f: "點擊畫面下半區域閱讀使用指南（睇曬再試啊！）" },
                    { l: "🔄refresh", f: "點擊重新載入網站" },
                    { l: "🎨自定義顏色", f: "可選擇/輸入HEX碼喜歡的顏色取代應援詞顏色" },
                    { l: "📂已公開貓紙", f: "可查看其他人上載的貓紙/在🗑️輸入對該貓紙的意見" },
                    { l: "➕新增貓紙", f: "幫手入貓紙！手動編輯歌詞和標記應援詞" },
                    { l: "✏️修改貓紙", f: "隨時修改你/其他人貓紙錯處" },
                    { l: "☁️上載貓紙", f: "審核後會公開貓紙~造福你我他" },
                    { l: "🖼️圖片版貓紙", f: "load唔切就睇圖片版貓紙" },
                    { l: "🔗圖片來源", f: "想睇清D可跳到貓紙來源" },
                    { l: "🎬參考影片", f: "睇實際例子/官方教學" },
                    { l: "演唱會模式（正上方）", f: "彈出視窗就可以邊錄片邊睇貓紙！" },
                    { l: "（上下移動畫面再點擊字）", f: "miss咗都可以快速跟返"},
                    { l: "（完）", f: "快D試下啦！"}
                   ];
    let index = 0;
    let isLocked = false;
    let tempPhotoData = ""; // 用來編輯時臨時儲存相片

    // --- 相片顯示與縮放 (修復 Chrome & Samsung) ---
    let scale = 1, posX = 0, posY = 0, isDragging = false, startX, startY;
    
function toggleFocusMode() {
    const isFocus = document.body.classList.toggle('focus-mode');
    const btn = document.getElementById('focus-toggle-btn');
    
    // 改變粒掣嘅文字嚟提醒用家
    if (isFocus) {
        btn.innerText = "顯示工具";
        btn.style.opacity = "0.3"; // 收埋咗工具就將粒掣整淡啲，唔好擋住歌詞
    } else {
        btn.innerText = "演唱會模式";
        btn.style.opacity = "1";
    }
}

function showMainPhoto(e) {
    if(e) e.stopPropagation();
    
    // 優先：讀取匯入/編輯時嘅臨時相片 (tempPhotoData)
    // 次之：讀取當前歌曲第一行嘅相片
    let photoToShow = tempPhotoData;
    if (!photoToShow) {
        const currSong = getFirstLineData();
        if (currSong && currSong.photo) photoToShow = currSong.photo;
    }

    if(!photoToShow) {
        alert("未附上相片或相片未載入。");
        return;
    }
    
    scale = 1; posX = 0; posY = 0;
    const img = document.getElementById('main-photo-img');
    img.src = photoToShow; // 載入啱嘅相
    img.style.transform = `translate(0px, 0px) scale(1)`;
    document.getElementById('main-photo-overlay').style.display = 'flex';
}

    function hideMainPhoto() { document.getElementById('main-photo-overlay').style.display = 'none'; }

    // 獲取當前歌曲嘅「元數據」（例如相片）
    function getFirstLineData() { return songData[0]; }

    // 手勢監聽器
    const overlay = document.getElementById('main-photo-overlay');
    overlay.addEventListener('touchstart', (e) => { if (e.touches.length === 1) { isDragging = true; startX = e.touches[0].clientX - posX; startY = e.touches[0].clientY - posY; } }, { passive: false });
    overlay.addEventListener('touchmove', (e) => { if (!isDragging) return; if (scale > 1) e.preventDefault(); posX = e.touches[0].clientX - startX; posY = e.touches[0].clientY - startY; document.getElementById('main-photo-img').style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }, { passive: false });
    overlay.addEventListener('touchend', (e) => { isDragging = false; const currentTime = new Date().getTime(); const tapLength = currentTime - (window.lastTap || 0); if (tapLength < 300 && tapLength > 0) { scale = (scale === 1) ? 2.5 : 1; if (scale === 1) { posX = 0; posY = 0; } document.getElementById('main-photo-img').style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; e.preventDefault(); } window.lastTap = currentTime; });

    // --- 編輯與圖片處理 ---
   function openImporter(isEdit = false) {
    const modal = document.getElementById('import-modal');
    const title = document.getElementById('modal-title');
    const input = document.getElementById('manualInput');
    const linkInput = document.getElementById('sourceLinkInput');
    const videoLinkInput = document.getElementById('videoLinkInput');
    const refContainer = document.getElementById('reference-image-container');
    const refImg = document.getElementById('reference-img');

    if (!modal || !input) return;

    if (isEdit) {
        title.innerText = "✏️ 編輯現有歌詞";
        // 載入歌詞內容
        input.value = songData.map(item => {
            let line = "";
            if (item.l && item.l !== "...") line += item.l + " ";
            if (item.f) line += item.f; 
            return line.trim();
        }).join('\n');

        // 載入 Link (對應你原本嘅邏輯)
        const currSong = (typeof getFirstLineData === 'function') ? getFirstLineData() : {};
        if (linkInput) linkInput.value = currSong.link || "";
        if (videoLinkInput) videoLinkInput.value = currSong.video || "";
        
        // 載入相片暫存
        tempPhotoData = currSong.photo || localStorage.getItem('myConcertPhoto') || "";
    } else {
        title.innerText = "➕ 匯入新歌詞";
        input.value = "";
        linkInput.value = "";
        videoLinkInput.value = "";
        tempPhotoData = "";
    }

    // --- ✨ 呢度就係分屏功能嘅靈魂 ---
    const photoToShow = isEdit ? tempPhotoData : localStorage.getItem('myConcertPhoto');
    if (photoToShow && refContainer && refImg) {
        refImg.src = photoToShow;
        refContainer.style.display = 'block'; // 顯示左邊分屏
    } else if (refContainer) {
        refContainer.style.display = 'none';  // 冇相就收埋左邊
    }

    modal.style.display = 'block';
}
    function editCurrentSong(e) {
        if (e) e.stopPropagation();

// --- 強化版：自動壓縮相片，解決手機 LocalStorage 爆容量問題 ---
function previewRefImage(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
            // 建立畫布進行壓縮
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            const max_size = 1200;
            if (width > height) {
                if (width > max_size) {
                    height *= max_size / width;
                    width = max_size;
                }
            } else {
                if (height > max_size) {
                    width *= max_size / height;
                    height = max_size;
                }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            // 輸出壓縮後的 Base64
            tempPhotoData = canvas.toDataURL('image/jpeg', 0.7); 
            
            // ✨ 重點：即時更新分屏顯示
            const refContainer = document.getElementById('reference-image-container');
            const refImg = document.getElementById('reference-img');
            if (refContainer && refImg) {
                refImg.src = tempPhotoData;
                refContainer.style.display = 'block'; // 即時變成分屏
            }

            // 更新按鈕狀態
            updateEditPreview();
            console.log("相片已即時顯示，大小約:", Math.round(tempPhotoData.length / 1024), "KB");
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

    // --- 標記與儲存 ---
function startManualMarking(text) {
    const container = document.getElementById('chips-container');
    const modalTitle = document.getElementById('modal-title').innerText;
    const isEditMode = modalTitle.includes("編輯");

    // 彈窗詢問
    const isAutoRun = confirm("是否需要根據括號 () 自動標示應援詞？\n(按「取消」將完全依照你上次手動標記的結果)");

    const currentName = window.currentSubmittingData ? window.currentSubmittingData.name : "";
    const newMeta = { name: currentName, uploader: "本地編輯者" };

    const editorBtn = document.getElementById('editorPhotoBtn');
    if (typeof tempPhotoData !== 'undefined' && tempPhotoData && editorBtn) {
        editorBtn.style.display = 'inline-block';
    } else if (editorBtn) {
        editorBtn.style.display = 'none';
    }

    const lines = text.split('\n');
    let html = "";

    lines.forEach((line, rowIdx) => {
        if (line.trim() === "") return;
        html += `<div class="line-row" data-row="${rowIdx}" style="margin-bottom:15px; border-bottom:1px solid #222;">`;
        
        const words = line.split(/\s+/).filter(w => w !== "");
        const originalFanchant = (isEditMode && typeof songData !== 'undefined' && songData[rowIdx] && songData[rowIdx].f) 
                                 ? songData[rowIdx].f.split(/\s+/) : [];
        
        let fanchantPointer = 0; 
        let inBracketScope = false; 

        words.forEach(w => {
            let isMarked = false;

            // --- 邏輯 A：用戶揀 OK (執行原本的自動標示) ---
            if (isAutoRun) {
                const hasStart = /[\(\（\[]/.test(w);
                const hasEnd = /[\)\）\]]/.test(w);

                if (hasStart) inBracketScope = true;
                if (inBracketScope) isMarked = true; // ✨ 跟返你原本嘅邏輯 A
                
                // 補償邏輯：如果括號內冇著燈但係編輯模式原本有 mark 嗰粒字
                if (!isMarked && isEditMode && originalFanchant.length > 0) {
                    if (fanchantPointer < originalFanchant.length && w === originalFanchant[fanchantPointer]) {
                        isMarked = true;
                        fanchantPointer++;
                    }
                }
                
                if (hasEnd) inBracketScope = false;
            } 
            // --- 邏輯 B：用戶揀 Cancel (只對比舊數據，唔睇括號) ---
            else {
                if (isEditMode && originalFanchant.length > 0) {
                    // ✨ 直接用原字 w 比對 originalFanchant，保證括號唔會被 del 走
                    if (fanchantPointer < originalFanchant.length && w === originalFanchant[fanchantPointer]) {
                        isMarked = true;
                        fanchantPointer++;
                    }
                }
            }
            
            html += `<span onclick="toggleChip(this, event)" class="word-chip ${isMarked ? 'is-fc' : ''}">${w}</span>`;
        });
        html += `</div>`;
    });
    
    container.innerHTML = html;
    container.dataset.meta = JSON.stringify(newMeta); 
    document.getElementById('editor-overlay').style.display = 'block';
}
function cancelMarking() {
    // 直接隱藏標記畫面，唔執行 saveMarkedData，所以原本嘅數據唔會被覆蓋
    document.getElementById('editor-overlay').style.display = 'none';
}
function toggleChip(el, event) {
    if (event) {
        // 剩係阻止冒泡就好，唔好阻止 Default，咁樣先轆到畫面
        event.stopPropagation(); 
    }
    
    el.classList.toggle('is-fc');
}
function saveMarkedData() {
    const rows = document.querySelectorAll('.line-row');
    const tempPhotoData = document.getElementById('reference-img').src;
    const sourceLink = document.getElementById('sourceLinkInput').value.trim(); 
    const videoLink = document.getElementById('videoLinkInput').value.trim(); 
    let newData = [];

    rows.forEach(row => {
        const chips = row.querySelectorAll('.word-chip');
        let currentL = ""; let pendingF = [];
        chips.forEach(chip => {
            if (chip.classList.contains('is-fc')) { pendingF.push(chip.innerText); }
            else {
                if (pendingF.length > 0) {
                    newData.push({ l: currentL.trim() || "...", f: pendingF.join(' ') });
                    currentL = ""; pendingF = [];
                }
                currentL += chip.innerText + " ";
            }
        });
        if (pendingF.length > 0 || currentL.trim()) newData.push({ l: currentL.trim() || "...", f: pendingF.join(' ') });
    });

    if (newData.length > 0) {
        if (tempPhotoData) newData[0].photo = tempPhotoData;
        if (sourceLink) newData[0].link = sourceLink; 
        if (sourceLink) newData[0].video = videoLink; 
    }

    // --- ✨ 核心改動：更新 meta 數據 ---
    const info = window.currentSubmittingData || {};
    
    // 1. 強制將作者設定為「本地編輯者」，不再保留舊作者
    newData.meta = {
        name: info.name || "未命名歌曲",
        uploader: "本地編輯者"
    };

    // 2. 更新全局變數
    songData = newData;
    index = 0;

    // 3. 關閉視窗
    document.getElementById('editor-overlay').style.display = 'none';
    closeImporter();

    // 4. ✨ 呼叫 updateUI，由佢統一處理畫面顯示同埋 localStorage 儲存
    updateUI();

    console.log("本地預覽已更新：作者已變更為本地編輯者");
}

function filterSongs(query) {
    const searchTerm = query.toLowerCase().trim();
    if (!window.allGroupedSongs) return;

    const filtered = {};

    Object.keys(window.allGroupedSongs).forEach(name => {
        // 只要歌名包含搜尋字眼就留低
        if (name.toLowerCase().includes(searchTerm)) {
            filtered[name] = window.allGroupedSongs[name];
        }
    });

    // 重新畫過個 List 內容
    renderSongItems(filtered);
}

async function adminDeletePublic(docId, songName) {
    const pw = prompt(`確定要刪除「${songName}」嗎？\n請輸入管理員密碼：`);
    if (pw === null) return;

    try {
        // 1. 從 Database 讀取所有安全設定 (密碼同 Discord Link)
        const adminDoc = await db.collection("admin_config").doc("security").get();
        const adminData = adminDoc.data();
        const correctPw = adminData.password;
        const webhookURL = adminData.discord_webhook; // ✨ 喺 Database 攞 Link

        if (pw === correctPw) {
            await db.collection("songs").doc(docId).delete();
            alert("🗑️ 該歌曲已永久刪除。");
            fetchPublicSongs();
        } else {
            const reason = prompt("密碼不正確。如果您想建議刪除此歌，請輸入原因：");
            
            if (reason && reason.trim() !== "") {
                // 儲存紀錄
                await db.collection("delete_requests").add({
                    songId: docId,
                    songName: songName,
                    reason: reason,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                // 2. ✨ 檢查有無 Webhook URL 先至發送
                if (webhookURL) {
                    const discordMsg = {
                        username: "應援貓紙管理員",
                        embeds: [{
                            title: "🚨 收到刪除建議！",
                            color: 16711680,
                            fields: [
                                { name: "歌曲名稱", value: songName, inline: true },
                                { name: "建議原因", value: reason, inline: false }
                            ]
                        }]
                    };

                    fetch(webhookURL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(discordMsg)
                    });
                }

                alert("感謝您的意見！通知已發送。");
            }
        }
    } catch (e) {
        console.error(e);
        alert("操作失敗。");
    }
}

// ✅ 生成歌曲唯一識別碼
function generateSongUniqueId(meta, data) {
    const songName = meta.name || '未命名';
    const uploader = meta.uploader || '本地編輯者';
    
    // 如果有 Firebase ID，直接用
    if (window.currentDocId) {
        return `fb_${window.currentDocId}`;
    }
    
    // 本地版本：用歌名+上傳者+歌詞內容生成 hash
    const contentSample = data.slice(0, 3).map(l => l.l || '').join('').substring(0, 50);
    const hashSource = `${songName}_${uploader}_${contentSample}`;
    
    // 簡單 hash 函數
    let hash = 0;
    for (let i = 0; i < hashSource.length; i++) {
        const char = hashSource.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash; // Convert to 32bit integer
    }
    
    return `local_${songName.replace(/\s+/g, '_')}_${uploader.replace(/\s+/g, '_')}_${Math.abs(hash)}`;
}

// ✅ 生成版本標籤
function generateVersionLabel() {
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
}

// ✅ 儲存完整歌詞到 localStorage
function saveSongToLocalStorage(uniqueId, songData) {
    const saveObj = {
        version: "2.0",
        uniqueId: uniqueId,
        meta: songData.meta || {},
        lines: Array.from(songData).filter(item => item && (item.l || item.f)) // 過濾有效行
    };
    localStorage.setItem(`song_${uniqueId}`, JSON.stringify(saveObj));
}

// ✅ 從 localStorage 載入完整歌詞
function loadSongFromLocalStorage(uniqueId) {
    const saved = localStorage.getItem(`song_${uniqueId}`);
    if (saved) {
        const parsed = JSON.parse(saved);
        return parsed.lines || [];
    }
    return null;
}

        if (uniqueId) {

        collection.splice(i, 1);

// 載入收藏的歌曲 - 支援本地儲存版本
async function loadCollectedSong(songMeta) {
    try {
        // ✅ 優先：如果係本地版本，直接從 localStorage 載入
        if (songMeta.isLocal || songMeta.uniqueId?.startsWith('local_')) {
            const localData = loadSongFromLocalStorage(songMeta.uniqueId);
            if (localData) {
                songData = localData;
                
                // 重建 meta
                const savedRaw = localStorage.getItem(`song_${songMeta.uniqueId}`);
                if (savedRaw) {
                    const parsed = JSON.parse(savedRaw);
                    songData.meta = parsed.meta;
                }
                
                window.currentDocId = null;
                window.currentSubmittingData = { name: songMeta.name };
                
                index = 0;
                updateUI();
                closeModal();
                return;
            }
        }
        
        // 如果有 Firebase ID，就從雲端載入
        if (songMeta.id) {
            const doc = await db.collection("songs").doc(songMeta.id).get();
            if (doc.exists) {
                const data = doc.data();
                
                songData = data.data || [];
                songData.meta = {
                    name: data.name,
                    uploader: data.uploader || "匿名",
                    link: data.data?.[0]?.link || "",
                    video: data.data?.[0]?.video || "",
                    photo: data.data?.[0]?.photo || ""
                };
                
                window.currentDocId = songMeta.id;
                window.currentSubmittingData = { name: data.name };
                
                index = 0;
                updateUI();
                closeModal();
                return;
            }
        }
        
        alert("載入失敗！無法找到呢個版本嘅完整資料。");
        
    } catch (err) {
        console.error("載入收藏失敗", err);
        alert("載入失敗！");
    }
}

function showAuditBar(docId, songName) {
    const oldBar = document.getElementById('audit-bar');
    if (oldBar) oldBar.remove();

    const bar = document.createElement('div');
    bar.id = 'audit-bar';
    
    // 設定初始樣式，加入 cursor: move
    bar.style = `
        position: fixed; top: 10px; left: 10px; right: 10px;
        background: rgba(0, 50, 0, 0.95); color: white; 
        padding: 10px; text-align: center; z-index: 5000;
        box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        display: flex; align-items: center; justify-content: space-between; gap: 10px;
        backdrop-filter: blur(5px); border-radius: 8px; border: 1px solid #0f0;
        cursor: move; touch-action: none;
    `;
    
    bar.innerHTML = `
        <div style="font-size:0.8rem; margin-left:10px; flex-grow:1; text-align:left; pointer-events:none;">
            ⣿ 審核：<b>${songName}</b>
        </div>
        <div style="display:flex; gap:8px;">
            <button class="btn" style="background:#0f0; color:#000; padding:5px 12px; font-size:0.75rem;" onclick="finalizeApproval('${docId}', '${songName}')">公開</button>
            <button class="btn" style="background:#f00; color:#fff; padding:5px 12px; font-size:0.75rem;" onclick="deletePending('${docId}', '${songName}')">刪除</button>
            <button class="btn" style="background:#444; color:#fff; padding:5px 10px; font-size:0.75rem;" onclick="document.getElementById('audit-bar').remove()">❌</button>
        </div>
    `;

    document.body.appendChild(bar);

    // --- ✨ 加入簡易拖動邏輯 ✨ ---
    let isDragging = false;
    let offsetTop = 0;

    const startDrag = (e) => {
        // 如果撳中按鈕就唔好觸發拖動
        if (e.target.tagName === 'BUTTON') return;
        isDragging = true;
        const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
        offsetTop = clientY - bar.getBoundingClientRect().top;
        bar.style.transition = 'none'; // 拖動時關閉動畫，避免延遲
    };

    const onDrag = (e) => {
        if (!isDragging) return;
        const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
        let newTop = clientY - offsetTop;
        
        // 限制唔好拖出畫面頂部同底部
        newTop = Math.max(0, Math.min(window.innerHeight - bar.offsetHeight, newTop));
        bar.style.top = newTop + 'px';
    };

    const stopDrag = () => {
        isDragging = false;
        bar.style.transition = 'top 0.2s'; // 放手後加返少少彈性
    };

    // 支援滑鼠同手指觸控
    bar.addEventListener('mousedown', startDrag);
    window.addEventListener('mousemove', onDrag);
    window.addEventListener('mouseup', stopDrag);

    bar.addEventListener('touchstart', startDrag);
    window.addEventListener('touchmove', onDrag);
    window.addEventListener('touchend', stopDrag);
}

    if (window.tempSetlistForm.songs && index < window.tempSetlistForm.songs.length - 1) {
        const songs = window.tempSetlistForm.songs;
        [songs[index], songs[index + 1]] = [songs[index + 1], songs[index]];
        showCreateSetlistForm();
    }
}

// ==================== 修正：從收藏導入歌曲 ====================

function importFromCollection() {
    const collection = JSON.parse(localStorage.getItem('mySetlist') || '[]');
    
    if (collection.length === 0) {
        alert("你嘅收藏係空的，請先加入歌曲");
        return;
    }
    
    const modal = document.getElementById('public-songs-modal');
    
    // ✅ 獲取目前已選擇的歌曲 ID 列表
    const selectedIds = (window.tempSetlistForm.songs || []).map(s => s.uniqueId || s.songId).filter(id => id);
    
    let html = `
        <div style="padding:20px; color:#fff; height:80vh; display:flex; flex-direction:column;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h3 style="margin:0;">📂 從收藏選擇</h3>
                <span onclick="showCreateSetlistForm()" style="cursor:pointer; font-size:1.5rem;">✕</span>
            </div>
            
            <div style="margin-bottom:10px; display:flex; gap:10px;">
                <button class="btn" style="background:#444;" onclick="selectAllCollectionSongs()">全選</button>
                <button class="btn" style="background:#444;" onclick="deselectAllCollectionSongs()">取消全選</button>
            </div>
            
            <div style="flex:1; overflow-y:auto;">
                ${collection.map((song, i) => {
                    const songId = song.uniqueId || song.id;
                    const isChecked = selectedIds.includes(songId);
                    return `
                        <div style="padding:12px; border-bottom:1px solid #333; display:flex; align-items:center; gap:10px;">
                            <input type="checkbox" id="song-${i}" value="${i}" 
                                   ${isChecked ? 'checked' : ''}
                                   style="width:18px; height:18px;">
                            <label for="song-${i}" style="flex:1; cursor:pointer; text-align:left;">
                                <div style="font-weight:bold;">${escapeHtml(song.name)}</div>
                                <div style="font-size:0.7rem; color:#666;">${escapeHtml(song.uploader || '匿名')}</div>
                                ${song.fromSetlist ? `<div style="font-size:0.6rem; color:#0f0;">📦 ${escapeHtml(song.fromSetlist)}</div>` : ''}
                            </label>
                        </div>
                    `;
                }).join('')}
            </div>
            
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn" style="flex:1; background:#444;" onclick="showCreateSetlistForm()">取消</button>
                <button class="btn" style="flex:1; background:#0f0; color:#000;" onclick="confirmImportFromCollection()">✅ 確認選擇</button>
            </div>
        </div>
    `;
    
    modal.innerHTML = html;
}

// 全選收藏歌曲
function selectAllCollectionSongs() {
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
}

// 取消全選
function deselectAllCollectionSongs() {
    document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
}

// ✅ 確認從收藏導入（修正版）
function confirmImportFromCollection() {
    const collection = JSON.parse(localStorage.getItem('mySetlist') || '[]');
    const selectedSongs = [];
    
    document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
        const index = parseInt(cb.value);
        if (collection[index]) {
            const song = collection[index];
            selectedSongs.push({
                name: song.name,
                uploader: song.uploader || '匿名',
                songId: song.id || null,
                uniqueId: song.uniqueId || `local_${Date.now()}_${selectedSongs.length}`
            });
        }
    });
    
    // ✅ 合併到現有歌曲（去重）
    const existingSongs = window.tempSetlistForm.songs || [];
    const existingKeys = new Set(existingSongs.map(s => s.uniqueId || s.songId));
    
    selectedSongs.forEach(song => {
        const key = song.uniqueId || song.songId;
        if (key && !existingKeys.has(key)) {
            existingSongs.push(song);
            existingKeys.add(key);
        }
    });
    
    window.tempSetlistForm.songs = existingSongs;
    
    // 返回建立表單
    showCreateSetlistForm();
}

// ==================== 修正：搜尋公開歌曲 ====================

    const modal = document.getElementById('public-songs-modal');
    
    let html = `
        <div style="padding:20px; color:#fff; height:80vh; display:flex; flex-direction:column;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h3 style="margin:0;">🔍 搜尋歌曲</h3>
                <span onclick="showCreateSetlistForm()" style="cursor:pointer; font-size:1.5rem;">✕</span>

                <input type="text" id="song-search-input" placeholder="輸入歌名..."

                <button class="btn" style="background:#0f0; color:#000; padding:12px 20px;" onclick="performSongSearch()">搜尋</button>
            </div>
            
            <div id="search-results" style="flex:1; overflow-y:auto;">

            </div>
        </div>
    `;
    
    modal.innerHTML = html;
    window.tempSearchResults = [];
    
    // ✅ 支援 Enter 鍵搜尋
    setTimeout(() => {

        if (input) {

                if (e.key === 'Enter') performSongSearch();
            });
            input.focus();
        }

}

// 執行歌曲搜尋
async function performSongSearch() {
    const query = document.getElementById('song-search-input')?.value.trim();
    if (!query) {
        alert("請輸入搜尋關鍵字");
        return;
    }
    
    const resultsDiv = document.getElementById('search-results');
    resultsDiv.innerHTML = '<p style="color:#666; text-align:center; padding:20px;">🔍 搜尋中...</p>';
    
    try {
        const snapshot = await db.collection("songs")
            .where("status", "==", "public")
            .get();
        
        const results = [];
        snapshot.forEach(doc => {
            const data = doc.data();
            if (data.name.toLowerCase().includes(query.toLowerCase())) {
                results.push({
                    id: doc.id,
                    ...data
                });
            }
        });
        
        window.tempSearchResults = results;
        
        if (results.length === 0) {
            resultsDiv.innerHTML = '<p style="color:#666; text-align:center; padding:50px;">😿 冇相關結果</p>';
            return;
        }
        
        // ✅ 獲取目前已選擇的歌曲 ID
        const selectedIds = (window.tempSetlistForm.songs || []).map(s => s.songId).filter(id => id);
        
        resultsDiv.innerHTML = `
            <div style="margin-bottom:10px; display:flex; gap:10px;">
                <button class="btn" style="background:#444; font-size:0.7rem;" onclick="selectAllSearchResults()">全選</button>
                <button class="btn" style="background:#444; font-size:0.7rem;" onclick="deselectAllSearchResults()">取消全選</button>
                <span style="color:#666; margin-left:auto;">找到 ${results.length} 個結果</span>
            </div>
            ${results.map((song, i) => {
                const isChecked = selectedIds.includes(song.id);
                return `
                    <div style="padding:12px; border-bottom:1px solid #333; display:flex; align-items:center; gap:10px;">
                        <input type="checkbox" id="search-song-${i}" value="${i}" 
                               ${isChecked ? 'checked' : ''}
                               style="width:18px; height:18px;">
                        <label for="search-song-${i}" style="flex:1; cursor:pointer; text-align:left;">
                            <div style="font-weight:bold;">${escapeHtml(song.name)}</div>
                            <div style="font-size:0.7rem; color:#666;">${escapeHtml(song.uploader || '匿名')}</div>
                        </label>
                    </div>
                `;
            }).join('')}
        `;
        
    } catch (err) {
        console.error("搜尋失敗", err);
        resultsDiv.innerHTML = '<p style="color:#f00; text-align:center; padding:50px;">搜尋失敗，請重試</p>';
    }
}
// 全選搜尋結果
function selectAllSearchResults() {
    document.querySelectorAll('#search-results input[type="checkbox"]').forEach(cb => cb.checked = true);
}

// 取消全選搜尋結果
function deselectAllSearchResults() {
    document.querySelectorAll('#search-results input[type="checkbox"]').forEach(cb => cb.checked = false);
}
    
// ✅ 確認搜尋選擇（修正版）
function confirmSongSearchSelection() {
    const selectedSongs = [];
    
    document.querySelectorAll('#search-results input[type="checkbox"]:checked').forEach(cb => {
        const index = parseInt(cb.value);
        if (window.tempSearchResults && window.tempSearchResults[index]) {
            const song = window.tempSearchResults[index];
            selectedSongs.push({
                name: song.name,
                uploader: song.uploader || '匿名',
                songId: song.id || null
            });
        }
    });
    
    // ✅ 合併到現有歌曲（去重）
    const existingSongs = window.tempSetlistForm.songs || [];
    const existingIds = new Set(existingSongs.map(s => s.songId).filter(id => id));
    
    selectedSongs.forEach(song => {
        if (song.songId && !existingIds.has(song.songId)) {
            existingSongs.push(song);
            existingIds.add(song.songId);
        }
    });
    
    window.tempSetlistForm.songs = existingSongs;
    
    // 返回建立表單
    showCreateSetlistForm();
}

// ==================== 修正：提交歌單 ====================

async function submitSetlist() {
    // ✅ 先儲存表單資料
    saveFormData();
    
    const form = window.tempSetlistForm;
    const name = form.name?.trim();
    const artist = form.artist?.trim();
    const type = form.type;
    const description = form.description?.trim();
    const songs = form.songs || [];
    
    if (!name) {
        alert("請輸入歌單名稱");
        return;
    }
    
    if (songs.length === 0) {
        alert("請至少選擇一首歌曲");
        return;
    }
    
    const creator = prompt("請輸入你的暱稱（會顯示喺歌單上）：");
    if (!creator) return;
    
    try {
        const setlistData = {
            name: name,
            artist: artist || null,
            type: type,
            description: description || null,
            songs: songs,
            songCount: songs.length,
            creator: creator,
            status: "pending",
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        
        const docRef = await db.collection("setlists").add(setlistData);
        
        alert("✅ 歌單已提交審核！審核通過後會出現在公共歌單。");
        
        // 發送 Discord 通知
        sendSetlistDiscordNotification(name, creator, docRef.id, songs.length);
        
        // ✅ 清空暫存表單
        window.tempSetlistForm = {
            name: '',
            artist: '',
            type: 'concert',
            description: '',
            songs: []
        };
        
        // 返回歌單列表
        fetchPublicSetlists();
        
    } catch (err) {
        console.error("提交失敗", err);
        alert("❌ 提交失敗，請重試");
    }
}

// 發送 Discord 通知
async function sendSetlistDiscordNotification(name, creator, id, songCount) {
    try {
        const adminDoc = await db.collection("admin_config").doc("security").get();
        const webhookURL = adminDoc.data()?.discord_webhook;
        
        if (webhookURL) {
            fetch(webhookURL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    username: "應援貓紙投稿機",
                    embeds: [{
                        title: "📋 收到新歌單投稿！",
                        color: 65280,
                        fields: [
                            { name: "歌單名稱", value: name, inline: true },
                            { name: "投稿者", value: creator, inline: true },
                            { name: "歌曲數量", value: `${songCount} 首`, inline: true },
                            { name: "Firebase ID", value: id, inline: false }
                        ],
                        timestamp: new Date().toISOString()
                    }]
                })
            });
        }
    } catch (err) {
        console.error("Discord 通知失敗", err);
    }
}

// 查看歌單詳情（修正版：檢查歌曲是否存在）
async function viewSetlistDetail(setlistId) {
    const modal = document.getElementById('public-songs-modal');
    
    modal.innerHTML = `
        <div style="padding:20px; color:#fff; height:80vh; display:flex; flex-direction:column;">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <span onclick="fetchPublicSetlists()" style="cursor:pointer; color:#cc9900;">⬅️ 返回</span>
                <span onclick="closeModal()" style="cursor:pointer; font-size:1.5rem;">✕</span>
            </div>
            <div style="flex:1; display:flex; justify-content:center; align-items:center;">
                <p style="color:#666;">載入中...</p>
            </div>
        </div>
    `;
    
    try {
        const doc = await db.collection("setlists").doc(setlistId).get();
        
        if (!doc.exists) {
            alert("歌單不存在");
            fetchPublicSetlists();
            return;
        }
        
        const setlist = doc.data();
        currentSetlistData = setlist;
        currentSetlistId = setlistId;
        
        // ✅ 檢查每首歌係咪仍然存在
        const validSongs = [];
        const invalidSongIds = [];
        
        if (setlist.songs && setlist.songs.length > 0) {
            for (const song of setlist.songs) {
                if (song.songId) {
                    try {
                        const songDoc = await db.collection("songs").doc(song.songId).get();
                        if (songDoc.exists) {
                            // 歌曲存在，保留
                            validSongs.push(song);
                        } else {
                            // 歌曲已被刪除，標記為無效
                            invalidSongIds.push(song.songId);
                            // ✅ 仍然保留歌曲資訊，但標記為已刪除（不可播放）
                            validSongs.push({
                                ...song,
                                isDeleted: true
                            });
                        }
                    } catch (err) {
                        console.warn(`檢查歌曲 ${song.songId} 失敗:`, err);
                        // 檢查失敗當作存在處理
                        validSongs.push(song);
                    }
                } else {
                    // 本地版本，冇 songId，直接保留
                    validSongs.push(song);
                }
            }
        }
        
        // ✅ 更新有效歌曲列表
        const displaySongs = validSongs;
        const deletedCount = invalidSongIds.length;
        
        const typeIcon = setlist.type === 'concert' ? '🎤' : setlist.type === 'album' ? '💿' : '📝';
        const typeName = setlist.type === 'concert' ? '演唱會' : setlist.type === 'album' ? '專輯' : '自訂';
        const dateStr = setlist.createdAt ? new Date(setlist.createdAt.seconds * 1000).toLocaleDateString('zh-HK') : '';
        
        let html = `
            <div style="padding:20px; color:#fff; height:80vh; display:flex; flex-direction:column;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <span onclick="fetchPublicSetlists()" style="cursor:pointer; color:#cc9900;">⬅️ 返回列表</span>
                    <span onclick="closeModal()" style="cursor:pointer; font-size:1.5rem;">✕</span>
                </div>
                
                <div style="text-align:center; margin-bottom:20px; padding-bottom:15px; border-bottom:1px solid #333;">
                    <div style="font-size:1rem; color:#888; margin-bottom:5px;">${typeIcon} ${typeName}</div>
                    <h2 style="margin:5px 0; color:#fff;">${escapeHtml(setlist.name)}</h2>
                    ${setlist.artist ? `<div style="font-size:1.1rem; color:#0f0; margin:5px 0;">${escapeHtml(setlist.artist)}</div>` : ''}
                    <div style="font-size:0.8rem; color:#666; margin-top:10px; display:flex; justify-content:center; gap:20px;">
                        <span>📊 ${displaySongs.length} 首歌</span>
                        <span>👤 ${escapeHtml(setlist.creator || '匿名')}</span>
                        ${dateStr ? `<span>📅 ${dateStr}</span>` : ''}
                    </div>
                    ${deletedCount > 0 ? `
                        <div style="margin-top:10px; padding:8px; background:#3a1a1a; border-radius:8px; color:#ff6666; font-size:0.8rem;">
                            ⚠️ 有 ${deletedCount} 首歌已被刪除，無法播放
                        </div>
                    ` : ''}
                    ${setlist.description ? `
                        <div style="margin-top:15px; padding:10px; background:#1a1a1a; border-radius:8px; font-style:italic; color:#aaa;">
                            "${escapeHtml(setlist.description)}"
                        </div>
                    ` : ''}
                </div>
                
                <div style="flex:1; overflow-y:auto;">
                    <h4 style="color:#888; margin-bottom:10px;">📜 歌曲列表</h4>
        `;
        
        if (displaySongs.length > 0) {
            displaySongs.forEach((song, i) => {
                const isDeleted = song.isDeleted || false;
                const canPlay = song.songId && !isDeleted;
                
                html += `
                    <div style="padding:12px; border-bottom:1px solid #333; display:flex; align-items:center; gap:10px; ${isDeleted ? 'opacity:0.5;' : ''}">
                        <span style="color:${isDeleted ? '#666' : '#0f0'}; width:30px; text-align:right;">${i + 1}.</span>
                        <div style="flex:1; text-align:left;">
                            <div style="font-weight:bold; ${isDeleted ? 'color:#888; text-decoration:line-through;' : ''}">
                                ${escapeHtml(song.name)}
                                ${isDeleted ? ' <span style="color:#f00; font-size:0.7rem;">[已刪除]</span>' : ''}
                            </div>
                            <div style="font-size:0.7rem; color:#666;">${escapeHtml(song.uploader || '匿名')}</div>
                        </div>
                        ${canPlay ? `
                            <button class="btn" style="padding:5px 10px; font-size:0.7rem;" onclick="loadSongFromSetlist('${song.songId}')">🎵 播放</button>
                        ` : `
                            <span style="color:#666; font-size:0.7rem;">
                                ${isDeleted ? '🚫 已刪除' : '📦 本地版本'}
                            </span>
                        `}
                    </div>
                `;
            });
        } else {
            html += `<p style="color:#666; text-align:center; padding:30px;">😿 呢個歌單冇歌曲</p>`;
        }
        
        html += `
                </div>
                
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button class="btn" style="flex:1; background:#444;" onclick="fetchPublicSetlists()">返回</button>
        `;
        
        // ✅ 只有當存在可播放歌曲時先顯示播放按鈕
        const hasPlayableSongs = displaySongs.some(s => s.songId && !s.isDeleted);
        if (hasPlayableSongs) {
            html += `
                    <button class="btn" style="flex:1; background:#0f0; color:#000;" onclick="playEntireSetlist()">▶️ 播放整個歌單</button>
            `;
        } else {
            html += `
                    <button class="btn" style="flex:1; background:#444; color:#888;" disabled>▶️ 冇可播放歌曲</button>
            `;
        }
        
        html += `
                    <button class="btn" style="flex:1; background:#cc9900; color:#000;" onclick="addSetlistToCollection()">⭐ 收藏歌單</button>
                </div>
            </div>
        `;
        
        modal.innerHTML = html;
        
        // ✅ 更新當前歌單數據（只保留有效歌曲供播放）
        currentSetlistData = {
            ...setlist,
            validSongs: displaySongs.filter(s => s.songId && !s.isDeleted)
        };
        
    } catch (err) {
        console.error("載入歌單失敗", err);
        alert("載入失敗");
        fetchPublicSetlists();
    }
}

// ✅ 修正播放整個歌單（只播放有效歌曲）
async function playEntireSetlist() {
    if (!currentSetlistData) {
        alert("冇歌單數據");
        return;
    }
    
    // 使用已檢查過嘅有效歌曲
    const validSongs = currentSetlistData.validSongs || 
                       (currentSetlistData.songs || []).filter(s => s.songId);
    
    if (validSongs.length === 0) {
        alert("呢個歌單冇可播放的歌曲");
        return;
    }
    
    // 將歌單儲存到播放隊列
    window.playQueue = validSongs;
    window.playQueueIndex = 0;
    
    // 載入第一首歌
    await loadSongFromSetlist(validSongs[0].songId);
    
    alert(`🎵 開始播放歌單「${currentSetlistData.name}」\n共 ${validSongs.length} 首歌`);
}

// ✅ 修正從歌單載入歌曲（加入錯誤處理）
async function loadSongFromSetlist(songId) {
    try {
        const doc = await db.collection("songs").doc(songId).get();
        
        if (!doc.exists) {
            alert("❌ 呢首歌已被刪除");
            
            // 嘗試播放下一首
            if (window.playQueue && window.playQueueIndex < window.playQueue.length - 1) {
                window.playQueueIndex++;
                const nextSong = window.playQueue[window.playQueueIndex];
                if (nextSong && nextSong.songId) {
                    await loadSongFromSetlist(nextSong.songId);
                }
            }
            return;
        }
        
        const data = doc.data();
        
        songData = data.data || [];
        songData.meta = {
            name: data.name,
            uploader: data.uploader || "匿名",
            link: data.data?.[0]?.link || "",
            video: data.data?.[0]?.video || "",
            photo: data.data?.[0]?.photo || ""
        };
        
        window.currentDocId = songId;
        window.currentSubmittingData = { name: data.name };
        
        index = 0;
        updateUI();
        closeModal();
        
    } catch (err) {
        console.error("載入失敗", err);
        alert("載入歌曲失敗");
    }
}

// 播放下一首（在 updateUI 或其他地方呼叫）
async function playNextInQueue() {
    if (window.playQueue && window.playQueueIndex < window.playQueue.length - 1) {
        window.playQueueIndex++;
        await loadSongFromSetlist(window.playQueue[window.playQueueIndex].songId);
    } else {
        window.playQueue = null;
        window.playQueueIndex = 0;
        alert("🎉 歌單播放完畢！");
    }
}

// 將歌單加入我的收藏
function addSetlistToCollection() {
    if (!currentSetlistData) return;
    
    let collection = JSON.parse(localStorage.getItem('mySetlist') || '[]');
    let addedCount = 0;
    
    currentSetlistData.songs.forEach(song => {
        // 檢查是否已存在
        const exists = collection.some(s => 
            (song.songId && s.id === song.songId) ||
            s.name === song.name
        );
        
        if (!exists) {
            collection.push({
                uniqueId: `setlist_${Date.now()}_${addedCount}`,
                id: song.songId || null,
                name: song.name,
                uploader: song.uploader || "未知",
                isLocal: !song.songId,
                savedAt: new Date().toISOString(),
                fromSetlist: currentSetlistData.name
            });
            addedCount++;
        }
    });
    
    localStorage.setItem('mySetlist', JSON.stringify(collection));
    alert(`✅ 已將 ${addedCount} 首歌加入我的收藏！`);
}

// 批准歌單
async function approveSetlist(setlistId) {
    if (!confirm("確定批准呢個歌單？")) return;
    
    try {
        await db.collection("setlists").doc(setlistId).update({
            status: "public"
        });
        alert("✅ 歌單已公開！");
        showPendingSetlists();
    } catch (err) {
        alert("操作失敗");
    }
}

// 拒絕歌單
async function rejectSetlist(setlistId) {
    const reason = prompt("請輸入拒絕原因（可選）：");
    
    try {
        await db.collection("setlists").doc(setlistId).delete();
        alert("🗑️ 歌單已刪除" + (reason ? `\n原因：${reason}` : ""));
        showPendingSetlists();
    } catch (err) {
        alert("操作失敗");
    }
}

function handleTap(e) {
    if (isLocked) return;

    const x = e.clientX || (e.touches && e.touches[0].clientX);
    const y = e.clientY || (e.touches && e.touches[0].clientY);
    const w = window.innerWidth;
    const h = window.innerHeight;

    // 區域定義
    const isInLeftSide = (x < w * 0.3);          // 左側 30%
    const isInRightSide = (x > w * 0.7);         // 右側 30%
    const isInCenterWidth = (!isInLeftSide && !isInRightSide); // 中間 40%
    const isUpperHalf = (y < h * 0.5);           // 上半截 50%
    const isLowerHalf = (y >= h * 0.5);          // 下半截 50%

    // 1. 【優先判定】如果點中中間 40% 嘅「文字內容」 -> 跳轉歌詞
    const contentBtn = e.target.closest('.lyric-content');
    if (contentBtn && isInCenterWidth) {
        const lineEl = contentBtn.parentElement;
        const newIndex = parseInt(lineEl.id.replace('line-', ''));
        if (!isNaN(newIndex)) {
            index = newIndex;
            updateUI();
            return;
        }
    }

    // 2. 【兩側判定】只要喺左右 30% 區域，或者點中中間但冇點中字
    if (isInLeftSide || isInRightSide || isInCenterWidth) {
        // 如果係點擊兩側，直接跟「上半截/下半截」行
        if (isUpperHalf) {
            if (index > 0) index--;
        } else {
            if (index < songData.length - 1) index++; 
            else index = 0;
        }
        updateUI();
    }
}
function handleLineClick(targetIndex) {
    if (isLocked) return;
    
    // 直接將 index 變做你點擊嗰行嘅編號
    index = targetIndex;
    
    // 即時更新畫面，觸發 scrollIntoView
    updateUI();
}
function updateUI() {
    const list = document.getElementById('lyrics-list');
    if (!list) return;

    list.innerHTML = songData.map((line, i) => {
        const isCurrent = (i === index);
        return `
            <div id="line-${i}" class="lyric-line" 
                 style="width: 100%; padding: 15px 0; transition: all 0.3s; 
                        opacity: ${isCurrent ? 1 : 0.3}; 
                        transform: scale(${isCurrent ? 1.1 : 0.95});
                        pointer-events: none;">
                <div class="lyric-content" style="display: inline-block; width: 90%; pointer-events: auto;">
                    <div style="font-size: 1.35rem; font-weight: bold; color: ${isCurrent ? '#fff' : '#aaa'};">
                        ${line.l}
                    </div>
                    ${line.f ? `<div style="font-size: 1.6rem; font-weight: 900; color: var(--fc-color); margin-top: 6px;">${line.f}</div>` : ''}
                </div>
            </div>
        `;
    }).join('');
    
    // ✅ 檢測係咪播放到最後一行
    if (index >= songData.length - 1) {
        // 如果有播放隊列，自動播放下一首
        if (window.playQueue && window.playQueue.length > 0) {
            // 延遲少少等用戶睇完最後一句
            setTimeout(() => {
                playNextInQueue();
            }, 1000);
        }
    }
    // --- 以下捲動、Footer、儲存邏輯完全保留你原本的樣子 ---
    const editorOverlay = document.getElementById('editor-overlay');
    const isEditing = editorOverlay && (editorOverlay.style.display === 'block');

    if (isEditing) {
        console.log("正在編輯，已阻斷背景捲動");
    } else {
        setTimeout(() => {
            const activeLine = document.getElementById(`line-${index}`);
            if (activeLine) activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 50);
    }

    const footerName = document.getElementById('display-song-name');
    const footerUpload = document.getElementById('display-upload-info');
    let currentName = "";
    let currentUploader = "";

    if (songData.meta) {
        currentName = songData.meta.name;
        currentUploader = songData.meta.uploader;
    } else if (window.currentSubmittingData && window.currentSubmittingData.name) {
        currentName = window.currentSubmittingData.name;
        currentUploader = "本地編輯者";
    }

    if (footerName && footerUpload) {
        footerName.innerText = currentName || "應援貓紙 Fanchant Cheatsheet";
        footerUpload.innerText = currentUploader ? `Uploaded by: ${currentUploader}` : "";
    }

    try {
        const saveObj = {
            version: "2.0",
            meta: songData.meta || (currentName ? { name: currentName, uploader: currentUploader } : null),
            lines: Array.from(songData)
        };
        localStorage.setItem('myConcertData', JSON.stringify(saveObj));
    } catch (e) { console.error("Save Error", e); }
    
    if (typeof updateMainViewBtn === 'function') updateMainViewBtn();
    if (typeof updateFavoriteButton === 'function') updateFavoriteButton();
}
