<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>應援助手 Pro</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; touch-action: none; }
        #app { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 10%; text-align: center; }
        .next-preview { color: #444; font-size: 0.9rem; margin-bottom: 20px; }
        .lyrics { font-size: 1.4rem; color: #bbb; margin-bottom: 10px; }
        .fanchant { font-size: 3.5rem; font-weight: 900; color: #0f0; text-shadow: 0 0 15px #0f0; }
        .btn-group { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .btn { padding: 8px 12px; background: #222; border-radius: 5px; font-size: 0.7rem; border: 1px solid #444; color: #fff; }
        #app::after { content: "⬅️ 30% 區域退後 | 前進 70% ➡️"; position: absolute; bottom: 20px; font-size: 0.6rem; color: #111; }
    </style>
</head>
<body>

<div id="app" onclick="handleTap(event)">
    <div class="btn-group">
        <div class="btn" onclick="importSongs(event)">➕ 加入新歌</div>
        <div id="lockBtn" class="btn" onclick="toggleLock(event)">🔓 已解鎖</div>
    </div>
    <div class="next-preview" id="nextText">Next: ---</div>
    <div class="lyrics" id="currLyrics">準備就緒</div>
    <div class="fanchant" id="currFanchant"></div>
</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    // 預設歌單
    let songData = [
        { l: "點擊右上角「加入新歌」", f: "開始使用" },
        { l: "格式範例：歌詞/應援詞", f: "明白！" }
    ];

    let index = 0;
    let isLocked = false;

    // --- 新功能：輸入歌詞 ---
function importSongs(e) {
        e.stopPropagation();
        const input = prompt("請貼上歌詞 (支援一行多個括號，會自動拆行)");
        
        if (input) {
            const lines = input.split('\n');
            let newData = [];

            lines.forEach(line => {
                // 正規表達式：搵出所有括號入面嘅內容
                const regex = /[\(\（\[](.*?)[\)\）\]]/g;
                let lastIndex = 0;
                let match;
                let foundMatch = false;

                // 循環搵出嗰一行入面所有括號
                while ((match = regex.exec(line)) !== null) {
                    foundMatch = true;
                    // 攞括號之前嘅文字做歌詞
                    const lyricsBefore = line.substring(lastIndex, match.index).trim();
                    const fanchant = match[1];
                    
                    newData.push({
                        l: lyricsBefore || "...", // 如果括號前冇字就顯示 ...
                        f: fanchant
                    });
                    lastIndex = regex.lastIndex;
                }

                // 如果括號後面仲有剩餘嘅字，或者成行都冇括號
                if (lastIndex < line.length) {
                    const remaining = line.substring(lastIndex).trim();
                    if (remaining) {
                        newData.push({ l: remaining, f: "" });
                    }
                } else if (!foundMatch && line.trim() !== "") {
                    newData.push({ l: line.trim(), f: "" });
                }
            });
            
            songData = newData;
            index = 0;
            updateUI();
            alert("匯入成功！已為你自動拆分多重應援。");
        }
    }

    function toggleLock(e) {
        e.stopPropagation();
        isLocked = !isLocked;
        const btn = document.getElementById('lockBtn');
        btn.innerText = isLocked ? "🔒 已鎖定" : "🔓 已解鎖";
        btn.style.borderColor = isLocked ? "red" : "#444";
    }

    function handleTap(e) {
        if (isLocked) return;
        const clickX = e.clientX || (e.touches && e.touches[0].clientX);
        const screenWidth = window.innerWidth;

        if (clickX < screenWidth * 0.3) {
            if (index > 0) index--;
        } else {
            if (index < songData.length - 1) index++;
            else index = 0;
        }
        updateUI();
    }

    function updateUI() {
        const current = songData[index];
        const next = songData[index + 1] || { l: "完畢" };
        document.getElementById('currLyrics').innerText = current.l;
        document.getElementById('currFanchant').innerText = current.f;
        document.getElementById('nextText').innerText = "Next: " + next.l;
        if (current.f && navigator.vibrate) navigator.vibrate(50);
    }

    updateUI();
</script>
</body>
</html>
