<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>應援助手 Cloud Pro · 智慧應援詞編輯器</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* 避免拖曳干擾，但保留文字選擇可手動 */
        }
        body {
            margin: 0;
            background: #000;
            color: #e0e0e0;
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
            height: 100vh;
            overflow: hidden;
            touch-action: pan-y pinch-zoom; /* 保留垂直滑動，避免整頁縮放干擾 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        #app {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        :root {
            --fc-color: #0f0;
            --glass-bg: rgba(20,20,30,0.7);
        }
        /* 歌詞視窗 - 流暢滾動 + 精確視覺 */
        #lyrics-window {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding: 20vh 0 20vh 0;  /* 上下預留足夠空間，點擊任一行都能置中 */
            margin: 0;
            scroll-snap-type: y proximity;
        }
        #lyrics-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            width: 100%;
            padding: 0 1rem;
        }
        .line-item {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
            padding: 1rem 0.5rem;
            border-radius: 28px;
            transition: all 0.2s ease;
            scroll-snap-align: center;
            cursor: pointer;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(2px);
        }
        .line-item:active {
            transform: scale(0.98);
            background: rgba(30,30,40,0.6);
        }
        .line-item > div:first-child {
            font-size: clamp(1rem, 4vh, 1.8rem);
            color: #ccc;
            font-weight: 500;
            letter-spacing: 0.02em;
            line-height: 1.4;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .line-item > div:last-child {
            font-size: clamp(1.3rem, 5.5vh, 2.6rem);
            font-weight: 700;
            color: var(--fc-color);
            text-shadow: 0 0 5px rgba(0,255,0,0.3);
            margin-top: 0.5rem;
            letter-spacing: 0.02em;
            word-break: break-word;
        }
        /* 按鈕群組更乾淨 */
        .btn-group {
            position: fixed;
            top: calc(12px + env(safe-area-inset-top));
            right: 12px;
            display: flex;
            gap: 8px;
            z-index: 200;
            flex-wrap: wrap;
            justify-content: flex-end;
            background: transparent;
            pointer-events: none;
        }
        .btn-group .btn {
            pointer-events: auto;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            border: 1px solid #3a3a4a;
            color: #eee;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .btn-group .btn:active { transform: scale(0.94); background: #2a2a2a; }
        /* 模態框通用美學 */
        .modal-glass {
            background: rgba(8,8,12,0.96);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid #2c2c3a;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6);
        }
        .word-chip {
            display: inline-block;
            padding: 8px 14px;
            margin: 6px;
            border: 1px solid #3a3a44;
            border-radius: 48px;
            cursor: pointer;
            color: #ccc;
            font-size: 0.95rem;
            font-weight: 500;
            background: #111;
            transition: 0.07s linear;
        }
        .word-chip.is-fc {
            background: rgba(0,255,0,0.18);
            color: var(--fc-color);
            border-color: var(--fc-color);
            box-shadow: 0 0 4px var(--fc-color);
        }
        #editor-overlay {
            background: #0a0a0e;
        }
        /* 分屏編輯器: 現代適應 */
        #editor-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
        }
        @media (max-width: 720px) {
            #editor-layout { flex-direction: column; }
            #reference-image-container { max-height: 200px; }
        }
        #reference-image-container {
            flex: 1;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #reference-img {
            max-width: 100%;
            max-height: 260px;
            object-fit: contain;
        }
        textarea, input {
            font-family: 'SF Mono', monospace;
        }
        #footer-info {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 10px 0 18px;
            background: linear-gradient(to top, #000000dd, transparent);
            text-align: center;
            font-size: 0.7rem;
            color: #aaa;
            pointer-events: auto;
            z-index: 60;
        }
        #lyrics-window::-webkit-scrollbar {
            width: 4px;
        }
        #lyrics-window::-webkit-scrollbar-track {
            background: #111;
        }
        #lyrics-window::-webkit-scrollbar-thumb {
            background: var(--fc-color);
            border-radius: 10px;
        }
        .btn-danger {
            background: #a00;
            border-color: #d44;
        }
        .btn-success {
            background: #0a4a0a;
            border-color: #0f0;
            color: #cfc;
        }
    </style>
</head>
<body>
<div id="app" onclick="handleGlobalTap(event)">
    <div class="btn-group">
        <div class="btn" onclick="location.reload()">⟳</div>
        <div id="mainViewPhotoBtn" class="btn" style="display:none;" onclick="showMainPhoto(event)">🖼️</div>
        <div id="mainViewLinkBtn" class="btn" style="display:none;" onclick="openSourceLink(event)">🔗</div>
        <div class="btn" onclick="openColorMenu(event)">🎨</div>
        <div class="btn" onclick="fetchPublicSongs(event)">📂</div>
        <div class="btn" onclick="openImporter(false)">➕</div>
        <div class="btn" onclick="uploadSong(event)">☁️</div>
        <div class="btn" onclick="editCurrentSong(event)">✏️</div>
        <div id="lockBtn" class="btn" onclick="toggleLock(event)">🔓</div>
    </div>
    <div id="lyrics-window">
        <div id="lyrics-list"></div>
    </div>
</div>

<!-- 圖片全屏瀏覽器 -->
<div id="main-photo-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:3000; justify-content:center; align-items:center; touch-action:pan-x pan-y;">
    <div class="close-photo-btn" style="position:absolute; top:25px; right:25px; font-size:2.2rem; background:rgba(0,0,0,0.6); width:48px; height:48px; border-radius:30px; text-align:center; line-height:48px; cursor:pointer; z-index:3001;" onclick="hideMainPhoto()">✕</div>
    <img id="main-photo-img" style="max-width:95%; max-height:95%; object-fit:contain; transition:transform 0.1s;" src="">
</div>

<!-- 顏色選單 -->
<div id="color-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#1e1e2a; padding:20px; border-radius:32px; z-index:2100; width:260px; text-align:center; border:1px solid #4a4a5a;">
    <h4 style="margin:0 0 12px 0;">應援色自訂</h4>
    <input type="color" id="colorPicker" onchange="updateHexInput(this.value)" style="width:100%; height:44px; border-radius:12px;">
    <input type="text" id="hexInput" style="width:100%; margin:12px 0; background:#111; border:1px solid #555; padding:8px; border-radius:20px; text-align:center; color:#0f0;">
    <div style="display:flex; gap:10px;">
        <button class="btn" style="flex:1; background:#0f0; color:#000;" onclick="saveCustomColor()">套用</button>
        <button class="btn" style="flex:1;" onclick="closeColorMenu()">取消</button>
    </div>
</div>

<!-- 匯入/編輯 模態 (分屏改進) -->
<div id="import-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.96); z-index:1500; padding:20px; overflow-y:auto;">
    <div style="max-width:800px; margin:0 auto;">
        <div style="background:#111; border-radius:32px; padding:20px; margin-top:20px;">
            <h3 id="modal-title" style="color:#0f0; margin-top:0;">編輯歌詞</h3>
            <div id="editor-layout">
                <div id="reference-image-container" style="display:none;">
                    <img id="reference-img" src="">
                </div>
                <div style="flex:2">
                    <textarea id="manualInput" rows="6" style="width:100%; background:#1a1a24; border:1px solid #333; border-radius:20px; padding:16px; color:white; font-size:1rem;" placeholder="每行一句，應援詞用括號 () 包住會自動標記"></textarea>
                    <input type="text" id="sourceLinkInput" style="width:100%; margin-top:12px; background:#1a1a24; border:1px solid #333; border-radius:30px; padding:12px; color:#0f0;" placeholder="🔗 參考來源連結 (YouTube/歌詞網)">
                </div>
            </div>
            <div style="display:flex; gap:12px; margin-top:24px; flex-wrap:wrap;">
                <button class="btn btn-success" style="flex:2; padding:12px;" onclick="handleManualSubmit()">✅ 確認並標記應援詞</button>
                <button class="btn" style="flex:1;" onclick="document.getElementById('refInput').click()">📷 附參考圖</button>
                <button class="btn" style="background:#333;" onclick="closeImporter()">取消</button>
            </div>
            <input type="file" id="refInput" accept="image/*" style="display:none" onchange="previewRefImage(event)">
            <div style="margin-top:12px; font-size:0.7rem; text-align:center; color:#666;">💡 提示：點擊單詞即可切換應援色標記</div>
        </div>
    </div>
</div>

<!-- 公開歌單面板 -->
<div id="public-songs-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.97); z-index:1800; padding:20px; overflow-y:auto;"></div>

<!-- 標記編輯器 -->
<div id="editor-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#0b0b10; z-index:2200; overflow-y:auto; padding:20px;">
    <div style="max-width:700px; margin:0 auto;">
        <div style="background:#121217; border-radius:28px; padding:20px;">
            <h2 style="text-align:center; color:#0f0;">✏️ 點擊詞彙設為應援詞</h2>
            <div id="chips-container" style="text-align:center; margin:25px 0;"></div>
            <div style="display:flex; gap:16px; justify-content:center;">
                <button class="btn btn-success" style="padding:12px 28px;" onclick="saveMarkedData()">✅ 完成生成</button>
                <button class="btn" style="background:#333;" onclick="cancelMarking()">取消</button>
            </div>
        </div>
    </div>
</div>

<div id="footer-info" onclick="handleAdminTrigger()">
    <div id="display-song-name" style="font-weight:600;">應援助手 Cloud Pro</div>
    <div id="display-upload-info" style="font-size:0.6rem;"></div>
</div>

<script>
    // Firebase 初始化
    const firebaseConfig = { apiKey: "AIzaSyCOnH-KJfJqe6VGn7qG2TU1rIaT5OEL9JU", authDomain: "fanchartpro.firebaseapp.com", projectId: "fanchartpro", storageBucket: "fanchartpro.firebasestorage.app", messagingSenderId: "94013254919", appId: "1:94013254919:web:929fff5cd2c71067b269a2" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 核心數據
    let songData = [{ l: "👋 歡迎使用應援助手", f: "Cloud Pro" }];
    let index = 0;
    let isLocked = false;
    let tempPhotoData = "";      // 暫存圖片 base64
    let currentEditingMeta = { name: "", uploader: "本地編輯者" };

    // --- 工具函數 ---
    function getFirstLineData() { return songData[0] || {}; }
    function updateMainViewBtn() {
        const curr = getFirstLineData();
        const photoBtn = document.getElementById('mainViewPhotoBtn');
        const linkBtn = document.getElementById('mainViewLinkBtn');
        if(photoBtn) photoBtn.style.display = (curr && curr.photo) ? 'inline-block' : 'none';
        if(linkBtn) linkBtn.style.display = (curr && curr.link) ? 'inline-block' : 'none';
    }

    // 儲存本地 + 更新UI (核心)
    function updateUI() {
        const listDiv = document.getElementById('lyrics-list');
        if(!listDiv) return;
        listDiv.innerHTML = songData.map((line, i) => {
            const active = (i === index);
            return `<div id="line-${i}" class="line-item" style="opacity: ${active ? 1 : 0.45}; transform: ${active ? 'scale(1.02)' : 'scale(0.98)'}; transition:0.2s;" onclick="event.stopPropagation(); goToLine(${i});">
                        <div>${escapeHtml(line.l || '⋯')}</div>
                        <div>${escapeHtml(line.f || '')}</div>
                    </div>`;
        }).join('');
        // 自動滾動至中間
        const activeElem = document.getElementById(`line-${index}`);
        if(activeElem) activeElem.scrollIntoView({ behavior: 'smooth', block: 'center' });
        
        // 更新底部 meta
        const metaName = songData.meta?.name || currentEditingMeta.name || "未命名歌曲";
        const metaUploader = songData.meta?.uploader || currentEditingMeta.uploader || "本地";
        document.getElementById('display-song-name').innerText = metaName;
        document.getElementById('display-upload-info').innerText = metaUploader ? `上載：${metaUploader}` : "";
        updateMainViewBtn();
        // 持久化至 localStorage (新版)
        try {
            localStorage.setItem('myConcertData', JSON.stringify({
                version: "2.1",
                meta: { name: metaName, uploader: metaUploader },
                lines: songData
            }));
        } catch(e) {}
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function goToLine(idx) { if(!isLocked && idx>=0 && idx<songData.length) { index = idx; updateUI(); } }

    // 全域點擊左右換行 (但避開歌詞區內部)
    function handleGlobalTap(e) {
        if(isLocked) return;
        if(e.target.closest('#lyrics-window') || e.target.closest('.btn') || e.target.closest('.line-item')) return;
        const x = e.clientX ?? (e.touches?.[0]?.clientX ?? 0);
        const w = window.innerWidth;
        if(x < w * 0.4) { if(index > 0) index--; }
        else { if(index < songData.length-1) index++; else index = 0; }
        updateUI();
    }

    // 編輯 / 匯入邏輯 (加強)
    function openImporter(isEdit = false) {
        const modal = document.getElementById('import-modal');
        const textarea = document.getElementById('manualInput');
        const linkInput = document.getElementById('sourceLinkInput');
        const refContainer = document.getElementById('reference-image-container');
        const refImg = document.getElementById('reference-img');
        const title = document.getElementById('modal-title');
        if(isEdit) {
            title.innerText = "✏️ 編輯現有歌詞";
            let fullText = songData.map(line => `${line.l || ''} (${line.f || ''})`.trim().replace(/\(\)/g, '')).join('\n');
            textarea.value = fullText;
            const currMeta = getFirstLineData();
            linkInput.value = currMeta.link || "";
            tempPhotoData = currMeta.photo || "";
        } else {
            title.innerText = "➕ 匯入新歌詞";
            textarea.value = "";
            linkInput.value = "";
            tempPhotoData = "";
        }
        if(tempPhotoData && refImg) {
            refImg.src = tempPhotoData;
            refContainer.style.display = 'flex';
        } else refContainer.style.display = 'none';
        modal.style.display = 'block';
    }
    function closeImporter() { document.getElementById('import-modal').style.display = 'none'; }
    
    // 圖片壓縮上傳 (品質再降)
    function previewRefImage(event) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                const maxSide = 1000;
                if(w > maxSide) { h = (h * maxSide) / w; w = maxSide; }
                if(h > maxSide) { w = (w * maxSide) / h; h = maxSide; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                tempPhotoData = canvas.toDataURL('image/jpeg', 0.65);
                const refImg = document.getElementById('reference-img');
                if(refImg) { refImg.src = tempPhotoData; document.getElementById('reference-image-container').style.display = 'flex'; }
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }

    function handleManualSubmit() {
        const raw = document.getElementById('manualInput').value;
        if(!raw.trim()) { alert("請輸入歌詞內容"); return; }
        const lines = raw.split('\n').filter(l => l.trim() !== "");
        const newData = [];
        for(let line of lines) {
            let l = "", f = "";
            const fcRegex = /\(([^)]+)\)/g;
            let lastIdx = 0, match;
            let plainParts = [], fcParts = [];
            while((match = fcRegex.exec(line)) !== null) {
                plainParts.push(line.substring(lastIdx, match.index));
                fcParts.push(match[1]);
                lastIdx = match.index + match[0].length;
            }
            plainParts.push(line.substring(lastIdx));
            let finalL = plainParts.join('').trim();
            let finalF = fcParts.join(' ').trim();
            newData.push({ l: finalL || "...", f: finalF });
        }
        if(newData.length === 0) return;
        const sourceLink = document.getElementById('sourceLinkInput').value.trim();
        if(tempPhotoData) newData[0].photo = tempPhotoData;
        if(sourceLink) newData[0].link = sourceLink;
        // 彈窗拿歌名
        let songName = prompt("請輸入 [歌名 - 歌手] ：", currentEditingMeta.name || "未命名");
        if(!songName) songName = "未命名歌曲";
        currentEditingMeta = { name: songName, uploader: "本地編輯者" };
        newData.meta = currentEditingMeta;
        songData = newData;
        index = 0;
        closeImporter();
        updateUI();
        // 開啟標記模式更直觀：直接進階微調 (也可不開，但維持傳統體驗可選擇打開標記)
        startManualMarkingFromCurrent(); 
    }
    
    function startManualMarkingFromCurrent() {
        // 將現有 songData 轉換成標記模式
        const container = document.getElementById('chips-container');
        let html = "";
        songData.forEach((line, rowIdx) => {
            if(!line.l && !line.f) return;
            const wordsL = (line.l || "").split(/\s+/).filter(w=>w);
            const wordsF = (line.f || "").split(/\s+/).filter(w=>w);
            const allUniqueWords = [...new Set([...wordsL, ...wordsF])];
            html += `<div class="line-row" data-row="${rowIdx}" style="margin-bottom:20px; border-bottom:1px solid #222; padding-bottom:10px;">`;
            allUniqueWords.forEach(w => {
                const isFc = wordsF.includes(w);
                html += `<span onclick="this.classList.toggle('is-fc')" class="word-chip ${isFc ? 'is-fc' : ''}">${escapeHtml(w)}</span>`;
            });
            html += `</div>`;
        });
        container.innerHTML = html;
        document.getElementById('editor-overlay').style.display = 'block';
    }
    
    function cancelMarking() { document.getElementById('editor-overlay').style.display = 'none'; }
    
    function saveMarkedData() {
        const rows = document.querySelectorAll('.line-row');
        let newLyrics = [];
        rows.forEach(row => {
            const chips = row.querySelectorAll('.word-chip');
            let normal = [], fc = [];
            chips.forEach(chip => {
                if(chip.classList.contains('is-fc')) fc.push(chip.innerText);
                else normal.push(chip.innerText);
            });
            newLyrics.push({ l: normal.join(' ') || "...", f: fc.join(' ') });
        });
        if(newLyrics.length) {
            if(tempPhotoData && !newLyrics[0].photo) newLyrics[0].photo = tempPhotoData;
            const linkVal = document.getElementById('sourceLinkInput')?.value;
            if(linkVal && !newLyrics[0].link) newLyrics[0].link = linkVal;
            newLyrics.meta = currentEditingMeta;
            songData = newLyrics;
            index = 0;
            updateUI();
        }
        document.getElementById('editor-overlay').style.display = 'none';
    }
    
    function editCurrentSong(e) {
        if(e) e.stopPropagation();
        openImporter(true);
    }
    
    // 公開歌單擷取 (優化顯示)
    async function fetchPublicSongs(e) {
        if(e) e.stopPropagation();
        try {
            const snapshot = await db.collection("songs").where("status", "==", "public").orderBy("createdAt", "desc").get();
            const groups = {};
            snapshot.forEach(doc => {
                const data = doc.data();
                const name = data.name || "佚名";
                if(!groups[name]) groups[name] = [];
                groups[name].push({ id: doc.id, ...data });
            });
            let html = `<div style="max-width:600px; margin:0 auto; background:#111; border-radius:28px; padding:20px;"><h2 style="color:#0f0;">📀 公開應援歌單</h2><ul style="list-style:none; padding:0;">`;
            for(let name in groups) {
                html += `<li style="margin:10px 0; background:#1a1a1a; border-radius:20px;"><div style="padding:14px; font-weight:bold; cursor:pointer;" onclick='showVersionSelector(${JSON.stringify(groups[name])})'>📌 ${name} <span style="color:#6f6;font-size:0.7rem;">(${groups[name].length}版)</span></div></li>`;
            }
            html += `<button class="btn" onclick="closePublicModal()" style="margin-top:20px;">關閉</button></div>`;
            const modalDiv = document.getElementById('public-songs-modal');
            modalDiv.innerHTML = html;
            modalDiv.style.display = 'block';
        } catch(err) { alert("載入失敗"); }
    }
    window.showVersionSelector = (versions) => {
        let html = `<div style="max-width:600px; margin:0 auto; background:#121212; border-radius:28px; padding:20px;"><h3>選擇版本</h3>`;
        versions.forEach(v => {
            const date = v.createdAt ? new Date(v.createdAt.seconds*1000).toLocaleDateString() : "未知";
            html += `<div style="background:#1f1f2a; margin:10px 0; padding:12px; border-radius:18px; cursor:pointer;" onclick="loadSpecificSong('${v.id}')">
                        <div><b>${v.name}</b></div><div style="font-size:0.7rem;">作者: ${v.uploader || '匿名'} · ${date}</div>
                    </div>`;
        });
        html += `<button class="btn" onclick="fetchPublicSongs(event)">← 返回</button></div>`;
        document.getElementById('public-songs-modal').innerHTML = html;
    };
    window.loadSpecificSong = async (docId) => {
        try {
            const docSnap = await db.collection("songs").doc(docId).get();
            if(docSnap.exists) {
                const data = docSnap.data();
                songData = data.data;
                songData.meta = { name: data.name, uploader: data.uploader || "雲端" };
                currentEditingMeta = { name: data.name, uploader: data.uploader };
                index = 0;
                updateUI();
                closePublicModal();
            }
        } catch(e) { alert("載入錯誤"); }
    };
    function closePublicModal() { document.getElementById('public-songs-modal').style.display = 'none'; }
    
    // 上傳歌曲 (改善)
    async function uploadSong(e) {
        e.stopPropagation();
        if(!songData.length || (songData.length===1 && songData[0].f==="Cloud Pro" && songData[0].l.includes("歡迎"))) { alert("請先匯入或編輯歌詞"); return; }
        const songTitle = prompt("歌名 - 歌手 :", currentEditingMeta.name);
        if(!songTitle) return;
        const uploaderNick = prompt("你的暱稱 (顯示於底部)", currentEditingMeta.uploader);
        if(!uploaderNick) return;
        try {
            const docRef = await db.collection("songs").add({
                name: songTitle, uploader: uploaderNick, data: songData,
                status: "pending", createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("投稿成功！待管理員審核");
            sendDiscordNotify(songTitle, uploaderNick, docRef.id);
        } catch(err) { alert("上傳失敗"); }
    }
    async function sendDiscordNotify(name, uploader, id) {
        try {
            const adminDoc = await db.collection("admin_config").doc("security").get();
            const webhook = adminDoc.data()?.discord_webhook;
            if(webhook) fetch(webhook, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ username:"應援投稿", embeds:[{ title:"新歌待審", color:65280, fields:[{name:"歌名",value:name},{name:"投稿者",value:uploader}] }]}) });
        } catch(e) {}
    }
    
    function openSourceLink(e) {
        e.stopPropagation();
        const link = getFirstLineData().link;
        if(link) window.open(link.startsWith('http')?link:'https://'+link, '_blank');
        else alert("無來源連結");
    }
    
    // 圖片全屏手勢
    function showMainPhoto(e) {
        if(e) e.stopPropagation();
        const photoSrc = tempPhotoData || getFirstLineData().photo;
        if(!photoSrc) { alert("無參考圖片"); return; }
        const img = document.getElementById('main-photo-img');
        img.src = photoSrc;
        document.getElementById('main-photo-overlay').style.display = 'flex';
    }
    function hideMainPhoto() { document.getElementById('main-photo-overlay').style.display = 'none'; }
    
    // 顏色功能
    function openColorMenu(e) { e.stopPropagation(); const cur = getComputedStyle(document.documentElement).getPropertyValue('--fc-color').trim(); document.getElementById('hexInput').value = cur; document.getElementById('colorPicker').value = cur; document.getElementById('color-modal').style.display = 'block'; }
    function closeColorMenu() { document.getElementById('color-modal').style.display = 'none'; }
    function updateHexInput(val) { document.getElementById('hexInput').value = val; }
    function saveCustomColor() { let col = document.getElementById('hexInput').value.trim(); if(!col.startsWith('#')) col = '#'+col; if(/^#[0-9A-F]{6}$/i.test(col)) { document.documentElement.style.setProperty('--fc-color', col); localStorage.setItem('fanchantColor', col); closeColorMenu(); } else alert("無效色碼"); }
    function toggleLock(e) { e.stopPropagation(); isLocked = !isLocked; document.getElementById('lockBtn').innerHTML = isLocked ? "🔒" : "🔓"; }
    
    // 管理員簡易入口
    let adminClicks=0;
    function handleAdminTrigger() { adminClicks++; if(adminClicks>=5) { adminClicks=0; adminLogin(); } setTimeout(()=>{adminClicks=0;},3000); }
    async function adminLogin() {
        const pwd = prompt("管理金鑰：");
        if(!pwd) return;
        const doc = await db.collection("admin_config").doc("security").get();
        if(doc.exists && doc.data().password === pwd) showAdminPanel();
        else alert("權限不足");
    }
    async function showAdminPanel() {
        const snap = await db.collection("songs").where("status","==","pending").get();
        if(snap.empty) { alert("無待審歌曲"); return; }
        let list = [];
        snap.forEach(d=>list.push({id:d.id, name:d.data().name}));
        let idx = prompt(list.map((s,i)=>`${i+1}. ${s.name}`).join("\n")+"\n輸入編號預覽:");
        if(idx && list[parseInt(idx)-1]) {
            const doc = await db.collection("songs").doc(list[parseInt(idx)-1].id).get();
            songData = doc.data().data; songData.meta = { name: doc.data().name, uploader: doc.data().uploader };
            index=0; updateUI();
            if(confirm(`審核「${doc.data().name}」公開嗎？`)) await db.collection("songs").doc(list[parseInt(idx)-1].id).update({status:"public"});
        }
    }
    
    // 啟動載入本地數據
    window.onload = function() {
        const saved = localStorage.getItem('myConcertData');
        if(saved) {
            try {
                const parsed = JSON.parse(saved);
                if(parsed.version && parsed.lines) {
                    songData = parsed.lines;
                    songData.meta = parsed.meta || { name: "本地歌曲", uploader: "本地" };
                    currentEditingMeta = songData.meta;
                } else if(Array.isArray(parsed)) { songData = parsed; songData.meta = { name: "舊版匯入", uploader: "本地" }; }
                else songData = [{ l: "應援助手", f: "Cloud Pro 載入完成" }];
            } catch(e) {}
        }
        const savedColor = localStorage.getItem('fanchantColor');
        if(savedColor) document.documentElement.style.setProperty('--fc-color', savedColor);
        index = 0;
        updateUI();
    };
    // 補上全域方法
    window.goToLine = goToLine;
    window.editCurrentSong = editCurrentSong;
</script>
</body>
</html>
