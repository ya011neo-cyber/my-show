<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>應援助手 Pro</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; touch-action: none; }
        #app { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 10%; text-align: center; }
        .next-preview { color: #444; font-size: 0.9rem; margin-bottom: 20px; }
        .lyrics { font-size: 1.4rem; color: #bbb; margin-bottom: 10px; }
        .fanchant { font-size: 3.5rem; font-weight: 900; color: #0f0; text-shadow: 0 0 15px #0f0; }
        .btn-group { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; z-index: 100; }
        .btn { padding: 8px 12px; background: #222; border-radius: 5px; font-size: 0.7rem; border: 1px solid #444; color: #fff; }
        
        /* 標記模式專用樣式 */
        #editor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 999; padding: 20px; box-sizing: border-box; overflow-y: auto; display: none; }
        .word-chip { display: inline-block; padding: 8px 12px; margin: 5px; border: 1px solid #444; border-radius: 4px; cursor: pointer; color: #ccc; }
        .word-chip.is-fc { background: #0f0; color: #000; font-weight: bold; border-color: #0f0; box-shadow: 0 0 10px #0f0; }
        .editor-footer { margin-top: 30px; padding-bottom: 50px; }
    </style>
</head>
<body>
<div id="app" onclick="handleTap(event)">
    <div class="btn-group">
        <div class="btn" onclick="openImporter(event)">➕ 匯入/編輯</div>
        <div id="lockBtn" class="btn" onclick="toggleLock(event)">🔓 已解鎖</div>
    </div>
    <div class="next-preview" id="nextText">Next: ---</div>
    <div class="lyrics" id="currLyrics">載入中...</div>
    <div class="fanchant" id="currFanchant"></div>
</div>

<div id="editor-overlay">
    <h2>點擊【應援詞】使其變綠色</h2>
    <div id="chips-container"></div>
    <div class="editor-footer">
        <button class="btn" style="font-size: 1.2rem; padding: 15px 30px;" onclick="saveMarkedData()">✅ 完成並生成應援</button>
        <button class="btn" style="margin-left: 10px;" onclick="document.getElementById('editor-overlay').style.display='none'">取消</button>
    </div>
</div>
<div id="app" onclick="handleTap(event)">
    <div class="btn-group">
        <div class="btn" onclick="importSongs(event)">➕ 加入新歌</div>
        <div id="lockBtn" class="btn" onclick="toggleLock(event)">🔓 已解鎖</div>
    </div>
    <div class="next-preview" id="nextText">Next: ---</div>
    <div class="lyrics" id="currLyrics">準備就緒</div>
    <div class="fanchant" id="currFanchant"></div>
</div>
<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    let songData = [{ l: "點擊右上角「匯入」", f: "開始" }];
    let index = 0;
    let isLocked = false;

    // --- 終極匯入功能 ---
    function openImporter(e) {
        e.stopPropagation();
        const input = prompt("【方法 1】貼上官方格式 (帶括號或斜杠)\n【方法 2】貼上圖片提取的純文字 (稍後手動標記)");
        if (!input) return;

        // 先嘗試自動識別括號
        let autoProcessed = [];
        const lines = input.split('\n');
        lines.forEach(line => {
            const regex = /[\(\（\[](.*?)[\)\）\]]/g;
            let lastIndex = 0;
            let match;
            let foundMatch = false;
            while ((match = regex.exec(line)) !== null) {
                foundMatch = true;
                autoProcessed.push({ l: line.substring(lastIndex, match.index).trim() || "...", f: match[1] });
                lastIndex = regex.lastIndex;
            }
            if (lastIndex < line.length || !foundMatch) {
                const rem = line.substring(lastIndex).trim();
                if (rem) autoProcessed.push({ l: rem, f: "" });
            }
        });

        // 彈出確認：要直接用定係入「標記模式」？
        if (confirm("已偵測到內容。需要進入【手動標記模式】來點選應援詞嗎？\n(如果原本就有括號，按「取消」直接使用即可)")) {
            startManualMarking(input);
        } else {
            songData = autoProcessed;
            index = 0;
            updateUI();
        }
    }

    // --- 手動標記邏輯 ---
    function startManualMarking(text) {
        const overlay = document.getElementById('editor-overlay');
        const container = document.getElementById('chips-container');
        const words = text.split(/[\s\n]+/); // 拆分所有字
        
        container.innerHTML = words.map((w, i) => 
            `<span onclick="this.classList.toggle('is-fc')" class="word-chip">${w}</span>`
        ).join('');
        
        overlay.style.display = 'block';
    }

    function saveMarkedData() {
        const chips = document.querySelectorAll('.word-chip');
        let newData = [];
        let currentL = "";

        chips.forEach(chip => {
            if (chip.classList.contains('is-fc')) {
                newData.push({ l: currentL.trim() || "...", f: chip.innerText });
                currentL = "";
            } else {
                currentL += chip.innerText + " ";
            }
        });

        if (currentL.trim()) newData.push({ l: currentL.trim(), f: "" });
        
        songData = newData;
        index = 0;
        document.getElementById('editor-overlay').style.display = 'none';
        updateUI();
    }

    // --- 基礎操控 ---
    function toggleLock(e) {
        e.stopPropagation();
        isLocked = !isLocked;
        const btn = document.getElementById('lockBtn');
        btn.innerText = isLocked ? "🔒 鎖定中" : "🔓 已解鎖";
        btn.style.borderColor = isLocked ? "red" : "#444";
    }

    function handleTap(e) {
        if (isLocked) return;
        const clickX = e.clientX || (e.touches && e.touches[0].clientX);
        const screenWidth = window.innerWidth;
        if (clickX < screenWidth * 0.3) { if (index > 0) index--; }
        else { if (index < songData.length - 1) index++; else index = 0; }
        updateUI();
    }

    function updateUI() {
        const current = songData[index];
        const next = songData[index + 1] || { l: "完" };
        document.getElementById('currLyrics').innerText = current.l;
        document.getElementById('currFanchant').innerText = current.f;
        document.getElementById('nextText').innerText = "Next: " + next.l;
        if (current.f && navigator.vibrate) navigator.vibrate(50);
    }
    updateUI();
</script>
</body>
</html>
