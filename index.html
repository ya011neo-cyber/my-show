<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>應援助手 Pro</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; touch-action: none; }
        #app { height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 10%; text-align: center; }
        .next-preview { color: #444; font-size: 0.9rem; margin-bottom: 20px; }
        .lyrics { font-size: 1.4rem; color: #bbb; margin-bottom: 10px; }
        .fanchant { font-size: 3.5rem; font-weight: 900; color: #0f0; text-shadow: 0 0 15px #0f0; }
        .btn-group { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; z-index: 100; }
        .btn { padding: 8px 12px; background: #222; border-radius: 5px; font-size: 0.7rem; border: 1px solid #444; color: #fff; cursor: pointer; }
        
        /* 標記模式專用樣式 */
        #editor-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 999; padding: 20px; box-sizing: border-box; overflow-y: auto; display: none; }
        .word-chip { display: inline-block; padding: 8px 12px; margin: 5px; border: 1px solid #444; border-radius: 4px; cursor: pointer; color: #ccc; }
        .word-chip.is-fc { background: #0f0; color: #000; font-weight: bold; border-color: #0f0; box-shadow: 0 0 10px #0f0; }
        .editor-footer { margin-top: 30px; padding-bottom: 50px; text-align: center; }
    </style>
</head>
<body>

<div id="app" onclick="handleTap(event)">
    <div class="btn-group">
        <div class="btn" onclick="openImporter(event)">➕ 匯入</div>
        <div class="btn" onclick="editCurrentSong(event)">✏️ 編輯</div> <div id="lockBtn" class="btn" onclick="toggleLock(event)">🔓 已解鎖</div>
    </div>
    <div class="next-preview" id="nextText">Next: ---</div>
    <div class="lyrics" id="currLyrics">載入中...</div>
    <div class="fanchant" id="currFanchant"></div>
</div>

<div id="editor-overlay">
    <h2 style="text-align:center;">點擊【應援詞】使其變綠色</h2>
    <div id="chips-container" style="text-align:center;"></div>
    <div class="editor-footer">
        <button class="btn" style="font-size: 1.2rem; padding: 15px 30px;" onclick="saveMarkedData()">✅ 完成生成</button>
        <button class="btn" style="margin-left: 10px;" onclick="document.getElementById('editor-overlay').style.display='none'">取消</button>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    let songData = [{ l: "點擊右上角「匯入」", f: "開始" }];
    let index = 0;
    let isLocked = false;

    function openImporter(e) {
        e.stopPropagation();
        const input = prompt("貼上歌詞：");
        if (!input) return;

        let autoProcessed = [];
        const lines = input.split('\n');
        
        lines.forEach(line => {
            const regex = /([\(\（\[].*?[\)\）\]])|([^\(\（\[\)\）\]\s]+)/g;
            let match;
            let currentLyrics = "";
            let currentFanchants = [];

            while ((match = regex.exec(line)) !== null) {
                const segment = match[0];
                const isFC = segment.match(/[\(\（\[](.*?)[\)\）\]]/);

                if (isFC) {
                    currentFanchants.push(isFC[1]);
                } else {
                    // 遇到歌詞，先把之前的應援打包
                    if (currentFanchants.length > 0) {
                        autoProcessed.push({ l: currentLyrics.trim() || "...", f: currentFanchants.join(' ') });
                        currentLyrics = "";
                        currentFanchants = [];
                    }
                    currentLyrics += segment + " ";
                }
            }
            // 處理句尾
            if (currentFanchants.length > 0) {
                autoProcessed.push({ l: currentLyrics.trim() || "...", f: currentFanchants.join(' ') });
            } else if (currentLyrics.trim()) {
                autoProcessed.push({ l: currentLyrics.trim(), f: "" });
            }
        });

        if (confirm("已偵測到內容。要進入【手動標記模式】嗎？")) {
            startManualMarking(input);
        } else {
            songData = autoProcessed;
            index = 0;
            updateUI();
        }
    }


function startManualMarking(text) {
        const overlay = document.getElementById('editor-overlay');
        const container = document.getElementById('chips-container');
        const lines = text.split('\n');
        
        // 建立位置對照表（用於「再次編輯」時還原你之前手動執過嘅位）
        const posMap = {};
        songData.forEach(item => {
            if (item.marks && item.marks.length > 0) {
                if (!posMap[item.row]) posMap[item.row] = new Set();
                item.marks.forEach(m => posMap[item.row].add(m));
            }
        });

        let html = "";
        lines.forEach((line, rowIdx) => {
            if (line.trim() === "") return;
            html += `<div class="line-row" data-row="${rowIdx}" style="margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px;">`;
            
            const words = line.split(/\s+/).filter(w => w !== "");
            words.forEach((w, chipIdx) => {
                // 判斷邏輯：
                // 1. 係咪之前手動點選過嘅位置？
                // 2. OR 粒字本身係咪自帶括號？ (例如 (張天賦) 或 [應援] )
                const isSavedMark = posMap[rowIdx] && posMap[rowIdx].has(chipIdx);
                const isBracketed = /[\(\（\[].*?[\)\）\]]/.test(w); 
                
                const shouldHighlight = isSavedMark || isBracketed;

                html += `<span onclick="this.classList.toggle('is-fc')" class="word-chip ${shouldHighlight ? 'is-fc' : ''}">${w}</span>`;
            });
            html += `</div>`;
        });
        
        container.innerHTML = html;
        overlay.style.display = 'block';
    }

function saveMarkedData() {
        const rows = document.querySelectorAll('.line-row');
        let newData = [];

        rows.forEach((row, rowIdx) => {
            const chips = row.querySelectorAll('.word-chip');
            let currentL = "";
            let pendingF = [];
            let markedIndices = []; // 記住呢一行邊粒字被點選咗

            chips.forEach((chip, chipIdx) => {
                if (chip.classList.contains('is-fc')) {
                    pendingF.push(chip.innerText);
                    markedIndices.push(chipIdx);
                } else {
                    if (pendingF.length > 0) {
                        newData.push({ 
                            l: currentL.trim() || "...", 
                            f: pendingF.join(' '), 
                            row: rowIdx, 
                            marks: markedIndices 
                        });
                        currentL = "";
                        pendingF = [];
                        markedIndices = [];
                    }
                    currentL += chip.innerText + " ";
                }
            });

            if (pendingF.length > 0) {
                newData.push({ l: currentL.trim() || "...", f: pendingF.join(' '), row: rowIdx, marks: markedIndices });
            } else if (currentL.trim()) {
                newData.push({ l: currentL.trim(), f: "", row: rowIdx, marks: [] });
            }
        });

        songData = newData;
        index = 0;
        document.getElementById('editor-overlay').style.display = 'none';
        updateUI();
    }

    function toggleLock(e) {
        e.stopPropagation();
        isLocked = !isLocked;
        const btn = document.getElementById('lockBtn');
        btn.innerText = isLocked ? "🔒 鎖定中" : "🔓 已解鎖";
        btn.style.borderColor = isLocked ? "red" : "#444";
    }

    function handleTap(e) {
        if (isLocked) return;
        const clickX = e.clientX || (e.touches && e.touches[0].clientX);
        const screenWidth = window.innerWidth;
        if (clickX < screenWidth * 0.3) { if (index > 0) index--; }
        else { if (index < songData.length - 1) index++; else index = 0; }
        updateUI();
    }
    function editCurrentSong(e) {
        e.stopPropagation();
        
        // 直接將歌詞同應援詞排埋一齊，完全唔加任何額外括號或符號
        let textFormat = songData.map(item => {
            if (item.f) {
                // 如果歌詞係 "..." 代表淨應援，就只出應援詞
                // 否則就出「歌詞 + 應援詞」
                return (item.l === "..." ? "" : item.l + " ") + item.f;
            }
            return item.l;
        }).join('\n');
    
        const newInput = prompt("編輯現有歌單：", textFormat);
        
        if (newInput !== null) {
            processInput(newInput); 
        }
    }

    function processInput(input) {
        if (!input) return;
        // 直接進入手動標記，唔使問
        startManualMarking(input)；
    }

    function openImporter(e) {
        e.stopPropagation();
        const input = prompt("貼上新歌詞：");
        if (input) {
            // 匯入新歌時，先清空舊嘅位置紀錄，避免新舊歌位置重疊
            songData = []; 
            processInput(input);
        }
    }
// 每次更新 UI 時順便儲存到手機
    function updateUI() {
        const current = songData[index];
        const next = songData[index + 1] || { l: "完畢" };
        document.getElementById('currLyrics').innerText = current.l;
        document.getElementById('currFanchant').innerText = current.f;
        document.getElementById('nextText').innerText = "Next: " + next.l;
        
        // 儲存落手機
        localStorage.setItem('myConcertData', JSON.stringify(songData));
        
        if (current.f && navigator.vibrate) navigator.vibrate(50);
    }

    // 網頁一開嗰陣，讀取舊紀錄
    window.onload = function() {
        const saved = localStorage.getItem('myConcertData');
        if (saved) {
            songData = JSON.parse(saved);
            updateUI();
        }
    };
    updateUI();
</script>
</body>
</html>
