<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>應援助手 · 垂直歌詞版</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #000;
            color: #eee;
            font-family: system-ui, 'Segoe UI', 'Helvetica Neue', sans-serif;
            height: 100vh;
            overflow: hidden;
            touch-action: pan-y; /* 垂直滑動順暢 */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: relative;
            background: radial-gradient(circle at 20% 30%, #0a0a0c, #000000);
        }
        :root {
            --fc-color: #0f0;
        }
        /* 歌詞視窗：固定顯示 5 行區域，上下區域留作 tap 切換 */
        .lyrics-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 0;
            width: 100%;
        }
        /* 上下 tap 感應區 (透明但佔據空間) */
        .tap-zone-top, .tap-zone-bottom {
            flex: 1;
            width: 100%;
            cursor: pointer;
            background: transparent;
            min-height: 12vh;
            z-index: 10;
        }
        /* 中間固定顯示 5 行歌詞的容器 (可滾動) */
        .lyrics-viewport {
            height: 45vh;          /* 大約5行的高度，手機上舒適 */
            max-height: 460px;
            width: 100%;
            overflow-y: auto;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: y mandatory;
            background: rgba(0,0,0,0.5);
            border-radius: 32px;
            margin: 8px 0;
        }
        #lyrics-list {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            gap: 0.8rem;
            padding: 1rem 0.75rem;
        }
        .line-item {
            width: 100%;
            max-width: 600px;
            text-align: center;
            padding: 14px 12px;
            border-radius: 28px;
            transition: all 0.2s ease;
            scroll-snap-align: center;
            cursor: pointer;
            background: rgba(10,10,15,0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(60,60,80,0.4);
        }
        .line-item:active {
            transform: scale(0.97);
            background: #1e1e2a;
        }
        /* 當前 focus 的高亮樣式 */
        .line-item.active {
            background: rgba(0, 255, 0, 0.12);
            border-left: 4px solid var(--fc-color);
            border-right: 4px solid var(--fc-color);
            box-shadow: 0 0 12px rgba(0,255,0,0.2);
        }
        .line-item > .lyrics-text {
            font-size: clamp(1rem, 3.8vh, 1.6rem);
            color: #ccc;
            font-weight: 500;
            line-height: 1.4;
            word-break: break-word;
        }
        .line-item > .fanchant-text {
            font-size: clamp(1.3rem, 5vh, 2.2rem);
            font-weight: 700;
            color: var(--fc-color);
            text-shadow: 0 0 6px rgba(0,255,0,0.4);
            margin-top: 8px;
            letter-spacing: 0.02em;
            word-break: break-word;
        }
        /* 按鈕列 */
        .btn-group {
            position: fixed;
            top: calc(12px + env(safe-area-inset-top));
            right: 12px;
            display: flex;
            gap: 8px;
            z-index: 200;
            flex-wrap: wrap;
            justify-content: flex-end;
            background: transparent;
            pointer-events: none;
        }
        .btn-group .btn {
            pointer-events: auto;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #3a3a4a;
            color: #eee;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.05s linear;
        }
        .btn-group .btn:active { transform: scale(0.94); background: #2a2a2a; }
        /* 底部資訊 */
        .footer-info {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 8px 0 16px;
            background: linear-gradient(to top, #000000dd, transparent);
            text-align: center;
            font-size: 0.7rem;
            color: #aaa;
            pointer-events: auto;
            z-index: 60;
        }
        /* 模態框共用 */
        .modal-glass {
            background: rgba(8,8,12,0.98);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid #2c2c3a;
        }
        .word-chip {
            display: inline-block;
            padding: 8px 16px;
            margin: 6px;
            border: 1px solid #4a4a5a;
            border-radius: 48px;
            cursor: pointer;
            color: #ddd;
            font-size: 0.9rem;
            background: #14141c;
            transition: 0.07s;
        }
        .word-chip.is-fc {
            background: rgba(0,255,0,0.2);
            color: var(--fc-color);
            border-color: var(--fc-color);
            box-shadow: 0 0 4px var(--fc-color);
        }
        #editor-overlay {
            background: #050508;
        }
        #reference-image-container {
            flex: 1;
            display: flex;
            justify-content: center;
        }
        #reference-img {
            max-width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 20px;
        }
        @media (max-width: 640px) {
            .lyrics-viewport { height: 48vh; }
            .line-item { padding: 10px 8px; }
        }
        /* 滾動條美化 */
        .lyrics-viewport::-webkit-scrollbar {
            width: 3px;
        }
        .lyrics-viewport::-webkit-scrollbar-track {
            background: #111;
        }
        .lyrics-viewport::-webkit-scrollbar-thumb {
            background: var(--fc-color);
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="btn-group">
        <div class="btn" onclick="location.reload()">⟳</div>
        <div id="mainViewPhotoBtn" class="btn" style="display:none;" onclick="showMainPhoto(event)">🖼️</div>
        <div id="mainViewLinkBtn" class="btn" style="display:none;" onclick="openSourceLink(event)">🔗</div>
        <div class="btn" onclick="openColorMenu(event)">🎨</div>
        <div class="btn" onclick="fetchPublicSongs(event)">📂</div>
        <div class="btn" onclick="openImporter(false)">➕</div>
        <div class="btn" onclick="uploadSong(event)">☁️</div>
        <div class="btn" onclick="editCurrentSong(event)">✏️</div>
        <div id="lockBtn" class="btn" onclick="toggleLock(event)">🔓</div>
    </div>

    <!-- 垂直分區：上 tap / 歌詞區 / 下 tap -->
    <div class="lyrics-stage">
        <div class="tap-zone-top" id="tapTop"></div>
        <div class="lyrics-viewport" id="lyricsViewport">
            <div id="lyrics-list"></div>
        </div>
        <div class="tap-zone-bottom" id="tapBottom"></div>
    </div>
    <div class="footer-info" onclick="handleAdminTrigger()">
        <div id="display-song-name" style="font-weight:600;">應援助手 · 垂直應援</div>
        <div id="display-upload-info" style="font-size:0.6rem;"></div>
    </div>
</div>

<!-- 圖片全屏 -->
<div id="main-photo-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:3000; justify-content:center; align-items:center;">
    <div style="position:absolute; top:25px; right:25px; font-size:2rem; background:rgba(0,0,0,0.6); width:48px; height:48px; border-radius:30px; text-align:center; line-height:48px; cursor:pointer; z-index:3001;" onclick="hideMainPhoto()">✕</div>
    <img id="main-photo-img" style="max-width:95%; max-height:95%; object-fit:contain;">
</div>

<!-- 顏色選單 -->
<div id="color-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#1e1e2a; padding:20px; border-radius:32px; z-index:2100; width:260px; text-align:center;">
    <h4 style="margin:0 0 12px;">應援色自訂</h4>
    <input type="color" id="colorPicker" onchange="updateHexInput(this.value)" style="width:100%; height:44px; border-radius:12px;">
    <input type="text" id="hexInput" style="width:100%; margin:12px 0; background:#111; border:1px solid #555; padding:8px; border-radius:20px; text-align:center; color:#0f0;">
    <div style="display:flex; gap:10px;">
        <button class="btn" style="flex:1; background:#0f0; color:#000;" onclick="saveCustomColor()">套用</button>
        <button class="btn" style="flex:1;" onclick="closeColorMenu()">取消</button>
    </div>
</div>

<!-- 匯入編輯模態 -->
<div id="import-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.96); z-index:1500; padding:20px; overflow-y:auto;">
    <div style="max-width:700px; margin:0 auto; background:#111; border-radius:32px; padding:20px;">
        <h3 id="modal-title" style="color:#0f0;">編輯歌詞</h3>
        <div style="display:flex; flex-wrap:wrap; gap:15px;">
            <div id="reference-image-container" style="display:none; flex:1;"><img id="reference-img" src=""></div>
            <div style="flex:2;">
                <textarea id="manualInput" rows="6" style="width:100%; background:#1a1a24; border:1px solid #333; border-radius:20px; padding:14px; color:white; font-size:0.9rem;" placeholder="每行一句，應援詞用括號 () 包住會自動標記"></textarea>
                <input type="text" id="sourceLinkInput" style="width:100%; margin-top:12px; background:#1a1a24; border:1px solid #333; border-radius:30px; padding:12px; color:#0f0;" placeholder="🔗 參考來源連結">
            </div>
        </div>
        <div style="display:flex; gap:12px; margin-top:24px; flex-wrap:wrap;">
            <button class="btn" style="flex:2; background:#0a4a0a; color:#cfc;" onclick="handleManualSubmit()">✅ 確認並標記</button>
            <button class="btn" onclick="document.getElementById('refInput').click()">📷 附圖</button>
            <button class="btn" style="background:#333;" onclick="closeImporter()">取消</button>
        </div>
        <input type="file" id="refInput" accept="image/*" style="display:none" onchange="previewRefImage(event)">
    </div>
</div>

<!-- 公開歌單 -->
<div id="public-songs-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.97); z-index:1800; padding:20px; overflow-y:auto;"></div>

<!-- 標記編輯器 -->
<div id="editor-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#0b0b10; z-index:2200; overflow-y:auto; padding:20px;">
    <div style="max-width:700px; margin:0 auto; background:#121217; border-radius:28px; padding:20px;">
        <h2 style="text-align:center; color:#0f0;">✏️ 點擊詞彙設為應援詞</h2>
        <div id="chips-container" style="text-align:center; margin:25px 0;"></div>
        <div style="display:flex; gap:16px; justify-content:center;">
            <button class="btn btn-success" style="background:#0f0; color:#000; padding:12px 28px;" onclick="saveMarkedData()">✅ 完成生成</button>
            <button class="btn" style="background:#333;" onclick="cancelMarking()">取消</button>
        </div>
    </div>
</div>

<script>
    // Firebase 組態
    const firebaseConfig = { apiKey: "AIzaSyCOnH-KJfJqe6VGn7qG2TU1rIaT5OEL9JU", authDomain: "fanchartpro.firebaseapp.com", projectId: "fanchartpro", storageBucket: "fanchartpro.firebasestorage.app", messagingSenderId: "94013254919", appId: "1:94013254919:web:929fff5cd2c71067b269a2" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 核心變數
    let songData = [{ l: "✨ 應援助手", f: "Cloud Pro" }, { l: "點擊上下區域換句", f: "Tap ▲ ▼" }, { l: "點擊歌詞即聚焦", f: "Jump To Line" }];
    let currentIndex = 0;
    let isLocked = false;
    let tempPhotoData = "";
    let currentMeta = { name: "示範歌曲", uploader: "本地編輯者" };

    // 輔助函數
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function getFirstLineData() { return songData[0] || {}; }
    
    // 更新主UI (歌詞列表、高亮、底部)
    function updateUI() {
        const container = document.getElementById('lyrics-list');
        if(!container) return;
        container.innerHTML = songData.map((line, idx) => {
            const isActive = (idx === currentIndex);
            return `<div class="line-item ${isActive ? 'active' : ''}" data-index="${idx}" onclick="event.stopPropagation(); jumpToLine(${idx})">
                        <div class="lyrics-text">${escapeHtml(line.l || '⋯')}</div>
                        <div class="fanchant-text">${escapeHtml(line.f || '')}</div>
                    </div>`;
        }).join('');
        
        // 滾動使 active 行置中於可視區 (viewport)
        const activeElem = document.querySelector(`.line-item.active`);
        const viewport = document.getElementById('lyricsViewport');
        if(activeElem && viewport) {
            activeElem.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        
        // 底部資訊
        const songName = songData.meta?.name || currentMeta.name;
        const uploader = songData.meta?.uploader || currentMeta.uploader;
        document.getElementById('display-song-name').innerText = songName;
        document.getElementById('display-upload-info').innerText = uploader ? `📀 ${uploader}` : "";
        
        updateMainViewBtn();
        saveToLocal();
    }
    
    function saveToLocal() {
        try {
            localStorage.setItem('myConcertData', JSON.stringify({
                version: "3.0",
                meta: { name: songData.meta?.name || currentMeta.name, uploader: songData.meta?.uploader || currentMeta.uploader },
                lines: songData
            }));
        } catch(e) {}
    }
    
    function updateMainViewBtn() {
        const curr = getFirstLineData();
        const photoBtn = document.getElementById('mainViewPhotoBtn');
        const linkBtn = document.getElementById('mainViewLinkBtn');
        if(photoBtn) photoBtn.style.display = (curr && curr.photo) ? 'inline-block' : 'none';
        if(linkBtn) linkBtn.style.display = (curr && curr.link) ? 'inline-block' : 'none';
    }
    
    // 跳轉至指定行
    window.jumpToLine = function(idx) {
        if(isLocked) return;
        if(idx >= 0 && idx < songData.length) {
            currentIndex = idx;
            updateUI();
        }
    };
    
    // 上一句 / 下一句 (對應 tap 上下區域)
    function prevLine() {
        if(isLocked) return;
        if(currentIndex > 0) currentIndex--;
        else currentIndex = 0;
        updateUI();
    }
    function nextLine() {
        if(isLocked) return;
        if(currentIndex < songData.length - 1) currentIndex++;
        else currentIndex = songData.length - 1;
        updateUI();
    }
    
    // 綁定上下tap區域
    function bindTapZones() {
        const topZone = document.getElementById('tapTop');
        const bottomZone = document.getElementById('tapBottom');
        if(topZone) topZone.onclick = (e) => { e.stopPropagation(); prevLine(); };
        if(bottomZone) bottomZone.onclick = (e) => { e.stopPropagation(); nextLine(); };
    }
    
    // ---------- 編輯與匯入邏輯 ----------
    function openImporter(isEdit = false) {
        const modal = document.getElementById('import-modal');
        const textarea = document.getElementById('manualInput');
        const linkInput = document.getElementById('sourceLinkInput');
        const refContainer = document.getElementById('reference-image-container');
        const refImg = document.getElementById('reference-img');
        const title = document.getElementById('modal-title');
        if(isEdit) {
            title.innerText = "✏️ 編輯現有歌詞";
            let fullText = songData.map(line => {
                let l = line.l || "";
                let f = line.f || "";
                if(f && f.trim()) return `${l} (${f})`;
                return l;
            }).join('\n');
            textarea.value = fullText;
            linkInput.value = getFirstLineData().link || "";
            tempPhotoData = getFirstLineData().photo || "";
        } else {
            title.innerText = "➕ 匯入新歌詞";
            textarea.value = "";
            linkInput.value = "";
            tempPhotoData = "";
        }
        if(tempPhotoData && refImg) {
            refImg.src = tempPhotoData;
            refContainer.style.display = 'flex';
        } else refContainer.style.display = 'none';
        modal.style.display = 'block';
    }
    function closeImporter() { document.getElementById('import-modal').style.display = 'none'; }
    
    function previewRefImage(event) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                let w = img.width, h = img.height;
                const maxSide = 1000;
                if(w > maxSide) { h = (h * maxSide) / w; w = maxSide; }
                if(h > maxSide) { w = (w * maxSide) / h; h = maxSide; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                tempPhotoData = canvas.toDataURL('image/jpeg', 0.7);
                const refImg = document.getElementById('reference-img');
                if(refImg) { refImg.src = tempPhotoData; document.getElementById('reference-image-container').style.display = 'flex'; }
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }
    
    function handleManualSubmit() {
        const raw = document.getElementById('manualInput').value;
        if(!raw.trim()) { alert("請輸入歌詞"); return; }
        const lines = raw.split('\n').filter(l => l.trim() !== "");
        const newData = [];
        for(let line of lines) {
            let l = "", f = "";
            const fcRegex = /\(([^)]+)\)/g;
            let lastIdx = 0, match;
            let plainParts = [], fcParts = [];
            while((match = fcRegex.exec(line)) !== null) {
                plainParts.push(line.substring(lastIdx, match.index));
                fcParts.push(match[1]);
                lastIdx = match.index + match[0].length;
            }
            plainParts.push(line.substring(lastIdx));
            let finalL = plainParts.join('').trim();
            let finalF = fcParts.join(' ').trim();
            newData.push({ l: finalL || "🎤", f: finalF });
        }
        if(newData.length === 0) return;
        const sourceLink = document.getElementById('sourceLinkInput').value.trim();
        if(tempPhotoData) newData[0].photo = tempPhotoData;
        if(sourceLink) newData[0].link = sourceLink;
        
        let songTitle = prompt("歌曲名稱 (歌名 - 歌手)", currentMeta.name);
        if(!songTitle) songTitle = "未命名歌曲";
        currentMeta = { name: songTitle, uploader: "本地編輯者" };
        newData.meta = currentMeta;
        songData = newData;
        currentIndex = 0;
        closeImporter();
        updateUI();
        // 開啟標記模式讓用戶微調應援詞
        openMarkingMode();
    }
    
    function openMarkingMode() {
        const container = document.getElementById('chips-container');
        let html = "";
        songData.forEach((line, idx) => {
            if(!line.l && !line.f) return;
            const wordsL = (line.l || "").split(/\s+/).filter(w=>w);
            const wordsF = (line.f || "").split(/\s+/).filter(w=>w);
            const allWords = [...new Set([...wordsL, ...wordsF])];
            html += `<div class="line-row" data-row="${idx}" style="margin-bottom:20px; border-bottom:1px solid #333; padding-bottom:12px;">`;
            allWords.forEach(w => {
                const isFc = wordsF.includes(w);
                html += `<span onclick="this.classList.toggle('is-fc')" class="word-chip ${isFc ? 'is-fc' : ''}">${escapeHtml(w)}</span>`;
            });
            html += `</div>`;
        });
        container.innerHTML = html;
        document.getElementById('editor-overlay').style.display = 'block';
    }
    function cancelMarking() { document.getElementById('editor-overlay').style.display = 'none'; }
    function saveMarkedData() {
        const rows = document.querySelectorAll('.line-row');
        let newLyrics = [];
        rows.forEach(row => {
            const chips = row.querySelectorAll('.word-chip');
            let normal = [], fc = [];
            chips.forEach(chip => {
                if(chip.classList.contains('is-fc')) fc.push(chip.innerText);
                else normal.push(chip.innerText);
            });
            newLyrics.push({ l: normal.join(' ') || "🎶", f: fc.join(' ') });
        });
        if(newLyrics.length) {
            if(tempPhotoData && !newLyrics[0].photo) newLyrics[0].photo = tempPhotoData;
            const linkVal = document.getElementById('sourceLinkInput')?.value;
            if(linkVal && !newLyrics[0].link) newLyrics[0].link = linkVal;
            newLyrics.meta = currentMeta;
            songData = newLyrics;
            currentIndex = 0;
            updateUI();
        }
        document.getElementById('editor-overlay').style.display = 'none';
    }
    function editCurrentSong(e) { if(e) e.stopPropagation(); openImporter(true); }
    
    // 公開歌單
    async function fetchPublicSongs(e) {
        if(e) e.stopPropagation();
        try {
            const snapshot = await db.collection("songs").where("status", "==", "public").orderBy("createdAt", "desc").get();
            const groups = {};
            snapshot.forEach(doc => {
                const data = doc.data();
                const name = data.name || "未知";
                if(!groups[name]) groups[name] = [];
                groups[name].push({ id: doc.id, ...data });
            });
            let html = `<div style="max-width:600px; margin:0 auto; background:#111; border-radius:28px; padding:20px;"><h2 style="color:#0f0;">📀 公開應援歌單</h2>`;
            for(let name in groups) {
                html += `<div style="background:#1f1f2a; margin:8px 0; border-radius:20px;"><div style="padding:14px; font-weight:bold; cursor:pointer;" onclick='showVersionSelector(${JSON.stringify(groups[name])})'>🎵 ${name} <span style="color:#8f8;">(${groups[name].length}版)</span></div></div>`;
            }
            html += `<button class="btn" onclick="closePublicModal()" style="margin-top:20px;">關閉</button></div>`;
            document.getElementById('public-songs-modal').innerHTML = html;
            document.getElementById('public-songs-modal').style.display = 'block';
        } catch(err) { alert("載入失敗"); }
    }
    window.showVersionSelector = (versions) => {
        let html = `<div style="max-width:600px; margin:0 auto; background:#121212; border-radius:28px; padding:20px;"><h3>選擇版本</h3>`;
        versions.forEach(v => {
            const date = v.createdAt ? new Date(v.createdAt.seconds*1000).toLocaleDateString() : "未知";
            html += `<div style="background:#1f1f2a; margin:12px 0; padding:12px; border-radius:20px; cursor:pointer;" onclick="loadSpecificSong('${v.id}')">
                        <b>${escapeHtml(v.name)}</b><div style="font-size:0.7rem;">作者: ${v.uploader || '匿名'} · ${date}</div>
                    </div>`;
        });
        html += `<button class="btn" onclick="fetchPublicSongs(event)">← 返回</button></div>`;
        document.getElementById('public-songs-modal').innerHTML = html;
    };
    window.loadSpecificSong = async (docId) => {
        try {
            const docSnap = await db.collection("songs").doc(docId).get();
            if(docSnap.exists) {
                const data = docSnap.data();
                songData = data.data;
                songData.meta = { name: data.name, uploader: data.uploader || "雲端" };
                currentMeta = { name: data.name, uploader: data.uploader };
                currentIndex = 0;
                updateUI();
                closePublicModal();
            }
        } catch(e) { alert("載入錯誤"); }
    };
    function closePublicModal() { document.getElementById('public-songs-modal').style.display = 'none'; }
    
    // 上傳歌曲
    async function uploadSong(e) {
        e.stopPropagation();
        if(!songData.length) { alert("沒有歌詞資料"); return; }
        const songTitle = prompt("歌名 - 歌手 :", currentMeta.name);
        if(!songTitle) return;
        const nick = prompt("你的暱稱 :", currentMeta.uploader);
        if(!nick) return;
        try {
            await db.collection("songs").add({
                name: songTitle, uploader: nick, data: songData,
                status: "pending", createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("投稿成功！等候審核");
            sendDiscordNotify(songTitle, nick);
        } catch(err) { alert("上傳失敗"); }
    }
    async function sendDiscordNotify(name, uploader) {
        try {
            const adminDoc = await db.collection("admin_config").doc("security").get();
            const webhook = adminDoc.data()?.discord_webhook;
            if(webhook) fetch(webhook, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ username:"應援投稿", embeds:[{ title:"新歌待審", color:65280, fields:[{name:"歌名",value:name},{name:"投稿者",value:uploader}] }]}) });
        } catch(e) {}
    }
    
    // 圖片及連結
    function showMainPhoto(e) {
        if(e) e.stopPropagation();
        const photo = tempPhotoData || getFirstLineData().photo;
        if(!photo) { alert("無參考圖片"); return; }
        document.getElementById('main-photo-img').src = photo;
        document.getElementById('main-photo-overlay').style.display = 'flex';
    }
    function hideMainPhoto() { document.getElementById('main-photo-overlay').style.display = 'none'; }
    function openSourceLink(e) {
        e.stopPropagation();
        const link = getFirstLineData().link;
        if(link) window.open(link.startsWith('http')?link:'https://'+link, '_blank');
        else alert("無連結");
    }
    
    // 顏色
    function openColorMenu(e) { e.stopPropagation(); const cur = getComputedStyle(document.documentElement).getPropertyValue('--fc-color').trim(); document.getElementById('hexInput').value = cur; document.getElementById('colorPicker').value = cur; document.getElementById('color-modal').style.display = 'block'; }
    function closeColorMenu() { document.getElementById('color-modal').style.display = 'none'; }
    function updateHexInput(val) { document.getElementById('hexInput').value = val; }
    function saveCustomColor() { let col = document.getElementById('hexInput').value.trim(); if(!col.startsWith('#')) col='#'+col; if(/^#[0-9A-F]{6}$/i.test(col)) { document.documentElement.style.setProperty('--fc-color', col); localStorage.setItem('fanchantColor', col); closeColorMenu(); } else alert("無效色碼"); }
    function toggleLock(e) { e.stopPropagation(); isLocked = !isLocked; document.getElementById('lockBtn').innerHTML = isLocked ? "🔒" : "🔓"; }
    
    // 管理員
    let adminCount=0;
    function handleAdminTrigger() { adminCount++; if(adminCount>=5) { adminCount=0; adminLogin(); } setTimeout(()=>{adminCount=0;},3000); }
    async function adminLogin() {
        const pwd = prompt("管理金鑰：");
        if(!pwd) return;
        const doc = await db.collection("admin_config").doc("security").get();
        if(doc.exists && doc.data().password === pwd) showAdminPanel();
        else alert("權限不足");
    }
    async function showAdminPanel() {
        const snap = await db.collection("songs").where("status","==","pending").get();
        if(snap.empty) { alert("無待審歌曲"); return; }
        let list = [];
        snap.forEach(d=>list.push({id:d.id, name:d.data().name}));
        let idx = prompt(list.map((s,i)=>`${i+1}. ${s.name}`).join("\n")+"\n輸入編號審核:");
        if(idx && list[parseInt(idx)-1]) {
            const doc = await db.collection("songs").doc(list[parseInt(idx)-1].id).get();
            songData = doc.data().data; songData.meta = { name: doc.data().name, uploader: doc.data().uploader };
            currentMeta = { name: doc.data().name, uploader: doc.data().uploader };
            currentIndex=0; updateUI();
            if(confirm(`公開「${doc.data().name}」？`)) await db.collection("songs").doc(list[parseInt(idx)-1].id).update({status:"public"});
        }
    }
    
    // 初始化載入本地資料
    window.onload = function() {
        const saved = localStorage.getItem('myConcertData');
        if(saved) {
            try {
                const p = JSON.parse(saved);
                if(p.version && p.lines) {
                    songData = p.lines;
                    if(p.meta) { songData.meta = p.meta; currentMeta = p.meta; }
                } else if(Array.isArray(p)) { songData = p; }
            } catch(e) {}
        }
        if(!songData.meta) songData.meta = { name: "本地應援", uploader: "本地" };
        const savedColor = localStorage.getItem('fanchantColor');
        if(savedColor) document.documentElement.style.setProperty('--fc-color', savedColor);
        currentIndex = 0;
        bindTapZones();
        updateUI();
    };
    // 暴露全域函數
    window.jumpToLine = jumpToLine;
    window.prevLine = prevLine;
    window.nextLine = nextLine;
    window.editCurrentSong = editCurrentSong;
    window.fetchPublicSongs = fetchPublicSongs;
    window.uploadSong = uploadSong;
</script>
</body>
</html>
